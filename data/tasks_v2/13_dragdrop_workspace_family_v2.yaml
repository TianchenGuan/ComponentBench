    instances: 1
    guidance: visual
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: dialog
  design_intent:
    active_factors:
    - guidance
    - confirmation_model
    - scale
    factor_rationale: The goal is specified by a visual reference rather than repeated textual order, and the compact handle-only rows inside a modal force deliberate interpretation and commit verification.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 2
    justification: The agent must read a visual target ordering, perform multiple handle-only moves in a compact modal, and commit the result explicitly.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Demo, Intro, Breakout, Q&A, Wrap-up.'
    - Changes must be committed by activating 'Save order'.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Demo
        - Intro
        - Breakout
        - Q&A
        - Wrap-up
        saved: true
        overlay_open: false
      tolerance: null
      require_confirm: true
      confirm_control: Save order
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Matching only part of the reference order.
  - Dragging by the row body and leaving the list unchanged.
  - Reaching the correct draft order but not clicking "Save order".
  - Closing the modal without saving.
  expected_interaction_path:
  - Open the modal.
  - Inspect the Reference order panel.
  - Reorder the Workshop agenda list to match it exactly.
  - Click "Save order".
  notes: Checker may compute the target ordering from the rendered reference panel, but must still validate the committed modal result.
- id: drag_drop_sortable_list-antd-v2-T06
  name: 'AntD: Reorder then discard from the drawer confirmation flow'
  canonical_type: drag_drop_sortable_list
  implementation_source: antd
  implementation_variant: composite_dnd_kit_sortable_discard_flow
  implementation_component: 'AntD: Drawer + sortable list + close/discard confirmation + external dnd-kit Sortable (composite)'
  task_template: confirm_cancel
  secondary_template: drag_operation
  browsergym_goal: Open the "Incident sidebar order" drawer, drag "Latency" to the top to create a draft change, then close the drawer and click "Discard changes". The task will finish automatically when done.
  ui_copy: Open the "Incident sidebar order" drawer, drag "Latency" to the top to create a draft change, then close the drawer and click "Discard changes". The task will finish automatically when done.
  setup_description: |-
    Layout is drawer_flow in dark theme with compact spacing and high clutter. The base incident page contains charts and logs plus a button "Edit incident sidebar". Clicking it opens a right-side drawer titled "Incident sidebar order".

    The drawer contains one handle-only sortable list with initial order:
    Summary, Timeline, Owners, Latency, Error budget, Links.

    Reordering updates the draft order immediately and shows an "Unsaved changes" banner in the drawer footer. Clicking the drawer close button opens a confirmation dialog with buttons "Keep editing" and "Discard changes". Only "Discard changes" closes the drawer and restores the original order.
  scene_context:
    theme: dark
    spacing: compact
    layout: drawer_flow
    placement: top_right
    scale: small
    instances: 1
    guidance: text
    clutter: high
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: false
    confirmation_model: explicit_confirm
    precision_surface: mixed
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - overlay_model
    - confirmation_model
    - clutter
    factor_rationale: 'This keeps the family drag-centric but adds recovery pressure: the agent must create a draft reorder, track unsaved state, and intentionally take the discard path rather than a reset shortcut.'
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 2
      depth_layering: 4
      feedback_dynamics: 5
      semantic_observability: 3
      disambiguation_load: 2
    justification: The final target is the original order, but reaching it requires a real drag action plus correct navigation through a nested discard-confirmation flow.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Summary, Timeline, Owners, Latency, Error budget, Links.'
    - Changes must be committed by activating 'Discard changes'.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Summary
        - Timeline
        - Owners
        - Latency
        - Error budget
        - Links
        discarded: true
        overlay_open: false
      tolerance: null
      require_confirm: true
      confirm_control: Discard changes
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Closing the drawer without first making any reorder.
  - Dragging "Latency" but then saving or keeping the draft instead of discarding it.
  - Ending with Latency still at the top.
  - Using any non-drag reset control (none should exist for this task).
  expected_interaction_path:
  - Open the drawer.
  - Drag "Latency" to the top to create an unsaved draft.
  - Click the drawer close control.
  - In the confirmation dialog, click "Discard changes".
  notes: Checker should require evidence that a dirty-state discard path was taken, not merely that the final order equals the original.
