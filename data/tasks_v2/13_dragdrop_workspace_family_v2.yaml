      predicate_type: equals
      target_state:
        containers:
          Available reports:
          - Sessions
          Enabled reports:
          - Revenue
          - Churn
          - MRR
        order_matters: true
        saved: true
        reference_id: ref-reports-order
        non_target_instances_must_remain:
          Navigation__Enabled:
