- id: kanban_board_drag_drop-mantine-v2-T46
  name: 'Mantine: Mobile app row board exact bottom-of-done save'
  canonical_type: kanban_board_drag_drop
  implementation_source: mantine
  implementation_variant: composite_table_row_board
  implementation_component: 'Mantine: Table row + mini-board + row-local Save'
  task_template: table_operation
  secondary_template: drag_operation
  browsergym_goal: In the "Mobile app" row board, move "APP-3 Finish paywall" into the "Done" column so it becomes the bottom card there. Do not change the "Web app" row board. Then click "Save" in the Mobile app row. The task will finish automatically when done.
  ui_copy: In the "Mobile app" row board, move "APP-3 Finish paywall" into the "Done" column so it becomes the bottom card there. Do not change the "Web app" row board. Then click "Save" in the Mobile app row. The task will finish automatically when done.
  setup_description: |-
    Layout is table_cell with compact spacing, small scale, and high clutter. Two application rows are expanded in a release table:
    - Web app
    - Mobile app (target)

    Each expanded row contains a compact mini-board with columns To do, Review, Done. APP-3 Finish paywall starts in Review on the Mobile app row. The Done lane already contains at least one card. Each row has its own Save button.
  scene_context:
    theme: light
    spacing: compact
    layout: table_cell
    placement: bottom_right
    scale: small
    instances: 2
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - layout
    - instances
    - confirmation_model
    factor_rationale: Mini-boards inside table rows raise both target acquisition and wrong-row risk, and the bottom-of-column constraint prevents the move from being reducible to coarse lane membership.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 5
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 2
      disambiguation_load: 5
    justification: This is hard because the board is physically compact, the target row must be disambiguated, and the destination requires an exact bottom position plus local save.
  success_trigger:
    human_readable:
    - Within the board 'Mobile app', the specified ordering constraint in column 'Done' must hold.
    - The board change must be committed by clicking 'save-mobile-row'.
    - Only the board instance labeled 'Mobile app' counts toward success.
    - Task ends when the predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        board_instance: Mobile app
        column_id: done
        column_label: Done
        bottom_card_id: card_app_3
        saved: true
        non_target_instances_must_remain:
          Web app__dirty: false
      tolerance: null
      require_confirm: true
      confirm_control: save-mobile-row
      require_correct_instance: true
      target_instance_label_or_id: Mobile app
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Changing the Web app row board.
  - Moving APP-3 into Done but not to the bottom position.
  - Leaving APP-3 in Review or another lane.
  - Not clicking Save in the Mobile app row.
  expected_interaction_path:
  - Locate the Mobile app row board.
  - Drag APP-3 into the Done column and place it last.
  - Leave Web app unchanged.
  - Click Save in the Mobile app row.
  notes: Checker should compare committed card order within the Mobile app row only.
- id: kanban_board_drag_drop-mantine-v2-T47
  name: 'Mantine: High-contrast drawer board with hidden Done column'
  canonical_type: kanban_board_drag_drop
  implementation_source: mantine
  implementation_variant: composite_drawer_board_horizontal_scroll
  implementation_component: 'Mantine: Drawer + horizontally scrollable board + Save button'
  task_template: scroll_find
  secondary_template: transfer_move
  browsergym_goal: Open the "Security board" drawer. Move "SEC-9 Rotate API keys" into the "Done" column so it sits directly above "AUD-2 Review logs", then click "Save board". The task will finish automatically when done.
  ui_copy: Open the "Security board" drawer. Move "SEC-9 Rotate API keys" into the "Done" column so it sits directly above "AUD-2 Review logs", then click "Save board". The task will finish automatically when done.
  setup_description: |-
    Layout is drawer_flow in high_contrast theme with compact spacing and medium clutter. Clicking "Open Security board" opens a right-side Mantine Drawer containing a horizontally scrollable board with columns Backlog, To do, Review, Done.

    The Done column starts partly offscreen to the right. SEC-9 Rotate API keys begins in Review. AUD-2 Review logs is already in Done. Dragging cards updates the draft board immediately; the drawer footer button "Save board" commits the change.
  scene_context:
    theme: high_contrast
    spacing: compact
    layout: drawer_flow
    placement: top_right
    scale: small
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - internal_scroll_region
    - theme
    - confirmation_model
    factor_rationale: The hard part is not understanding the destination label but revealing and targeting it inside a constrained drawer board, then saving the exact adjacency outcome.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 4
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 2
    justification: A partially hidden destination column plus an exact adjacency requirement and Save step produce a robust hard kanban task.
  success_trigger:
    human_readable:
    - Within the board 'Security board (drawer)', the specified ordering constraint in column 'Done' must hold.
    - The board change must be committed by clicking 'Save board'.
    - Only the board instance labeled 'Security board (drawer)' counts toward success.
    - Task ends when the predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        board_instance: Security board (drawer)
        column_id: done
        column_label: Done
        adjacency_constraint:
          upper_card_id: card_sec_9
          lower_card_id: card_aud_2
        saved: true
        overlay_open: false
      tolerance: null
      require_confirm: true
      confirm_control: Save board
      require_correct_instance: true
      target_instance_label_or_id: Security board (drawer)
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Moving SEC-9 to Done but not directly above AUD-2.
  - Leaving SEC-9 in Review.
  - Failing to reveal the Done column and dropping into another visible column.
  - Not clicking Save board.
  expected_interaction_path:
  - Open the drawer board.
  - Horizontally scroll until the Done column is fully visible.
  - Drag SEC-9 into Done directly above AUD-2.
  - Click "Save board".
  notes: Checker should read committed state after the drawer closes; horizontal reveal is part of the intended interaction.
- id: kanban_board_drag_drop-mantine-v2-T48
  name: 'Mantine: Review lane must match the visual reference and confirm'
  canonical_type: kanban_board_drag_drop
  implementation_source: mantine
  implementation_variant: composite_visual_reference_confirm
  implementation_component: 'Mantine: Modal + board + review reference panel + Save + confirm'
  task_template: match_reference
  secondary_template: confirm_cancel
  browsergym_goal: Open the "Review board" modal. Reorder the cards in the "Review" column so they match the Reference order shown in the modal, then click "Save order" and confirm. The task will finish automatically when done.
  ui_copy: Open the "Review board" modal. Reorder the cards in the "Review" column so they match the Reference order shown in the modal, then click "Save order" and confirm. The task will finish automatically when done.
  setup_description: |-
    Layout is modal_flow with compact spacing and medium clutter. Clicking "Open Review board" opens a Mantine Modal containing a board with columns To do, Review, Done. To the right of the Review column is a read-only "Reference (Review)" panel that shows the desired top-to-bottom order as numbered cards.

    The Review column contains the same three cards but in the wrong order:
    PR-17 Refactor date utils, PR-12 Add loading skeleton, PR-19 Remove dead code.

    Dragging reorders the Review lane as a draft only. Clicking "Save order" opens a confirm dialog with "Confirm" and "Cancel". Only Confirm commits the new order.
  scene_context:
    theme: light
    spacing: compact
    layout: modal_flow
    placement: center
    scale: small
    instances: 1
    guidance: mixed
    clutter: medium
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: false
    confirmation_model: explicit_confirm
    precision_surface: mixed
    secondary_supporting_primitive: dialog
  design_intent:
    active_factors:
    - guidance
    - overlay_model
    - confirmation_model
    factor_rationale: The reference is visible and human-solvable, but the combination of modal context, explicit column reorder, and save-plus-confirm is exactly the kind of layered verification pressure v2 needs.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 4
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 2
    justification: The target order is explicit, but it still requires precise within-lane dragging and a nested confirm path before the board state is committed.
  success_trigger:
    human_readable:
    - Within the board 'Review board (modal)', the specified ordering constraint in column 'Review' must hold.
    - The board change must be committed by clicking 'Confirm'.
    - Only the board instance labeled 'Review board (modal)' counts toward success.
    - Task ends when the predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        board_instance: Review board (modal)
        column_id: review
        column_label: Review
        ordered_card_ids:
        - card_pr_12
        - card_pr_17
        - card_pr_19
        saved: true
        overlay_open: false
        reference_id: ref-review-order
      tolerance: null
      require_confirm: true
      confirm_control: Confirm
      require_correct_instance: true
      target_instance_label_or_id: Review board (modal)
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Reordering Review but not matching the reference exactly.
  - Saving the correct draft order and then cancelling the confirmation dialog.
  - Moving cards across columns instead of only reordering Review.
  - Closing the modal without confirming.
  expected_interaction_path:
  - Open the modal board.
  - Read the Reference (Review) panel.
  - Reorder the Review column to match it exactly.
  - Click "Save order" and then "Confirm".
  notes: Checker should compare committed order in Review after confirmation, not the transient draft lane order.
