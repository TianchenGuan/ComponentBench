- id: drag_drop_sortable_list-antd-v2-T01
  name: 'AntD: Apply exact order in the correct list instance'
  canonical_type: drag_drop_sortable_list
  implementation_source: antd
  implementation_variant: composite_dnd_kit_sortable_handle_only
  implementation_component: 'AntD: Settings panel + two sortable lists + Button + external dnd-kit Sortable (composite)'
  task_template: drag_operation
  secondary_template: confirm_cancel
  browsergym_goal: In the "Pinned views" list, move "Engagement" so it is directly below "Overview". Do not change the "Saved views" list. Then click "Apply order" and confirm. The task will finish automatically when done.
  ui_copy: In the "Pinned views" list, move "Engagement" so it is directly below "Overview". Do not change the "Saved views" list. Then click "Apply order" and confirm. The task will finish automatically when done.
  setup_description: |-
    Layout is a compact settings_panel anchored off-center. The page shows a left navigation rail, two unrelated toggles, and a main card titled "Workspace layout". Inside the card are two sortable lists with identical row chrome and small grip handles:
    - "Pinned views" (target)
    - "Saved views" (distractor)

    Initial Pinned views order: Overview, Revenue, Conversion, Engagement, Funnels.
    Initial Saved views order: Overview, Engagement, Changelog, Notes, Archive.

    Row dragging is handle-only. Reordering is staged locally until the card footer button "Apply order" is clicked. Clicking "Apply order" opens a small confirmation popover with "Confirm" and "Cancel". Only Confirm commits the new order.
  scene_context:
    theme: light
    spacing: compact
    layout: settings_panel
    placement: off_center
    scale: small
    instances: 2
    guidance: text
    clutter: medium
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: false
    confirmation_model: explicit_confirm
    precision_surface: mixed
    secondary_supporting_primitive: popover
  design_intent:
    active_factors:
    - instances
    - confirmation_model
    - spacing
    factor_rationale: Two visually similar sortable instances create wrong-list risk, the rows are compact with handle-only activation, and the staged Apply-plus-Confirm flow forces the agent to verify the edited list before committing.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 5
    justification: This is hard because the target list must be disambiguated from a near-match, the drag affordance is compact and handle-only, and a nested confirmation flow must be completed correctly.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Overview, Engagement, Revenue, Conversion, Funnels.'
    - Changes must be committed by activating 'Confirm'.
    - Only the instance labeled 'Pinned views' counts toward success and non-target instances must remain unchanged.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Overview
        - Engagement
        - Revenue
        - Conversion
        - Funnels
        saved: true
        non_target_instances_must_remain:
          Saved views:
          - Overview
          - Engagement
          - Changelog
          - Notes
          - Archive
      tolerance: null
      require_confirm: true
      confirm_control: Confirm
      require_correct_instance: true
      target_instance_label_or_id: Pinned views
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Reordering the "Saved views" list instead of "Pinned views".
  - Stopping after the draft order looks right without clicking "Apply order" and "Confirm".
  - Placing "Engagement" above "Overview" or below "Revenue" instead of directly below "Overview".
  - Changing both lists.
  expected_interaction_path:
  - Locate the "Pinned views" list inside the Workspace layout card.
  - Drag "Engagement" by its handle so it lands directly below "Overview".
  - Leave "Saved views" unchanged.
  - Click "Apply order", then click "Confirm".
  notes: Checker should scope to the list labeled 'Pinned views', verify the sibling list is unchanged, and require a committed saved state rather than only reading the draft DOM order.
- id: drag_drop_sortable_list-antd-v2-T02
  name: 'AntD: Long drawer list with hidden target and save'
  canonical_type: drag_drop_sortable_list
  implementation_source: antd
  implementation_variant: composite_dnd_kit_sortable_scrollable
  implementation_component: 'AntD: Drawer + scrollable sortable list + Button + external dnd-kit Sortable (composite)'
  task_template: scroll_find
  secondary_template: drag_operation
  browsergym_goal: Open the "Board sections" drawer, scroll inside the list to find "Postmortem", move it to the very top, and then click "Save layout". The task will finish automatically when done.
  ui_copy: Open the "Board sections" drawer, scroll inside the list to find "Postmortem", move it to the very top, and then click "Save layout". The task will finish automatically when done.
  setup_description: |-
    Layout is drawer_flow in dark theme with compact spacing and medium clutter. The main page shows a release dashboard with KPI cards and a read-only timeline. Clicking "Edit board sections" opens a right-side Ant Design Drawer titled "Board sections".

    Inside the drawer is one fixed-height scrollable sortable list with small handle-only rows. Only about 6 rows are visible at once. Initial order is:
    Overview, Health, Revenue, Conversion, Funnels, Risks, Incidents, Owners, Dependencies, Rollout, Support, Postmortem.

    The footer contains "Cancel" and "Save layout". Row order changes are staged until "Save layout" is clicked.
  scene_context:
    theme: dark
    spacing: compact
    layout: drawer_flow
    placement: top_right
    scale: small
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - internal_scroll_region
    - layout
    - confirmation_model
    factor_rationale: The target row starts below the fold inside the drawer-local scroll region, so the task combines hidden-target acquisition, long-distance drag placement, and a drawer-local save step.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 2
    justification: The hard part is revealing and moving an off-screen row within a constrained drawer list, then committing the change explicitly.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Postmortem, Overview, Health, Revenue, Conversion, Funnels, Risks, Incidents, Owners, Dependencies, Rollout, Support.'
    - Changes must be committed by activating 'Save layout'.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Postmortem
        - Overview
        - Health
        - Revenue
        - Conversion
        - Funnels
        - Risks
        - Incidents
        - Owners
        - Dependencies
        - Rollout
        - Support
        saved: true
        overlay_open: false
      tolerance: null
      require_confirm: true
      confirm_control: Save layout
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Scrolling the page instead of the drawer list, leaving "Postmortem" hidden.
  - Moving "Postmortem" near the top but not to the first position.
  - Dropping the row successfully but not clicking "Save layout".
  - Closing the drawer without saving.
  expected_interaction_path:
  - Open the drawer.
  - Scroll inside the sortable list until "Postmortem" is visible.
  - Drag "Postmortem" to the first position.
  - Click "Save layout".
  notes: For long sortable lists, implement drag overlay or autoscroll so the item remains visible during the move. Checker should validate committed order after drawer close.
- id: drag_drop_sortable_list-antd-v2-T03
  name: 'AntD: Compact table row reorder with exact full order'
  canonical_type: drag_drop_sortable_list
  implementation_source: antd
  implementation_variant: composite_dnd_kit_sortable_table_rows
  implementation_component: 'AntD: Table + compact handle cells + Button + external dnd-kit Sortable (composite)'
  task_template: table_operation
  secondary_template: drag_operation
  browsergym_goal: 'In the "Lane priority" table, reorder the rows so the order is: Blocked, Review, In progress, To do, Done. Then click "Apply". The task will finish automatically when done.'
  ui_copy: 'In the "Lane priority" table, reorder the rows so the order is: Blocked, Review, In progress, To do, Done. Then click "Apply". The task will finish automatically when done.'
  setup_description: |-
    Layout is table_cell with compact spacing, small scale, and high clutter. The target table is embedded in the bottom-right of an incident-settings page. The compact card title is "Lane priority".

    The table rows are draggable only from a tiny grip icon in the first column. Initial row order is:
    To do, In progress, Review, Done, Blocked.

    Other columns show read-only lane descriptions and a disabled checkbox. The footer has "Cancel" and "Apply". Changes remain draft-only until Apply is clicked.
  scene_context:
    theme: light
    spacing: compact
    layout: table_cell
    placement: bottom_right
    scale: small
    instances: 1
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - layout
    - scale
    - clutter
    factor_rationale: The table-cell carrier makes the drag handle physically small and crowded, while the full exact-order requirement plus Apply step turns a simple reorder into a high-precision state-tracking task.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 5
      target_acquisition: 5
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 2
      disambiguation_load: 2
    justification: This is a dense, handle-only full-order task where both acquisition and exactness are high-pressure, and the final state still has to be explicitly applied.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Blocked, Review, In progress, To do, Done.'
    - Changes must be committed by activating 'Apply'.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Blocked
        - Review
        - In progress
        - To do
        - Done
        saved: true
      tolerance: null
      require_confirm: true
      confirm_control: Apply
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Getting some rows into the right region but not the exact full order.
  - Dragging by the row body instead of the handle so no reorder occurs.
  - Reaching the correct draft order but not clicking "Apply".
  - Changing non-target controls in the table and leaving the order wrong.
  expected_interaction_path:
  - Locate the Lane priority table.
  - Use the small drag handles to reorder all five rows into the target sequence.
  - Verify the draft order visually.
  - Click "Apply".
  notes: Checker should compare committed DOM row order, not transient drag placeholders.
- id: drag_drop_sortable_list-antd-v2-T04
  name: 'AntD: Analytics list only in a three-list dashboard'
  canonical_type: drag_drop_sortable_list
  implementation_source: antd
  implementation_variant: composite_dnd_kit_sortable_multi_instance
  implementation_component: 'AntD: Dashboard panel + three sortable lists + Button + external dnd-kit Sortable (composite)'
  task_template: drag_operation
  secondary_template: confirm_cancel
  browsergym_goal: In the "Analytics widgets" list, move "Funnels" so it sits directly above "Retention". Do not change the "Home widgets" or "Ops widgets" lists. Then click "Save dashboard". The task will finish automatically when done.
  ui_copy: In the "Analytics widgets" list, move "Funnels" so it sits directly above "Retention". Do not change the "Home widgets" or "Ops widgets" lists. Then click "Save dashboard". The task will finish automatically when done.
  setup_description: |-
    Layout is dashboard_panel with compact spacing and high clutter. Three sortable widget lists are visible in separate cards on the same page:
    - Home widgets
    - Analytics widgets (target)
    - Ops widgets

    All three lists share the labels Overview, Alerts, Retention, Notes, and at least one list also includes Funnels. In the Analytics widgets list, initial order is:
    Overview, Revenue, Retention, Funnels, Notes.

    Each card has its own tiny "Save dashboard" button in the footer. Only the Analytics card should be changed, and only its footer button should be used.
  scene_context:
    theme: light
    spacing: compact
    layout: dashboard_panel
    placement: off_center
    scale: small
    instances: 3
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - clutter
    - confirmation_model
    factor_rationale: Three nearby sortable lists with overlapping labels raise disambiguation load, and the card-local save control forces the agent to preserve non-target lists while committing the intended one.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 5
    justification: The reorder itself is small, but the scene is deliberately packed with overlapping labels and multiple local save buttons, making wrong-instance errors likely.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Overview, Revenue, Funnels, Retention, Notes.'
    - Changes must be committed by activating 'Save dashboard'.
    - Only the instance labeled 'Analytics widgets' counts toward success and non-target instances must remain unchanged.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Overview
        - Revenue
        - Funnels
        - Retention
        - Notes
        saved: true
        non_target_instances_must_remain:
          Home widgets:
          - Overview
          - Tasks
          - Notes
          - Alerts
          - Calendar
          Ops widgets:
          - Alerts
          - Overview
          - Owners
          - Incidents
          - Notes
      tolerance: null
      require_confirm: true
      confirm_control: Save dashboard
      require_correct_instance: true
      target_instance_label_or_id: Analytics widgets
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Editing Home widgets or Ops widgets instead of Analytics widgets.
  - Placing "Funnels" below "Retention" or anywhere other than directly above it.
  - Clicking the wrong card-local "Save dashboard" button.
  - Changing multiple lists.
  expected_interaction_path:
  - Identify the Analytics widgets card.
  - Drag "Funnels" above "Retention" in that list only.
  - Leave the other two lists untouched.
  - Click the Analytics card’s "Save dashboard" button.
  notes: Each sortable instance and each local Save control should have a distinct label/id so the checker can reject wrong-card commits.
- id: drag_drop_sortable_list-antd-v2-T05
  name: 'AntD: Modal reference ranking with handle-only moves'
  canonical_type: drag_drop_sortable_list
  implementation_source: antd
  implementation_variant: composite_dnd_kit_sortable_visual_reference
  implementation_component: 'AntD: Modal + sortable list + reference panel + external dnd-kit Sortable (composite)'
  task_template: match_reference
  secondary_template: open_overlay
  browsergym_goal: Open "Edit agenda order". In the "Workshop agenda" list, match the Reference order shown in the modal, then click "Save order". The task will finish automatically when done.
  ui_copy: Open "Edit agenda order". In the "Workshop agenda" list, match the Reference order shown in the modal, then click "Save order". The task will finish automatically when done.
  setup_description: |-
    Layout is modal_flow with compact spacing and medium clutter. The base page contains a workshop summary card with a button "Edit agenda order". Clicking it opens an Ant Design Modal titled "Workshop agenda".

    Inside the modal are:
    - a handle-only sortable list with items Intro, Demo, Breakout, Q&A, Wrap-up
    - a compact "Reference order" panel rendered as numbered chips showing the desired final ranking visually

    Initial list order is Intro, Breakout, Demo, Wrap-up, Q&A. The footer contains "Cancel" and "Save order". The modal closes only after Save order.
  scene_context:
