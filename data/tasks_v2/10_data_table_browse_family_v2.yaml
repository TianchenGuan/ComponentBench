- id: data_table_filterable-antd-v2-T01
  name: 'Dashboard approvals: filter Orders, not Returns'
  canonical_type: data_table_filterable
  implementation_source: antd
  implementation_variant: table_filters
  implementation_component: 'AntD: Table (column filters with OK/Reset)'
  task_template: open_and_select
  secondary_template: table_operation
  browsergym_goal: On the approvals dashboard, in the Orders table (not Returns), filter Status to "Escalated" and Region to "APAC", then click OK in each filter menu if needed. The task will finish automatically when done.
  ui_copy: On the approvals dashboard, in the Orders table (not Returns), filter Status to "Escalated" and Region to "APAC", then click OK in each filter menu if needed. The task will finish automatically when done.
  setup_description: |-
    A compact, high-clutter dashboard_panel fills the main viewport. KPI chips, a date-range pill group, and a summary rail appear above two Ant Design tables titled “Orders” and “Returns”. Both tables expose the same small header funnel icons for Status and Region and use the standard Ant Design filter dropdowns with OK and Reset buttons.
    Initial state: both tables are unfiltered. The target is the Orders table only. Status and Region are both visible columns, so the difficulty comes from choosing the correct table, opening two tiny header popovers, and committing both filters without touching Returns.
  scene_context:
    theme: light
    spacing: compact
    layout: dashboard_panel
    placement: top_left
    scale: default
    instances: 2
    guidance: text
    clutter: high
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - instances
    - clutter
    - confirmation_model
    factor_rationale: Two near-identical tables in a dense dashboard create wrong-instance pressure, and the explicit OK step in each header filter menu turns a plausible configuration into a verify-and-commit task.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 5
    justification: The filters themselves are semantically clear, but tiny header affordances, repeated tables, and explicit apply semantics make this a reliable hard browse-family task.
  success_trigger:
    human_readable:
    - In the Orders table, the active column filters are Status = Escalated and Region = APAC.
    - The Returns table remains unfiltered.
    - Both filter states have been applied, not merely selected in an open popover.
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_instances:
          orders:
            logic_operator: AND
            column_filters:
            - column: Status
              operator: equals
              value: Escalated
            - column: Region
              operator: equals
              value: APAC
          returns:
            logic_operator: AND
            column_filters: []
      tolerance: null
      require_confirm: true
      confirm_control: OK
      require_correct_instance: true
      target_instance_label_or_id: Orders
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Filtering the Returns table instead of Orders.
  - Applying only one of the two filters.
  - Selecting the right values but leaving one filter menu unapplied.
  - Applying extra filters on either table.
  expected_interaction_path:
  - Identify the Orders table in the dashboard panel.
  - Open the Status filter menu on Orders, choose Escalated, and click OK.
  - Open the Region filter menu on Orders, choose APAC, and click OK.
  - Verify Returns is unchanged.
  notes: Checker should bind filters to the correct table instance and inspect applied table state rather than only visible rows.
- id: data_table_filterable-antd-v2-T02
  name: 'Drawer inventory: scroll to hidden Region filter and apply'
  canonical_type: data_table_filterable
  implementation_source: antd
  implementation_variant: fixed_columns_filter_search
  implementation_component: 'AntD: Table (fixed columns, horizontal scroll, filterSearch)'
  task_template: scroll_find
  secondary_template: search_and_select
  browsergym_goal: Open the Inventory table drawer. In the Inventory table, scroll horizontally to find the Region column, filter Region to "LATAM", and click OK. The task will finish automatically when done.
  ui_copy: Open the Inventory table drawer. In the Inventory table, scroll horizontally to find the Region column, filter Region to "LATAM", and click OK. The task will finish automatically when done.
  setup_description: |-
    A right-anchored Ant Design drawer opens from a compact operations page. Inside it is one wide Inventory table with a fixed first column and many narrow columns; only part of the header is visible at a time, so horizontal scrolling inside the table is required. The far-right Region column has a filterSearch-enabled dropdown with a searchable list of regions and an OK button.
    Initial state: no filters are active. The drawer footer has Close only; the table filter itself commits through the Ant Design filter menu.
  scene_context:
    theme: dark
    spacing: compact
    layout: drawer_flow
    placement: off_center
    scale: small
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - internal_scroll_region
    - placement
    - confirmation_model
    factor_rationale: The agent must first find the off-screen header inside the table-local scroll region, then use a searchable filter popover and explicitly apply the result inside a drawer context.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 5
      density_choice_interference: 3
      depth_layering: 4
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 2
    justification: The hidden header and compact scroll surface make acquisition hard, and the drawer-plus-popover stack adds layered state and commit pressure.
  success_trigger:
    human_readable:
    - 'The Inventory table has exactly one active column filter: Region = LATAM.'
    - The filter has been applied via the filter menu OK control.
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_id: inventory
        logic_operator: AND
        column_filters:
        - column: Region
          operator: equals
          value: LATAM
      tolerance: null
      require_confirm: true
      confirm_control: OK
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Scrolling the page or drawer but not the table header region.
  - Selecting LATAM in the filter menu but not clicking OK.
  - Filtering a nearby column such as Country instead of Region.
  - Leaving any additional column filters active.
  expected_interaction_path:
  - Open the drawer.
  - Scroll horizontally within the table until Region is visible.
  - Open the Region filter dropdown, search or select LATAM, and click OK.
  - Verify the Region filter indicator is active.
  notes: Use the table root state for the checker; do not infer success from horizontal scroll position.
- id: data_table_filterable-antd-v2-T03
  name: 'Audit modal: created date range with apply'
  canonical_type: data_table_filterable
  implementation_source: antd
  implementation_variant: date_range_filter
  implementation_component: 'AntD: Table (custom DatePicker range filter in modal)'
  task_template: set_range
  secondary_template: open_overlay
  browsergym_goal: Open the Audit Events modal. In the Audit Events table, filter Created to 2025-04-01 through 2025-06-30 inclusive, then click Apply filters. The task will finish automatically when done.
  ui_copy: Open the Audit Events modal. In the Audit Events table, filter Created to 2025-04-01 through 2025-06-30 inclusive, then click Apply filters. The task will finish automatically when done.
  setup_description: |-
    The page uses modal_flow. Clicking “Audit Events” opens a centered Ant Design modal containing a compact table titled “Audit Events”. The Created column filter opens a custom range panel with an Ant Design date-range picker and a footer button labeled “Apply filters”. Other modal controls include Close and Cancel, and the background page remains visible but inactive behind the dimmer.
    Initial state: no filters are active. The range must be applied from the modal’s filter panel, not typed elsewhere on the page.
  scene_context:
    theme: light
    spacing: compact
    layout: modal_flow
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: dialog
  design_intent:
    active_factors:
    - layout
    - overlay_model
    - confirmation_model
    factor_rationale: This uses a realistic modal-plus-filter-popover-plus-range-picker stack, so the table remains primary while the agent must track layered state and apply the pending filter explicitly.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 5
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 2
    justification: The calendar interaction is exact and nested, and the modal carrier increases both substep count and recovery burden.
  success_trigger:
    human_readable:
    - 'The Audit Events table has exactly one active filter: Created between 2025-04-01 and 2025-06-30 inclusive.'
    - The range has been applied via the Apply filters control in the filter panel.
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_id: audit_events
        logic_operator: AND
        column_filters:
        - column: Created
          operator: date_between_inclusive
          value:
            start: '2025-04-01'
            end: '2025-06-30'
      tolerance: null
      require_confirm: true
      confirm_control: Apply filters
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting only the start date or only the end date.
  - Choosing the right dates but not clicking Apply filters.
  - Entering a nearby quarter such as 2025-01-01 to 2025-03-31.
  - Closing the modal without applying the filter.
  expected_interaction_path:
  - Open the Audit Events modal.
  - Open the Created filter panel.
  - Select the start and end dates in the range picker.
  - Click Apply filters and verify the filter is active.
  notes: The checker should parse the canonical date range after application and not rely solely on visible row text.
- id: data_table_filterable-antd-v2-T04
  name: 'Team settings: filter Members only by two columns'
  canonical_type: data_table_filterable
  implementation_source: antd
  implementation_variant: multi_column_filters
  implementation_component: 'AntD: Table (multiple independent column filters)'
  task_template: table_operation
  secondary_template: open_and_select
  browsergym_goal: In the Members table, filter Role to "Reviewer" and Active to "Yes". Do not change the Guests or Invites tables. Click OK in each filter menu if needed. The task will finish automatically when done.
  ui_copy: In the Members table, filter Role to "Reviewer" and Active to "Yes". Do not change the Guests or Invites tables. Click OK in each filter menu if needed. The task will finish automatically when done.
  setup_description: |-
    A compact settings_panel shows three stacked Ant Design tables titled “Members”, “Guests”, and “Invites”. Each table has narrow headers, small filter icons, and the same pair of filterable columns: Role and Active. A help sidebar and two unrelated toggles increase clutter.
    Initial state: all three tables are unfiltered. The task requires changing only the Members table by applying two column filters; Guests and Invites must remain untouched.
  scene_context:
    theme: light
    spacing: compact
    layout: settings_panel
    placement: off_center
    scale: small
    instances: 3
    guidance: text
    clutter: high
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - instances
    - spacing
    - clutter
    factor_rationale: Three sibling tables with identical filter affordances create high disambiguation load, and compact spacing makes the correct header controls harder to acquire.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 5
    justification: This is hard mainly because of repeated instances and dense header controls, not because the semantic target is obscure.
  success_trigger:
    human_readable:
    - In the Members table, Role = Reviewer and Active = Yes are the only active filters.
    - Guests and Invites remain unfiltered.
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_instances:
          members:
            logic_operator: AND
            column_filters:
            - column: Role
              operator: equals
              value: Reviewer
            - column: Active
              operator: equals
              value: 'Yes'
          guests:
            logic_operator: AND
            column_filters: []
          invites:
            logic_operator: AND
            column_filters: []
      tolerance: null
      require_confirm: true
      confirm_control: OK
      require_correct_instance: true
      target_instance_label_or_id: Members
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Applying either filter on Guests or Invites.
  - Applying only one of the two requested Members filters.
  - Selecting the correct values but leaving one dropdown unapplied.
  - Leaving any extra filters active on any of the three tables.
  expected_interaction_path:
  - Locate the Members table within the settings panel.
  - Open the Role filter menu and apply Reviewer.
  - Open the Active filter menu and apply Yes.
  - Verify Guests and Invites remain unfiltered.
  notes: Per-table test hooks are recommended so the checker can require non-target tables to remain unchanged.
- id: data_table_filterable-antd-v2-T05
