  design_intent:
    active_factors:
    - confirmation_model
    - guidance
    - placement
    factor_rationale: The filter panel is intentionally configured-but-not-applied until the footer action is used, which separates UI configuration from committed state and makes verification essential.
  difficulty:
    difficulty_bucket: hard
