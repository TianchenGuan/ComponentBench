- id: data_table_filterable-antd-v2-T06
  name: 'Alert row subtable: clear and replace severity filter'
  canonical_type: data_table_filterable
  implementation_source: antd
  implementation_variant: table_cell_subtable
  implementation_component: 'AntD: Table (subtable with pre-applied filter and OK/Reset)'
  task_template: clear_reset
  secondary_template: select_many
  browsergym_goal: In the Alerts subtable (not the Incidents subtable), clear the current Severity filter and replace it with exactly "Critical" and "High", then click OK. The task will finish automatically when done.
  ui_copy: In the Alerts subtable (not the Incidents subtable), clear the current Severity filter and replace it with exactly "Critical" and "High", then click OK. The task will finish automatically when done.
  setup_description: |-
    A table_cell layout shows two expanded parent rows in a monitoring page. Each expanded row contains a mini-table: one titled “Alerts” and one titled “Incidents”. The Alerts subtable is the target. Both subtables use the same compact Severity filter popover with checkboxes plus Reset and OK.
    Initial state: Alerts already has Severity = Medium applied; Incidents has no filters. The task requires clearing the existing Alerts filter state and replacing it with the exact set {Critical, High}.
  scene_context:
    theme: dark
    spacing: compact
    layout: table_cell
    placement: bottom_left
    scale: small
    instances: 2
    guidance: text
    clutter: high
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - layout
    - instances
    - confirmation_model
    factor_rationale: Nested subtables increase grounding difficulty, and the task requires recovery from a pre-existing filter state rather than a clean one-shot selection.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 5
    justification: The agent must identify the correct subtable, reset a stale filter, choose an exact two-value set, and commit it in a dense cell context.
  success_trigger:
    human_readable:
    - The Alerts subtable has Severity in {Critical, High} and no other active filters.
    - The Incidents subtable remains unfiltered.
    - The change was applied through OK.
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_instances:
          alerts:
            logic_operator: AND
            column_filters:
            - column: Severity
              operator: in
              value:
              - Critical
              - High
          incidents:
            logic_operator: AND
            column_filters: []
      tolerance: null
      require_confirm: true
      confirm_control: OK
      require_correct_instance: true
      target_instance_label_or_id: Alerts
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Leaving Medium selected in addition to Critical and High.
  - Updating the Incidents subtable instead of Alerts.
  - Clicking Reset without replacing the filter values.
  - Configuring the right values but not clicking OK.
  expected_interaction_path:
  - Locate the Alerts subtable in the expanded row area.
  - Open the Severity filter popover and clear the old state.
  - Select Critical and High only.
  - Click OK and verify Incidents is unchanged.
  notes: Represent multi-select values as an unordered exact set in the checker.
- id: data_table_filterable-mui-v2-T07
  name: 'Invite Manager: multi-filter Invited users only'
  canonical_type: data_table_filterable
  implementation_source: mui
  implementation_variant: mui_x_datagrid_pro
  implementation_component: 'MUI X DataGrid Pro: toolbar filters in modal'
  task_template: table_operation
  secondary_template: open_overlay
  browsergym_goal: Open the Invite Manager dialog. In the Invited users table (not Active users), set Department to "Support" and Status to "Pending". The task will finish automatically when done.
  ui_copy: Open the Invite Manager dialog. In the Invited users table (not Active users), set Department to "Support" and Status to "Pending". The task will finish automatically when done.
  setup_description: |-
    The page uses modal_flow. Clicking “Invite Manager” opens a MUI dialog containing two DataGrid Pro instances stacked vertically: “Active users” on top and “Invited users” below. Each grid has the same toolbar with a Filters button. The filter panel updates the grid automatically; there is no separate Apply button.
    Initial state: both grids are unfiltered. The task target is only the Invited users grid.
  scene_context:
    theme: light
    spacing: compact
    layout: modal_flow
    placement: center
    scale: default
    instances: 2
    guidance: text
    clutter: medium
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: false
    confirmation_model: auto_apply
    precision_surface: discrete
    secondary_supporting_primitive: dialog
  design_intent:
    active_factors:
    - layout
    - instances
    - guidance
    factor_rationale: This uses the Data Grid toolbar filter workflow inside a modal and forces the agent to keep grid identity straight while creating an exact two-item filter model.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 2
      depth_layering: 4
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 5
    justification: The filters are straightforward, but the stacked modal grids and auto-updating filter panel create layered state and repeated-instance pressure.
  success_trigger:
    human_readable:
    - In Invited users, Department = Support and Status = Pending are the only active filters.
    - Active users remains unfiltered.
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_instances:
          invited_users:
            logic_operator: AND
            column_filters:
            - column: Department
              operator: is
              value: Support
            - column: Status
              operator: is
              value: Pending
          active_users:
            logic_operator: OR
            column_filters: []
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Invited users
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Applying the filters to Active users instead of Invited users.
  - Leaving only one of the two filter items active.
  - Adding extra filter items in the model.
  - Closing the panel after configuring the wrong grid.
  expected_interaction_path:
  - Open the dialog.
  - Use the Filters button on Invited users.
  - Add the Department filter and the Status filter.
  - Verify Active users remains unfiltered.
  notes: For MUI, read the grid filterModel including items and logicOperator from the target grid instance.
- id: data_table_filterable-mui-v2-T08
  name: 'Accounts grid: hidden Country filter via column menu'
  canonical_type: data_table_filterable
  implementation_source: mui
  implementation_variant: mui_x_datagrid_pro
  implementation_component: 'MUI X DataGrid Pro: column-menu filtering with horizontal scroll'
  task_template: scroll_find
  secondary_template: open_and_select
  browsergym_goal: In the Accounts grid, scroll to the Country column, open its column menu, and filter Country to exactly Japan and Korea. The task will finish automatically when done.
  ui_copy: In the Accounts grid, scroll to the Country column, open its column menu, and filter Country to exactly Japan and Korea. The task will finish automatically when done.
  setup_description: |-
    A nested_scroll layout contains a wide MUI DataGrid Pro titled “Accounts”. Only the first several columns are visible at load; Country is off-screen to the right and requires horizontal scrolling inside the grid. Filtering is accessed from the Country header’s 3-dots column menu, and the filter panel updates the grid automatically.
    Initial state: no filters are active. The page also includes a compact summary rail and two unrelated buttons.
  scene_context:
    theme: light
    spacing: compact
    layout: nested_scroll
    placement: bottom_right
    scale: small
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: true
    confirmation_model: auto_apply
    precision_surface: discrete
    secondary_supporting_primitive: menu
  design_intent:
    active_factors:
    - internal_scroll_region
    - placement
    - secondary_supporting_primitive
    factor_rationale: The hard part is finding the hidden header and using the MUI header-menu idiom correctly once it is in view; auto-apply keeps the burden on interaction knowledge rather than a final save.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 5
      density_choice_interference: 3
      depth_layering: 4
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 2
    justification: A hidden target column plus the hover/3-dots menu pattern produces strong browse-family pressure even without a confirm step.
  success_trigger:
    human_readable:
    - 'The Accounts grid has exactly one active filter: Country in {Japan, Korea}.'
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_id: accounts
        logic_operator: OR
        column_filters:
        - column: Country
          operator: isAnyOf
          value:
          - Japan
          - Korea
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Failing to scroll far enough and filtering a different visible column.
  - Filtering to only Japan or only Korea.
  - Using the right values on the wrong field.
  - Leaving extra filters active.
  expected_interaction_path:
  - Scroll horizontally inside the grid until Country is visible.
  - Open the Country column menu from the 3-dots icon.
  - Set the Country filter to Japan and Korea exactly.
  - Verify the filter is active on Country.
  notes: The checker should interpret the MUI filter model canonically and ignore menu open/closed state.
- id: data_table_filterable-mui-v2-T09
  name: 'Drawer incidents: OR logic through filter panel'
  canonical_type: data_table_filterable
  implementation_source: mui
