- id: color_picker_2d-antd-v2-T01
  name: 'Drawer palette: set Series B to steel blue overlay'
  canonical_type: color_picker_2d
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: ColorPicker'
  task_template: confirm_cancel
  secondary_template: drag_operation
  browsergym_goal: Open the “Edit chart palette” drawer. In the Series B color picker, set the color to approximately rgba(47, 119, 150, 0.70) within ±2 on each RGB channel and ±0.02 alpha, leave Series A unchanged, and click “Save palette”. The task will finish automatically when done.
  ui_copy: Edit chart palette → Series B ≈ rgba(47, 119, 150, 0.70); keep Series A unchanged; Save palette.
  setup_description: A dark analytics page contains a compact chart card and a button labeled “Edit chart palette”. Clicking it opens a right-side drawer. Inside the drawer are two small Ant Design ColorPicker triggers labeled “Series A” and “Series B”. Each trigger opens the standard ColorPicker popover with a 2D saturation/value surface, hue slider, and alpha slider; preset swatches are disabled. A live draft preview line under each label shows the current rgba(...) value, but the committed chart updates only after the drawer footer button “Save palette” is clicked. Initial committed values are Series A = rgba(22,119,255,1.0) and Series B = rgba(140,140,140,1.0).
  scene_context:
    theme: dark
    spacing: compact
    layout: drawer_flow
    placement: top_right
    scale: small
    instances: 2
    guidance: text
    clutter: medium
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - instances
    - overlay_model
    - confirmation_model
    factor_rationale: The task combines wrong-instance risk with a nested popover inside a drawer and a required Save step, so the pressure comes from choosing the correct picker, manipulating a multi-axis color state, and confirming the committed result.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 5
      target_acquisition: 4
      density_choice_interference: 2
      depth_layering: 4
      feedback_dynamics: 4
      semantic_observability: 4
      disambiguation_load: 5
    justification: Series B requires coordinated hue, saturation, brightness, and alpha adjustment inside a nested overlay, and the drawer keeps draft and committed states separate.
  success_trigger:
    human_readable:
    - The committed Series B value is within ±2 on each RGB channel and ±0.02 alpha of rgba(47,119,150,0.70).
    - Series A remains unchanged.
    - The drawer-local “Save palette” control has been clicked.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        color:
          space: rgba
          r: 47
          g: 119
          b: 150
          a: 0.7
        saved: true
        non_target_instances_must_remain:
          Series A:
            color:
              space: rgba
              r: 22
              g: 119
              b: 255
              a: 1.0
      tolerance:
        rgba_max_abs_channel_error: 2
        alpha_max_abs_error: 0.02
      require_confirm: true
      confirm_control: Save palette
      require_correct_instance: true
      target_instance_label_or_id: Series B
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Editing Series A instead of Series B.
  - Getting the draft value correct but closing the drawer or leaving without clicking “Save palette”.
  - Changing Series B alpha correctly while leaving the RGB channels outside tolerance.
  - Changing both series colors.
  expected_interaction_path:
  - Open the drawer.
  - Open Series B.
  - Use hue, 2D surface, and alpha slider to move Series B near the target value.
  - Verify Series A is unchanged and click “Save palette”.
  notes: Bind the checker to committed drawer state, not the live draft preview.
- id: color_picker_2d-antd-v2-T02
  name: 'Dashboard chart card: match Series B reference only'
  canonical_type: color_picker_2d
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: ColorPicker'
  task_template: match_reference
  secondary_template: null
  browsergym_goal: In the chart styling panel, adjust only the Series B color picker so that it matches the on-page Series B reference chip as closely as possible; the checker uses ±20 on each RGB channel and ±0.05 alpha. Do not change Series A or Series C. The task will finish automatically when done.
  ui_copy: Chart styling panel → Series B should match the Series B reference chip; leave A and C unchanged.
  setup_description: A dashboard panel titled “Chart styling” sits off-center with high clutter from metric chips, a legend card, and two non-target dropdowns. Three Ant Design ColorPicker triggers labeled “Series A”, “Series B”, and “Series C” are stacked in the panel. Each row also contains a small static reference chip, but only the Series B row is the target. Opening a trigger reveals the standard AntD popover with a 2D surface, hue slider, and alpha slider; no preset swatches are available. Changes auto-apply immediately to the live chart and the row chip, with no extra save button.
  scene_context:
    theme: light
    spacing: compact
    layout: dashboard_panel
    placement: off_center
    scale: small
    instances: 3
    guidance: mixed
    clutter: high
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: auto_apply
    precision_surface: mixed
    secondary_supporting_primitive: popover
  design_intent:
    active_factors:
    - instances
    - clutter
    - placement
    factor_rationale: The target is one of three visually similar rows embedded in a busy dashboard panel, so the difficulty comes from disambiguating the correct instance and using the popover controls without a separate confirmation safety net.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 5
    justification: 'This is primarily a grounding-heavy task: three similar instances, high clutter, and a visual reference target all amplify the cost of touching the wrong picker.'
  success_trigger:
    human_readable:
    - The final Series B color matches the Series B reference chip within ±20 RGB per channel and ±0.05 alpha.
    - Series A and Series C remain unchanged.
    - No extra confirmation is required; the final live state is checked.
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        reference_swatch_id: series-b-reference-chip
        auto_applied: true
      tolerance:
        rgba_max_abs_channel_error: 20
        alpha_max_abs_error: 0.05
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Series B
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Editing Series A or Series C instead of Series B.
  - Matching the wrong reference chip.
  - Closing the popover with Series B still outside tolerance.
  - Changing more than one series.
  expected_interaction_path:
  - Locate the Series B row.
  - Open its popover.
  - Adjust the color until the live chip matches the reference chip.
  - Leave Series A and C untouched.
  notes: Use computed color from the row-level reference chip for checking.
- id: color_picker_2d-antd-v2-T03
  name: 'Modal theme draft: header tint visual correction'
  canonical_type: color_picker_2d
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: ColorPicker'
  task_template: confirm_cancel
  secondary_template: match_reference
  browsergym_goal: Click “Customize shell”. In the dialog, adjust only the Header tint color picker until the Current preview matches the Target preview as closely as possible; the checker uses ±20 on each RGB channel and ±0.05 alpha. Leave Sidebar tint unchanged, then click “Apply shell”. The task will finish automatically when done.
  ui_copy: Customize shell → Header tint should match Target preview; leave Sidebar tint unchanged; Apply shell.
  setup_description: A settings page shows a single button “Customize shell”. Clicking it opens a modal dialog with two Ant Design ColorPickers labeled “Header tint” and “Sidebar tint”. Each opens the standard popover with the 2D surface, hue slider, and alpha slider. The dialog also shows two preview strips labeled “Current” and “Target” for the Header tint only; no numeric text is shown for the target. The dialog footer has “Cancel” and “Apply shell”. Draft changes update the Current preview immediately, but the committed page shell updates only after “Apply shell”.
  scene_context:
    theme: light
    spacing: compact
    layout: modal_flow
    placement: center
    scale: default
    instances: 2
    guidance: visual
    clutter: medium
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: dialog
  design_intent:
    active_factors:
    - overlay_model
    - confirmation_model
    - instances
    factor_rationale: The dialog nests the picker popover inside a draft-vs-committed workflow and pairs it with a non-target sibling picker, which turns a simple color drag into a layered verification problem.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 3
      density_choice_interference: 2
      depth_layering: 4
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 4
    justification: The visual target keeps the task human-solvable, but the nested overlay and commit semantics make it easy to stop in the draft state or edit the wrong tint.
  success_trigger:
    human_readable:
    - The committed Header tint matches the Target preview within ±20 RGB per channel and ±0.05 alpha.
    - Sidebar tint remains unchanged.
    - The modal “Apply shell” control has been clicked.
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        reference_swatch_id: header-target-preview
        saved: true
        non_target_instances_must_remain:
          Sidebar tint: initial
      tolerance:
        rgba_max_abs_channel_error: 20
        alpha_max_abs_error: 0.05
      require_confirm: true
      confirm_control: Apply shell
      require_correct_instance: true
      target_instance_label_or_id: Header tint
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Matching the target in the draft preview but dismissing the dialog without applying.
  - Changing Sidebar tint instead of Header tint.
  - Getting only alpha or only hue close while the final color remains outside tolerance.
  - Clicking Cancel.
  expected_interaction_path:
  - Open the shell dialog.
  - Open Header tint.
  - Adjust until Current matches Target.
  - Click “Apply shell”.
  notes: Check the committed shell token outside the dialog, not the transient modal draft.
