- id: mentions_input-antd-v2-T01
  name: 'Routing drawer: escalate internal note to two owners'
  canonical_type: mentions_input
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Mentions inside Drawer'
  task_template: select_many
  secondary_template: confirm_cancel
  browsergym_goal: 'Open the "Edit routing note" drawer. In the Internal note field, mention Ava Chen and Ethan Brooks by selecting them from the @ suggestions so the field becomes exactly: "Escalate to @Ava Chen and @Ethan Brooks before 5 PM." Do not change Customer reply. Then click "Apply note". The task will finish automatically when done.'
  ui_copy: 'Open the "Edit routing note" drawer. In the Internal note field, mention Ava Chen and Ethan Brooks by selecting them from the @ suggestions so the field becomes exactly: "Escalate to @Ava Chen and @Ethan Brooks before 5 PM." Do not change Customer reply. Then click "Apply note". The task will finish automatically when done.'
  setup_description: |-
    The page shows a support dashboard with a ticket summary card, a status timeline, and a button labeled "Edit routing note". Clicking it opens a right-side Drawer.
    Inside the drawer are two Ant Design Mentions fields with identical chrome and helper text:
    - Customer reply (distractor), initially: "We are investigating the incident."
    - Internal note (target), initially empty.
    Both fields open a mentions popup on "@" and share the same 12-person list: Liam Ortiz, Noah Patel, Priya Singh, Emma Johnson, Maya Rivera, Olivia Kim, Ava Chen, Sophia Nguyen, Carlos Reyes, Ethan Brooks, Isabella Garcia, Jun Ito.
    Each field has its own "Detected mentions" line. The drawer footer has "Cancel" and "Apply note". Only the Internal note should change, and the drawer does not commit edits until "Apply note" is clicked.
  scene_context:
    theme: light
    spacing: compact
    layout: drawer_flow
    placement: off_center
    scale: default
    instances: 2
    guidance: text
    clutter: medium
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: mixed
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - instances
    - layout
    - confirmation_model
    factor_rationale: Two visually similar mentions fields live inside a drawer, so the task forces the agent to resolve the correct instance, complete two suggestion insertions, and pair the final text with the correct local Apply control.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 4
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 5
    justification: This is hard because the correct text depends on two true mention selections inside a nested overlay, and the wrong sibling field and wrong drawer button remain plausible mistakes.
  success_trigger:
    human_readable:
    - The target mentions field content equals the required final text after whitespace normalization.
    - The committed mention set is exactly [Ava Chen, Ethan Brooks].
    - The correct instance is "Internal note", and non-target instances remain unchanged.
    - The required confirmation control "Apply note" has been used.
    canonical_predicate:
      predicate_type: equals
      target_state:
        text: Escalate to @Ava Chen and @Ethan Brooks before 5 PM.
        mentions:
        - id: ava
          label: Ava Chen
        - id: ethan
          label: Ethan Brooks
        saved: true
        non_target_instances_must_remain:
          Customer reply: We are investigating the incident.
      tolerance:
        normalize_whitespace: true
        ignore_trailing_whitespace: true
        require_mention_selection_event: true
      require_confirm: true
      confirm_control: Apply note
      require_correct_instance: true
      target_instance_label_or_id: Internal note
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Editing Customer reply instead of Internal note.
  - Selecting the two correct people but forgetting to click "Apply note".
  - Typing the names as plain text without recording mention selections.
  - Changing punctuation, time, or any other words in the target sentence.
  expected_interaction_path:
  - Open the drawer.
  - Focus Internal note and insert Ava Chen and Ethan Brooks from the suggestions list.
  - Leave Customer reply unchanged.
  - Click "Apply note".
  notes: Use AntD Mentions selected-option state plus committed drawer state for checking. The popup should remain scoped to the focused field.
