- id: slider_single-antd-v2-T01
  name: 'Drawer alert tuning: set Secondary to 4 and apply'
  canonical_type: slider_single
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Slider inside Drawer'
  task_template: confirm_cancel
  secondary_template: set_scalar
  browsergym_goal: Open “Notification tuning”. In the drawer, set the slider labeled “Secondary alert level” to 4, leave “Primary
    alert level” unchanged, and click “Apply changes”. The task will finish automatically when done.
  ui_copy: Open “Notification tuning”. In the drawer, set the slider labeled “Secondary alert level” to 4, leave “Primary
    alert level” unchanged, and click “Apply changes”. The task will finish automatically when done.
  setup_description: 'Layout uses drawer_flow with compact spacing, medium clutter, and an off-center right drawer. The page
    background contains a notifications dashboard with status chips, a muted activity list, and a read-only summary card.
    Clicking “Notification tuning” opens a Drawer containing two Ant Design sliders with the same 1–5 scale and small readouts:
    “Primary alert level” starts at 2 and “Secondary alert level” starts at 1. A drawer footer contains “Cancel” and “Apply
    changes”. Slider changes are pending until Apply changes is clicked.'
  scene_context:
    theme: light
    spacing: compact
    layout: drawer_flow
    placement: off_center
    scale: default
    instances: 2
    guidance: none
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: continuous_1d
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - instances
    - confirmation_model
    - layout
    factor_rationale: Two nearly identical sliders inside a drawer create wrong-instance and draft-versus-commit pressure
      without making the semantics artificial.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 2
      depth_layering: 3
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 5
    justification: The target value is simple, but selecting the correct slider in a drawer and explicitly committing the
      change produces strong disambiguation and feedback pressure.
  success_trigger:
    human_readable:
    - The committed value of “Secondary alert level” equals 4.
    - The committed value of “Primary alert level” remains 2.
    - The drawer footer control “Apply changes” has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        value: 4
        saved: true
        target_instance: Secondary alert level
        non_target_instances_must_remain:
          Primary alert level: 2
      tolerance: 0
      require_confirm: true
      confirm_control: Apply changes
      require_correct_instance: true
      target_instance_label_or_id: Secondary alert level
      terminal_condition: task ends when predicate holds
      state_scope: committed
  negative_cases:
  - Setting Primary alert level to 4 instead of Secondary.
  - Setting Secondary to 4 but closing the drawer or clicking Cancel instead of Apply changes.
  - Changing both sliders.
  expected_interaction_path:
  - Open the drawer from “Notification tuning”.
  - Adjust only the Secondary alert level slider to 4.
  - Click “Apply changes” and verify the committed summary updates.
  notes: Checker should validate the committed post-Apply state, not the transient in-overlay value.
- id: slider_single-antd-v2-T02
  name: EU row tax rate in a dense table
  canonical_type: slider_single
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Slider in Table row'
  task_template: table_operation
  secondary_template: confirm_cancel
  browsergym_goal: In the “Tax overrides” table, set the slider in the “EU / Tax rate” row to 18, leave the other rows unchanged,
    and click “Save” in the EU row. The task will finish automatically when done.
  ui_copy: In the “Tax overrides” table, set the slider in the “EU / Tax rate” row to 18, leave the other rows unchanged,
    and click “Save” in the EU row. The task will finish automatically when done.
  setup_description: 'Layout uses table_cell with compact spacing, small scale, bottom-right placement, and high clutter.
    A dense card titled “Tax overrides” contains a table with three rows: US, EU, and APAC. Each row has a small Ant Design
    slider labeled “Tax rate”, a numeric readout, and a row-local Save button. Initial values are US=7, EU=12, APAC=10. Column
    headers, search, and export controls add realistic clutter. Only the EU row should change, and only the EU row Save button
    commits that row.'
  scene_context:
    theme: light
    spacing: compact
    layout: table_cell
    placement: bottom_right
    scale: small
    instances: 3
    guidance: none
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: continuous_1d
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - layout
    - instances
    - scale
    factor_rationale: Small table-cell sliders and row-local save controls create strong wrong-row risk and make target acquisition
      meaningfully harder.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 5
    justification: 'This is primarily a grounding and row-scoped commit task: the agent must find the correct small slider,
      set the exact value, and save only that row.'
  success_trigger:
    human_readable:
    - The committed value in the “EU / Tax rate” row equals 18.
    - The committed values in the US and APAC rows remain 7 and 10.
    - The EU row Save control has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        value: 18
        unit: '%'
        saved: true
        target_instance: EU / Tax rate
        non_target_instances_must_remain:
          US / Tax rate: 7
          APAC / Tax rate: 10
      tolerance: 0
      require_confirm: true
      confirm_control: save-eu-tax-rate
      require_correct_instance: true
      target_instance_label_or_id: EU / Tax rate
      terminal_condition: task ends when predicate holds
      state_scope: committed
  negative_cases:
  - Setting US or APAC to 18 instead of EU.
  - Dragging EU to 18 but clicking Save in the wrong row.
  - Changing other rows while saving EU.
  expected_interaction_path:
  - Locate the EU row in the table.
  - Adjust its Tax rate slider to 18 using the row readout as verification.
  - Click Save in the EU row only.
  notes: Checker should validate the committed post-Apply state, not the transient in-overlay value.
- id: slider_single-antd-v2-T03
  name: Match the recommendations gauge in a cluttered dashboard
  canonical_type: slider_single
  implementation_source: antd
  implementation_variant: visual_reference
  implementation_component: 'AntD: Slider with adjacent reference gauge'
  task_template: match_reference
  secondary_template: null
  browsergym_goal: In the dashboard, set the slider labeled “Recommendations similarity threshold” to match the reference
    gauge within ±0.01. Do not adjust the “Search similarity threshold” slider. The task will finish automatically when done.
  ui_copy: In the dashboard, set the slider labeled “Recommendations similarity threshold” to match the reference gauge within
    ±0.01. Do not adjust the “Search similarity threshold” slider. The task will finish automatically when done.
  setup_description: 'Layout uses dashboard_panel with compact spacing, bottom-right placement, two slider cards, and high
    clutter from KPI cards, mini charts, and legend pills. The target card contains an Ant Design slider labeled “Recommendations
    similarity threshold”; a sibling card contains “Search similarity threshold”. Both sliders share the same 0.00–1.00 scale
    with step 0.01 and hidden marks. A small reference gauge inside the target card indicates the goal visually. Recommendations
    starts at 0.70; the reference corresponds to 0.83. During interaction a tooltip appears, and after release the card shows
    a tiny persistent line reading “Current: 0.xx”.'
  scene_context:
    theme: light
    spacing: compact
    layout: dashboard_panel
    placement: bottom_right
    scale: default
    instances: 2
    guidance: visual
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: none
    precision_surface: mixed
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - guidance
    - clutter
    factor_rationale: The target is specified visually while a sibling slider with the same scale sits nearby in a cluttered
      dashboard, so the task stresses correct-card selection and post-drag verification.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 5
      target_acquisition: 3
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 5
    justification: A fine-grained slider becomes hard when the target is visual-only, the state feedback is delayed until
      after release, and a near-identical sibling slider is present.
  success_trigger:
    human_readable:
    - The value of “Recommendations similarity threshold” is within ±0.01 of 0.83.
    - The value of “Search similarity threshold” remains at its initial value.
    - No extra confirmation is required.
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        reference_id: ref-recommendations-similarity
        value: 0.83
        unit: ratio
      tolerance: 0.01
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Recommendations similarity threshold
      terminal_condition: task ends when predicate holds
      state_scope: committed
  negative_cases:
  - Adjusting the Search similarity threshold instead of Recommendations.
  - Stopping at 0.81 or 0.85 or any value outside ±0.01 for Recommendations.
  - Matching the gauge transiently but releasing at the wrong value.
  expected_interaction_path:
  - Locate the Recommendations card, not the Search card.
  - Use the reference gauge to approximate the target and refine with the Current readout.
  - Release only when the Recommendations value is within ±0.01 of 0.83.
  notes: Checker should read the slider's controlled value and instance label from wrapper state, not from transient hover
    labels alone.
