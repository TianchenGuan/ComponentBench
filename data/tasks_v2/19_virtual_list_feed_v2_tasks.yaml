- id: virtual_list-antd-v2-T01
  name: 'Reviewer drawer: exact duplicate assignee and confirm'
  canonical_type: virtual_list
  implementation_source: antd
  implementation_variant: composite_rc_virtual_list
  implementation_component: 'AntD: Drawer + List chrome + @rc-component/virtual-list [composite]'
  task_template: open_and_select
  secondary_template: null
  browsergym_goal: Open the “Assign reviewer” drawer. In the Reviewer list, select “APR-0204 — Diego Alvarez (Data)”—not the
    other Diego Alvarez row—then click “Assign reviewer”. The task will finish automatically when done.
  ui_copy: Open the “Assign reviewer” drawer. In the Reviewer list, select “APR-0204 — Diego Alvarez (Data)”—not the other
    Diego Alvarez row—then click “Assign reviewer”. The task will finish automatically when done.
  setup_description: 'Layout uses drawer_flow with compact spacing and medium clutter. The page shows a release checklist
    card, status chips, and a small owner summary. Clicking “Assign reviewer” opens a right-side Ant Design Drawer. Inside
    the drawer is one virtualized reviewer list built with @rc-component/virtual-list and styled like an AntD List. The list
    shows about 10 rows at once and a sticky footer that updates as you scroll, for example “Visible 241–252 of 1200”.

    The drawer contains repeated display names on purpose: there is both “APR-0041 — Diego Alvarez (Infra)” and “APR-0204
    — Diego Alvarez (Data)”. The correct row is not in the initial viewport. Clicking a row makes it the pending single selection,
    but the assignment is not committed until the drawer-local button “Assign reviewer” is clicked.'
  scene_context:
    theme: light
    spacing: compact
    layout: drawer_flow
    placement: top_right
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - overlay_model
    - internal_scroll_region
    - confirmation_model
    factor_rationale: This keeps the target semantics simple but makes the agent prove it can bind to the drawer’s inner viewport,
      distinguish duplicate names by ID and department, and then commit the selection with the drawer-local action.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 3
    justification: The target is textually precise, but the hard part is acquiring the correct inner scroll region inside
      the drawer, disambiguating a duplicated name, and finishing the explicit commit step.
  success_trigger:
    human_readable:
    - The committed single selection equals `apr-0204`.
    - The required local confirmation/apply control has been clicked.
    - The overlay is closed at terminal state.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selection_mode: single
        selected_item_key: apr-0204
        saved: true
        overlay_open: false
      tolerance: null
      require_confirm: true
      confirm_control: Assign reviewer
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting the other Diego Alvarez row instead of APR-0204.
  - Making APR-0204 the pending selection but not clicking “Assign reviewer”.
  - Scrolling the page or background card instead of the drawer list.
  - Selecting any other reviewer with department Data but the wrong ID.
  expected_interaction_path:
  - Open the drawer.
  - Scroll inside the reviewer list until APR-0204 is visible.
  - Select APR-0204 — Diego Alvarez (Data).
  - Click “Assign reviewer”.
  notes: Instrument stable per-instance keys, viewport range/loaded counters, and committed selection or toggle state on the
    wrapper. Check correct-instance scope explicitly; do not credit offscreen mounted rows or pending uncommitted state.
- id: virtual_list-antd-v2-T02
  name: 'Primary reviewers: filter then activate result and apply'
  canonical_type: virtual_list
  implementation_source: antd
  implementation_variant: composite_rc_virtual_list
  implementation_component: 'AntD: Card + Input.Search + @rc-component/virtual-list [composite]'
  task_template: search_and_select
  secondary_template: null
  browsergym_goal: In the “Primary reviewers” list, use the filter box to find “KEY-7F2A — Analytics”, select that row, and
    click “Apply reviewers”. Do not change the “Watchers” list. The task will finish automatically when done.
  ui_copy: In the “Primary reviewers” list, use the filter box to find “KEY-7F2A — Analytics”, select that row, and click
    “Apply reviewers”. Do not change the “Watchers” list. The task will finish automatically when done.
  setup_description: 'Layout is settings_panel with compact spacing, off-center placement, and high clutter. The page includes
    unrelated toggles, a severity select, and a rollout summary. In the main panel there are two side-by-side virtualized
    lists: “Primary reviewers” and “Watchers”. Each card has its own small filter input and its own footer state.

    The target card is “Primary reviewers”. Typing into its filter narrows the list but does not auto-select any row. The
    matching result “KEY-7F2A — Analytics” is not initially visible before filtering. The second list “Watchers” contains
    similar analytics-related names and must remain unchanged. The panel-level button “Apply reviewers” commits the Primary
    reviewers selection.'
  scene_context:
    theme: light
    spacing: compact
    layout: settings_panel
    placement: off_center
    scale: small
    instances: 2
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - clutter
    - confirmation_model
    factor_rationale: 'The filter is only a precursor, not the completion event: the task stays hard because the agent must
      use the correct filter, activate the correct resulting row, leave the sibling list untouched, and then apply the state.'
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 4
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 5
    justification: 'This is a strong wrong-instance and post-filter activation test: the filter narrows the space, but the
      target still has to be selected and committed in the correct card.'
  success_trigger:
    human_readable:
    - In the target virtual list instance, the committed single selection equals `key-7f2a`.
    - The local apply/save control has been clicked after selection.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selection_mode: single
        selected_item_key: key-7f2a
        saved: true
      tolerance: null
      require_confirm: true
      confirm_control: Apply reviewers
      require_correct_instance: true
      target_instance_label_or_id: Primary reviewers
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Typing into the Watchers filter instead of the Primary reviewers filter.
  - Filtering until KEY-7F2A is visible but never selecting it.
  - Selecting the right row but not clicking “Apply reviewers”.
  - Changing the Watchers selection or applying a different analytics row.
  expected_interaction_path:
  - Find the Primary reviewers card.
  - Use its filter box to narrow the list to KEY-7F2A — Analytics.
  - Select the KEY-7F2A row.
  - Click “Apply reviewers”.
  notes: Instrument stable per-instance keys, viewport range/loaded counters, and committed selection or toggle state on the
    wrapper. Check correct-instance scope explicitly; do not credit offscreen mounted rows or pending uncommitted state.
- id: virtual_list-antd-v2-T03
  name: 'Dashboard triage: choose the alert row, not the overlapping task ID'
  canonical_type: virtual_list
  implementation_source: antd
  implementation_variant: composite_rc_virtual_list
  implementation_component: 'AntD: Dashboard cards + @rc-component/virtual-list [composite]'
  task_template: select_one
  secondary_template: null
  browsergym_goal: On the dashboard, in the “Alerts” list, select “ALERT-0923 — Password expired” and then click “Save alert
    focus”. Do not act in “Tasks” or “Messages”. The task will finish automatically when done.
  ui_copy: On the dashboard, in the “Alerts” list, select “ALERT-0923 — Password expired” and then click “Save alert focus”.
    Do not act in “Tasks” or “Messages”. The task will finish automatically when done.
  setup_description: 'Layout is dashboard_panel with compact spacing, top-left placement, and high clutter. Three narrow cards
    share the page: “Alerts”, “Tasks”, and “Messages”. Each card contains its own virtualized list with an independent scrollbar
    and a small footer that shows the current selection for that card. The dashboard header also contains KPI tiles and two
    non-functional controls.

    IDs overlap numerically across the cards: for example, there is a “TASK-0923” row in the Tasks list. The Alerts card is
    the target. All lists start near the top and the target alert is offscreen. Selection is pending until the Alerts-card
    button “Save alert focus” is clicked.'
  scene_context:
    theme: dark
    spacing: compact
    layout: dashboard_panel
    placement: top_left
    scale: small
    instances: 3
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - placement
    - clutter
    factor_rationale: Three nearly identical panes with overlapping numeric IDs create a clean disambiguation problem; the
      explicit save step then checks whether the agent tracked the right card state rather than any plausible nearby row.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 4
      density_choice_interference: 4
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 5
    justification: The label is explicit, but overlapping IDs, three independent viewports, and a card-local save control
      make this a hard multi-pane grounding task.
  success_trigger:
    human_readable:
    - In the target virtual list instance, the selected row equals `alert-0921`.
    - The local confirmation/apply control has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selection_mode: single
        selected_item_key: alert-0921
        saved: true
      tolerance: null
      require_confirm: true
      confirm_control: Save alert focus
      require_correct_instance: true
      target_instance_label_or_id: Alerts
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting TASK-0923 or any other row outside the Alerts card.
  - Selecting ALERT-0923 but saving from the wrong card or not saving at all.
  - Making the Alerts target visible without actually selecting it.
  - Changing the Tasks or Messages cards instead of Alerts.
  expected_interaction_path:
  - Locate the Alerts card.
  - Scroll within the Alerts list until ALERT-0923 is visible.
  - Select ALERT-0923 — Password expired.
  - Click “Save alert focus” in the Alerts card.
  notes: Instrument stable per-instance keys, viewport range/loaded counters, and committed selection or toggle state on the
    wrapper. Check correct-instance scope explicitly; do not credit offscreen mounted rows or pending uncommitted state.
- id: virtual_list-antd-v2-T04
  name: 'Permissions dialog: exact four-item set in dense list'
  canonical_type: virtual_list
  implementation_source: antd
  implementation_variant: composite_rc_virtual_list
  implementation_component: 'AntD: Modal + Checkbox rows + @rc-component/virtual-list [composite]'
  task_template: select_many
  secondary_template: null
  browsergym_goal: 'Open “Edit permissions”. In the Permissions list, check exactly these four items: PERM-013 SSO config,
    PERM-027 View report templates, PERM-031 API access, and PERM-044 View dashboards. Check no others, then click “Apply permissions”.
    The task will finish automatically when done.'
  ui_copy: 'Open “Edit permissions”. In the Permissions list, check exactly these four items: PERM-013 SSO config, PERM-027
    View report templates, PERM-031 API access, and PERM-044 View dashboards. Check no others, then click “Apply permissions”. The task
    will finish automatically when done.'
  setup_description: 'Layout is modal_flow with compact spacing, bottom-left placement, and medium clutter. Clicking “Edit
    permissions” opens an Ant Design Modal containing one dense virtualized checkbox list of about 600 permission rows. Only
    12 rows are visible at a time. A sticky header updates as you scroll and counts pending selections, for example “Selected:
    2”.

    The required permission rows are separated in the list and some near neighbors are confusable, such as “View report templates”
    and “Edit report templates”. Changes are not committed until the modal footer button “Apply permissions” is clicked.'
  scene_context:
    theme: light
    spacing: compact
    layout: modal_flow
    placement: bottom_left
    scale: small
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: dialog
  design_intent:
    active_factors:
    - spacing
    - internal_scroll_region
    - confirmation_model
    factor_rationale: 'A dense checkbox list turns exact-set selection into a real interaction test: the agent must navigate
      the long inner viewport, avoid near-label distractors, and verify the committed set through the dialog-local apply action.'
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 4
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 2
    justification: The exact-set requirement is unforgiving, and compact checkbox rows inside a modal push both target acquisition
      and commit verification upward.
  success_trigger:
    human_readable:
    - The committed checked-item set equals the required set exactly.
    - The required apply/save control has been clicked.
    canonical_predicate:
      predicate_type: set_equals
      target_state:
        selection_mode: multiple
        selected_item_keys:
        - perm-013
        - perm-027
        - perm-031
        - perm-044
        saved: true
      tolerance: null
      require_confirm: true
      confirm_control: Apply permissions
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Checking any extra permission beyond the required four.
  - Missing one of the required permissions.
  - Selecting a nearby report-template permission instead of the exact code.
  - Getting the pending set right but closing the modal or not clicking “Apply permissions”.
  expected_interaction_path:
  - Open the permissions modal.
  - Scroll within the virtualized permission list to locate each required code.
  - Check exactly the four required rows.
  - Click “Apply permissions”.
  notes: Instrument stable per-instance keys, viewport range/loaded counters, and committed selection or toggle state on the
    wrapper. Check correct-instance scope explicitly; do not credit offscreen mounted rows or pending uncommitted state.
- id: virtual_list-antd-v2-T05
  name: 'Artifact browser: scroll inside the browser, pin the exact row, then save'
  canonical_type: virtual_list
  implementation_source: antd
  implementation_variant: composite_rc_virtual_list
  implementation_component: 'AntD: Nested panel + row actions + @rc-component/virtual-list [composite]'
  task_template: toggle_state
  secondary_template: null
  browsergym_goal: In the “Artifact browser” list, scroll inside the browser until “AST-148 — Migration log” is visible, turn
    on its “Pinned” row action, and then click “Save pins”. The task will finish automatically when done.
  ui_copy: In the “Artifact browser” list, scroll inside the browser until “AST-148 — Migration log” is visible, turn on its
    “Pinned” row action, and then click “Save pins”. The task will finish automatically when done.
  setup_description: 'Layout is nested_scroll with compact spacing, bottom-right placement, and high clutter. The page contains
    a page-level scroll region with breadcrumbs, a filter toolbar, and a metadata card. Inside the right pane sits the target
    “Artifact browser”, which has its own fixed-height virtualized list and its own scrollbar. A footer shows the current
    viewport range, for example “Visible 97–108 of 500”.

    Each row has a small trailing “Pinned” toggle. The target row AST-148 is not visible initially. Toggling a pin marks the
    row as pending only; the pane-local button “Save pins” commits the pinned set.'
  scene_context:
    theme: light
    spacing: compact
    layout: nested_scroll
    placement: bottom_right
    scale: small
    instances: 1
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - layout
    - internal_scroll_region
    - confirmation_model
    factor_rationale: 'This isolates the scroll-owner problem that v1 exposed: the page has its own scroll, but only the browser
      pane should move. The row-level toggle plus save step forces the agent to verify the right row in the right viewport.'
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 2
    justification: Nested scrolling and a small row-end action make this substantially harder than a plain selection list,
      especially because the pin state is not committed until saved.
  success_trigger:
    human_readable:
    - The row-level toggle is set to the requested value for the required item.
    - The local apply/save control has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        item_key: ast-148
        toggle_name: Pinned
        toggle_value: true
        saved: true
      tolerance: null
      require_confirm: true
      confirm_control: Save pins
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Scrolling the page instead of the Artifact browser pane.
  - Pinning a different artifact row.
  - Turning the correct row on but not clicking “Save pins”.
  - Changing any other pin state while leaving AST-148 off.
  expected_interaction_path:
  - Focus the Artifact browser viewport.
  - Scroll within it until AST-148 — Migration log is visible.
  - Turn on the Pinned action for AST-148.
  - Click “Save pins”.
  notes: Instrument stable per-instance keys, viewport range/loaded counters, and committed selection or toggle state on the
    wrapper. Check correct-instance scope explicitly; do not credit offscreen mounted rows or pending uncommitted state.
