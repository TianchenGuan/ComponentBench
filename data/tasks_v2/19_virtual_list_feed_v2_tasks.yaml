- id: feed_infinite_scroll-mantine-v2-T07
  name: 'Approvals feed: open the target row and save the decision'
  canonical_type: feed_infinite_scroll
  implementation_source: mantine
  implementation_variant: composite_scrollarea_feed
  implementation_component: 'Mantine: card feed + ScrollArea + inline expansion [composite]'
  task_template: select_one
  secondary_template: null
  browsergym_goal: In the “Approvals” feed, scroll until “APR-063 — Rollback requested” is visible, open that row so its details
    are expanded, and click “Save approval decision”. The task will finish automatically when done.
  ui_copy: In the “Approvals” feed, scroll until “APR-063 — Rollback requested” is visible, open that row so its details are
    expanded, and click “Save approval decision”. The task will finish automatically when done.
  setup_description: 'Layout is settings_panel with compact spacing, off-center placement, and medium clutter. The target
    card “Approvals” sits beside unrelated settings controls. The feed uses ScrollArea, loads more rows on scroll, and reveals
    an inline details block when a row is opened. A small status chip above the feed shows the currently open item.

    The target APR-063 is below the fold. Opening it only changes the active row; the card action “Save approval decision”
    commits the selected row state.'
  scene_context:
    theme: light
    spacing: compact
    layout: settings_panel
    placement: off_center
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: none
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - internal_scroll_region
    - confirmation_model
    - clutter
    factor_rationale: 'This is a select-then-save feed task rather than a trivial expand action: the open row has to be tracked
      through the explicit card-local commit step.'
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 2
    justification: The target semantics are simple, but the internal viewport and explicit save boundary make state tracking
      nontrivial.
  success_trigger:
    human_readable:
    - The selected expanded row equals the requested item.
    - The local confirmation/apply control has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        active_item_id: APR-063
        expanded: true
        saved: true
      tolerance: null
      require_confirm: true
      confirm_control: Save approval decision
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Opening a different approval row.
  - Making APR-063 visible but not expanding it.
  - Expanding APR-063 but not clicking “Save approval decision”.
  - Interacting with nearby settings controls instead of the feed.
  expected_interaction_path:
  - Find the Approvals card.
  - Scroll within the feed until APR-063 is visible.
  - Open APR-063 so its details expand.
  - Click “Save approval decision”.
  notes: Expose feed-local loaded counters or visible ranges, active item ids, pending vs committed state, and instance labels
    on the wrapper. Visibility must be computed relative to the feed viewport so merely loaded offscreen rows do not count
    as success.
- id: feed_infinite_scroll-mantine-v2-T08
  name: 'Four feeds: pin only the payments row in the Payments feed and save'
  canonical_type: feed_infinite_scroll
  implementation_source: mantine
  implementation_variant: composite_scrollarea_feed
  implementation_component: 'Mantine: four compact feed cards with row-end pin actions [composite]'
  task_template: toggle_state
  secondary_template: null
  browsergym_goal: In the “Payments” feed, scroll until “PAY-244 — Card retry scheduled” is visible, turn on its “Pinned”
    row action, and click “Save feed panes”. Do not change Orders, Auth, or Ops. The task will finish automatically when done.
  ui_copy: In the “Payments” feed, scroll until “PAY-244 — Card retry scheduled” is visible, turn on its “Pinned” row action,
    and click “Save feed panes”. Do not change Orders, Auth, or Ops. The task will finish automatically when done.
  setup_description: 'Layout is dashboard_panel with compact spacing, bottom_left placement, small scale, and high clutter.
    Four compact feed cards appear in a 2×2 grid: “Orders”, “Payments”, “Auth”, and “Ops”. Each card contains its own ScrollArea
    feed, tiny scrollbar, loading indicator, and footer state. Row formats are intentionally similar across cards.

    The target PAY-244 is below the fold in Payments. Each row has a small trailing “Pinned” action. Toggling it changes only
    pending state. The panel action “Save feed panes” commits the row-action states, and the other three feeds must remain
    unchanged.'
  scene_context:
    theme: dark
    spacing: compact
    layout: dashboard_panel
    placement: bottom_left
    scale: small
    instances: 4_plus
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - scale
    - clutter
    factor_rationale: 'This is the feed analogue of the hardest multi-pane virtual-list tasks: four small independent feeds,
      repeated row structures, and a tiny row-end action combine into a strong wrong-pane and state-tracking challenge.'
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 5
      density_choice_interference: 4
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 5
    justification: The state is discrete, but the correct pane and correct row-end action are hard to acquire and preserve
      in a four-feed compact dashboard.
  success_trigger:
    human_readable:
    - Within the target feed instance, the row-level toggle has the requested value for the required item.
    - The local apply/save control has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        item_id: PAY-244
        toggle_name: Pinned
        toggle_value: true
        saved: true
      tolerance: null
      require_confirm: true
      confirm_control: Save feed panes
      require_correct_instance: true
      target_instance_label_or_id: Payments
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Pinning any row outside the Payments feed.
  - Changing more than the Payments feed before saving.
  - Making PAY-244 visible but leaving its Pinned action off.
  - Turning on the correct action but not clicking “Save feed panes”.
  expected_interaction_path:
  - Find the Payments feed.
  - Scroll within it until PAY-244 — Card retry scheduled is visible.
  - Turn on its Pinned row action.
  - Click “Save feed panes”.
  notes: Expose feed-local loaded counters or visible ranges, active item ids, pending vs committed state, and instance labels
    on the wrapper. Visibility must be computed relative to the feed viewport so merely loaded offscreen rows do not count
    as success.
