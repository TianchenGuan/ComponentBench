    canonical_predicate:
      predicate_type: range_contains
      target_state:
        column_widths_px_range:
          reviewer:
            min: 134
            max: 142
      tolerance:
        type: absolute_px
        value: 0
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Resizing Decision instead of Reviewer.
  - Stopping at 133 px or 143 px.
  - Opening the sort control without changing Reviewer into the target range.
  - Leaving Reviewer near its starting width.
  expected_interaction_path:
  - Locate the Review overrides mini-table.
  - Acquire the Reviewer header edge rather than the Decision edge or sort icon.
  - Drag until the monitor falls inside 134–142 px.
  - Release and verify the final range.
  notes: Use inclusive bounds. Bind the task to the lower audit matrix cell so background tables are ignored.
