  secondary_template: set_range
  browsergym_goal: In the Review overrides table, resize the “Reviewer” column so it finishes between 134 px and 142 px inclusive. Do not resize “Decision”. The task will finish automatically when done.
  ui_copy: In the Review overrides table, resize the “Reviewer” column so it finishes between 134 px and 142 px inclusive. Do not resize “Decision”. The task will finish automatically when done.
  setup_description: |-
    Layout uses table_cell with compact spacing and high clutter. The resizable table is embedded in the lower cell of a larger audit matrix, and the surrounding matrix contains non-target status badges and two unrelated dropdowns.
    Within the target mini-table, headers are Review ID, Reviewer, Decision, and Updated. The Reviewer and Decision separators sit close together, and the Reviewer header also includes a tiny sort chevron. A monitor above the mini-table reads `Reviewer width: ###px`. Reviewer starts at 176px.
  scene_context:
    theme: light
    spacing: compact
    layout: table_cell
    placement: bottom_right
    scale: small
    instances: 1
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: none
    precision_surface: continuous_1d
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - layout
    - clutter
    - scale
    factor_rationale: The target lives in a dense table-cell carrier where the wrong separator is nearby, so the task stresses local acquisition and controlled stopping rather than semantic understanding of the width goal.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 5
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 2
