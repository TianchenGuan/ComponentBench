- id: resizable_columns-antd-v2-T01
  name: 'Dense queue: resize Assignee without triggering header controls'
  canonical_type: resizable_columns
  implementation_source: antd
  implementation_variant: composite_react_resizable
  implementation_component: 'AntD: Table header cells composed with react-resizable grips plus native sorter/filter affordances'
  task_template: table_operation
  secondary_template: drag_operation
  browsergym_goal: In the Incident queue table, resize the “Assignee” column to 176 px, within ±4 px. Do not sort or filter the table. The task will finish automatically when done.
  ui_copy: In the Incident queue table, resize the “Assignee” column to 176 px, within ±4 px. Do not sort or filter the table. The task will finish automatically when done.
  setup_description: |-
    Layout uses settings_panel with compact spacing, small scale, and high clutter. A left navigation rail and two status cards sit beside the main content. The main content contains one Ant Design incident queue table with resizable header grips composed onto the right edge of each header cell.
    The target header row is deliberately crowded: the “Assignee” header has a sorter icon, a filter dropdown icon, and the thin resize grip adjacent to the same edge. A persistent width monitor above the table reads `Assignee width: ###px`. The table starts with Assignee at 132px. Other columns include Ticket, Severity, Service, Assignee, and Updated. No confirmation button is required; widths apply live.
  scene_context:
    theme: light
    spacing: compact
    layout: settings_panel
    placement: top_right
    scale: small
    instances: 1
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: none
    precision_surface: continuous_1d
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - scale
    - clutter
    - layout
    factor_rationale: The target affordance sits next to genuine header controls in a compact settings panel, so the task separates acquiring the true resize grip from merely understanding which column matters.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 5
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 2
    justification: The table state is easy to understand, but the crowded AntD header edge makes target acquisition and recovery after a near-miss meaningfully hard.
  success_trigger:
    human_readable:
    - Assignee width is within ±4px of 176px.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        column_widths_px:
          assignee: 176
      tolerance:
        type: absolute_px
        value: 4
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Opening the Assignee filter menu instead of resizing the column.
  - Sorting the table while leaving Assignee outside ±4 px.
  - Resizing Service or Updated instead of Assignee.
  - Stopping at a visually close width such as 170 px or 181 px.
  expected_interaction_path:
  - Locate the Assignee header in the incident queue.
  - Acquire the thin grip on the header edge rather than the sort or filter controls.
  - Drag until the width monitor reads about 176 px.
  - Release and verify the width without changing sort or filter state.
  notes: Read canonical width from the table state, not from rendered cell pixels. Treat sort_state and filter_state as unchanged for this task.
- id: resizable_columns-antd-v2-T02
  name: 'Drawer preview: resize Resolution in the Escalations layout and save'
  canonical_type: resizable_columns
  implementation_source: antd
  implementation_variant: composite_react_resizable
  implementation_component: 'AntD: Drawer + preview tables with react-resizable header grips'
  task_template: drag_operation
  secondary_template: confirm_cancel
  browsergym_goal: Open “Column layouts”. In the preview labeled “Secondary — Escalations”, resize the “Resolution” column to 228 px, within ±4 px, then click “Save layouts”. The task will finish automatically when done.
  ui_copy: Open “Column layouts”. In the preview labeled “Secondary — Escalations”, resize the “Resolution” column to 228 px, within ±4 px, then click “Save layouts”. The task will finish automatically when done.
  setup_description: |-
    Layout uses drawer_flow with compact spacing and medium clutter. The page shows a queue summary card and a button labeled “Column layouts”. Clicking it opens a right-side Ant Design Drawer titled “Column layouts”.
    Inside the drawer are three accordion sections, each containing a resizable preview table and its own width monitor: “Primary — Inbox”, “Secondary — Escalations”, and “Archived — Review”. Only the Secondary preview matters. The Secondary table contains Ticket, Owner, Resolution, and Age; Resolution starts at 168px. Resizing updates draft widths only. The drawer footer contains “Cancel” and “Save layouts”.
  scene_context:
    theme: light
    spacing: compact
    layout: drawer_flow
    placement: off_center
    scale: default
    instances: 3
    guidance: text
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: continuous_1d
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - instances
    - confirmation_model
    - layout
    factor_rationale: Three same-family previews inside one drawer create wrong-instance pressure, and the explicit drawer save separates drafting the right width from committing the right layout.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 4
      semantic_observability: 4
      disambiguation_load: 5
    justification: The hard part is selecting the right preview table and then remembering to save the draft, not simply dragging any visible grip.
  success_trigger:
    human_readable:
    - Resolution width is within ±4px of 228px.
    - The required "Save layouts" control has been clicked and the committed layout is saved.
    - The correct target instance is "Secondary — Escalations".
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        column_widths_px:
          resolution: 228
        saved: true
      tolerance:
        type: absolute_px
        value: 4
      require_confirm: true
      confirm_control: Save layouts
      require_correct_instance: true
      target_instance_label_or_id: Secondary — Escalations
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Resizing Resolution in Primary — Inbox or Archived — Review instead of Secondary — Escalations.
  - Achieving 228 px in draft state but closing or cancelling the drawer.
  - Saving while Resolution is outside ±4 px.
  - Resizing a non-target column such as Owner.
  expected_interaction_path:
  - Open the Column layouts drawer.
  - Expand the Secondary — Escalations preview if needed.
  - Drag the Resolution header grip until its monitor reads about 228 px.
  - Click Save layouts.
  notes: The committed layout should be stored separately from draft widths. Bind evaluation to the labeled preview section, not DOM position.
- id: resizable_columns-antd-v2-T03
  name: 'Nested scroll: find Error summary off-screen and resize it'
  canonical_type: resizable_columns
  implementation_source: antd
  implementation_variant: composite_react_resizable
  implementation_component: 'AntD: horizontally scrollable Table with react-resizable header grips'
  task_template: scroll_find
  secondary_template: drag_operation
  browsergym_goal: In the Build failures table, scroll horizontally to find the “Error summary” column, then resize it to 312 px, within ±6 px. The task will finish automatically when done.
  ui_copy: In the Build failures table, scroll horizontally to find the “Error summary” column, then resize it to 312 px, within ±6 px. The task will finish automatically when done.
  setup_description: |-
    Layout uses nested_scroll with compact spacing and medium clutter. The page has an outer scrollable main column and, inside it, a card titled “Build failures” whose table itself overflows horizontally. The table is narrower than its content and exposes a visible horizontal scrollbar.
    The leftmost columns are Job, Branch, SHA, Owner, Stage, and Duration. The target column “Error summary” starts off-screen to the right, just before “Retry hint”. Each header has a thin resize grip. A persistent monitor above the table reads `Error summary width: ###px` even when the target column is off-screen. Error summary starts at 244px.
  scene_context:
    theme: light
    spacing: compact
    layout: nested_scroll
    placement: bottom_left
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  component_context:
    overlay_model: none
    internal_scroll_region: true
    confirmation_model: none
    precision_surface: continuous_1d
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - internal_scroll_region
    - placement
    - clutter
    factor_rationale: The task forces the agent to manage a real horizontal-scroll discovery step before the resize itself, which cleanly separates finding the target header from converging on the target width.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 2
      depth_layering: 3
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 2
    justification: The off-screen target header and nested scrolling make this harder than a simple grip drag, but the persistent monitor keeps the final convergence honest and human-feasible.
  success_trigger:
    human_readable:
    - Error Summary width is within ±6px of 312px.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        column_widths_px:
          error_summary: 312
      tolerance:
        type: absolute_px
        value: 6
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Scrolling vertically or in the page without ever revealing the Error summary header.
  - Resizing Retry hint or Duration instead of Error summary.
  - Stopping outside ±6 px after the final release.
  - Dragging the scrollbar but never performing the resize.
  expected_interaction_path:
  - Move the horizontal scrollbar until Error summary is visible.
  - Acquire the Error summary resize grip.
  - Drag until the monitor shows about 312 px.
  - Release and verify the final width.
  notes: Keep the horizontal scrollbar permanently visible; do not hide it behind fades or hover-only behavior.
- id: resizable_columns-antd-v2-T04
  name: 'Middle table only: align Service and Owner to the reference ruler'
  canonical_type: resizable_columns
  implementation_source: antd
  implementation_variant: composite_react_resizable
  implementation_component: 'AntD: stacked preview tables with react-resizable header grips and reference ruler'
  task_template: match_reference
  secondary_template: table_operation
  browsergym_goal: Use the reference ruler to adjust only the middle preview table, “Regional triage”, so that the “Service” and “Owner” boundaries are each within ±6 px of the ruler. Do not change the top or bottom preview table. The task will finish automatically when done.
  ui_copy: Use the reference ruler to adjust only the middle preview table, “Regional triage”, so that the “Service” and “Owner” boundaries are each within ±6 px of the ruler. Do not change the top or bottom preview table. The task will finish automatically when done.
  setup_description: |-
    Layout uses dashboard_panel with compact spacing and medium clutter. A dashboard card titled “Preview layouts” contains three same-width preview tables stacked vertically: “Inbox”, “Regional triage”, and “Archive”. Only the middle table should be changed.
    A colored reference ruler above the middle table marks the desired header boundaries for Ticket, Service, Owner, and Status. The UI does not show numeric target widths; only the ruler and the live alignment guides are visible. All three tables use the same grip style. The middle table starts slightly misaligned on both Service and Owner.
  scene_context:
    theme: light
    spacing: compact
    layout: dashboard_panel
    placement: off_center
    scale: default
    instances: 3
    guidance: mixed
    clutter: medium
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: none
    precision_surface: continuous_1d
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - instances
    - guidance
    - placement
    factor_rationale: This uses a visual ruler instead of direct width numbers and adds same-family distractor instances, so the task tests whether the agent can couple visual boundary matching with correct-instance control.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 5
    justification: Without per-column numbers, the agent must use visual alignment while also preserving the two non-target previews, which makes this a strong mixed grounding-plus-convergence task.
  success_trigger:
    human_readable:
    - Each named reference boundary is matched within ±6px of the reference ruler.
    - The correct target instance is "Regional triage".
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        reference_layout_id: antd_regional_triage_ruler_v2
        column_widths_px:
          service: 182
          owner: 214
      tolerance:
        type: absolute_px
        value: 6
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Regional triage
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Matching the ruler in Inbox or Archive instead of Regional triage.
  - Aligning only Service or only Owner.
  - Ending outside the ±6 px boundary tolerance even if the layout looks close.
  - Changing non-target preview tables.
  expected_interaction_path:
  - Identify the middle preview table labeled Regional triage.
  - Use the ruler to adjust the Service boundary first.
  - Adjust the Owner boundary and re-check Service because adjacent drags interact.
  - Stop when both boundaries visually align.
  notes: Reference checking should use canonical target widths and instance label binding, not pixel comparison against screenshot images.
