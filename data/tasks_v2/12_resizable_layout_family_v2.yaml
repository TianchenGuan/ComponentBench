  - Resize ID to about 84 px.
  - Resize Customer to about 206 px.
  - Resize Status to about 118 px.
  - Re-check all three monitor values and fine-adjust as needed.
  notes: Ensure consistent box sizing so width state is deterministic across browsers and zoom levels.
- id: resizable_columns-antd-v2-T06
  name: 'Audit row table-cell: keep Reviewer in the allowed range'
  canonical_type: resizable_columns
  implementation_source: antd
