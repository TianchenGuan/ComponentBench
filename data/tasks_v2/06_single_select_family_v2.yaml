- id: select_custom_single-antd-v2-T01
  name: 'Drawer state rule: set Shipping state to Wyoming and save'
  canonical_type: select_custom_single
  implementation_source: antd
  implementation_variant: non_searchable_virtualized_in_drawer
  implementation_component: 'AntD: Select'
  task_template: scroll_find
  secondary_template: confirm_cancel
  browsergym_goal: Open "Fulfillment settings". In the drawer, set the "Shipping state" dropdown to "Wyoming", do not change "Billing state", then click "Save state rules". The task will finish automatically when done.
  ui_copy: Open "Fulfillment settings". In the drawer, set the "Shipping state" dropdown to "Wyoming", do not change "Billing state", then click "Save state rules". The task will finish automatically when done.
  setup_description: 'The page uses a cluttered fulfillment dashboard with charts, KPI cards, and a search bar in the background. Clicking "Fulfillment settings" opens a right-side Ant Design Drawer. Inside the drawer are two compact Ant Design Select components of the same type: "Billing state" and "Shipping state". Both are non-searchable and render long 50-state lists with flag-style option decorations; the dropdown list has a fixed height and uses internal scrolling. "Billing state" starts at Colorado and must stay unchanged. "Shipping state" starts at Utah. The drawer footer contains "Cancel" and "Save state rules", and the committed state only updates after the save button is pressed.'
  scene_context:
    theme: light
    spacing: compact
    layout: drawer_flow
    placement: off_center
    scale: small
    instances: 2
    guidance: text
    clutter: high
  component_context:
    overlay_model: nested_overlay
    internal_scroll_region: true
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - instances
    - internal_scroll_region
    - confirmation_model
    factor_rationale: The task couples two almost identical selects inside a drawer with an internal-scrolling dropdown and a drawer-local save, so the pressure comes from wrong-instance selection, listbox-level scrolling, and commit verification rather than wording tricks.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 4
      density_choice_interference: 4
      depth_layering: 4
      feedback_dynamics: 3
      semantic_observability: 2
      disambiguation_load: 5
    justification: The target option is off-screen inside a compact dropdown, the wrong select sits directly above it, and the change is not committed until the drawer save fires.
  success_trigger:
    human_readable:
    - The Ant Design Select labeled "Shipping state" has committed selected value "Wyoming".
    - '"Billing state" remains "Colorado".'
    - The drawer-local "Save state rules" control has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_value: Wyoming
        target_instance: Shipping state
        non_target_instances_must_remain:
          Billing state: Colorado
      tolerance: null
      require_confirm: true
      confirm_control: Save state rules
      require_correct_instance: true
      target_instance_label_or_id: Shipping state
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting "Wyoming" in "Billing state" instead of "Shipping state".
  - Scrolling the page or drawer body but never scrolling the dropdown list itself.
  - Choosing a nearby late-alphabet state such as "Wisconsin" or leaving "Utah" selected.
  - Changing the correct select but not clicking "Save state rules".
  expected_interaction_path:
  - Open the Fulfillment settings drawer.
  - Open the Shipping state select and scroll inside its dropdown.
  - Choose "Wyoming" while leaving Billing state unchanged.
  - Click "Save state rules".
  notes: Instrument drawer draft value and committed value separately.
- id: select_custom_single-antd-v2-T02
  name: Clear only the Project filter and apply
  canonical_type: select_custom_single
  implementation_source: antd
  implementation_variant: allowClear_compact_filter_strip
  implementation_component: 'AntD: Select'
  task_template: clear_reset
  secondary_template: confirm_cancel
  browsergym_goal: In the compact filter strip, clear only the "Project" select so it shows no value, leave "Team" and "Severity" unchanged, then click "Apply filters". The task will finish automatically when done.
  ui_copy: In the compact filter strip, clear only the "Project" select so it shows no value, leave "Team" and "Severity" unchanged, then click "Apply filters". The task will finish automatically when done.
  setup_description: 'A dense analytics header sits at the top-right of a dashboard with charts, pills, and inline buttons. The header contains three compact Ant Design Select components on one row: "Project", "Team", and "Severity". "Project" currently shows "Apollo" and has allowClear enabled; the clear affordance appears in the right section only when the field is hovered/focused. "Team" is set to "Platform" and "Severity" is set to "Critical"; both must remain unchanged. The strip also contains an "Apply filters" button and a "Reset all" button. Only Apply commits the new filter state.'
  scene_context:
    theme: dark
    spacing: compact
    layout: inline_surface
    placement: top_right
    scale: small
    instances: 3
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - scale
    - clutter
    factor_rationale: The clear affordance is a small secondary target embedded in a dense multi-select strip, and the user must preserve the sibling selects before committing the strip with Apply.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 5
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 5
    justification: This task is hard because the true action is a small clear affordance inside one of three nearly identical compact selects, followed by an explicit apply step.
  success_trigger:
    human_readable:
    - The committed value of "Project" is null / empty.
    - '"Team" remains "Platform" and "Severity" remains "Critical".'
    - The "Apply filters" control has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        target_instance: Project
        non_target_instances_must_remain:
          Team: Platform
          Severity: Critical
      tolerance: null
      require_confirm: true
      confirm_control: Apply filters
      require_correct_instance: true
      target_instance_label_or_id: Project
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Opening the Project dropdown and choosing another project instead of clearing it.
  - Changing Team or Severity along with Project.
  - Clicking "Reset all" instead of "Apply filters".
  - Clearing Project visually but not committing with Apply.
  expected_interaction_path:
  - Locate the Project select in the compact strip.
  - Reveal and click the clear affordance for Project.
  - Verify Team and Severity are unchanged.
  - Click "Apply filters".
  notes: Expose clear-state and committed filter strip state separately.
