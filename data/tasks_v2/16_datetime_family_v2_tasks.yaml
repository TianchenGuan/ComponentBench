  browsergym_goal: Open the “Edit follow-up plan” drawer. In the date picker labeled “Follow-up date”, set the date to October 13, 2026 and click OK to confirm. Weekends and blackout dates are disabled, so choose only the requested enabled date. The task will finish automatically when done.
  ui_copy: Open the “Edit follow-up plan” drawer. In the date picker labeled “Follow-up date”, set the date to October 13, 2026 and click OK to confirm. Weekends and blackout dates are disabled, so choose only the requested enabled date. The task will finish automatically when done.
  setup_description: Layout is drawer_flow with compact spacing, bottom_right placement, default scale, and medium clutter. A support dashboard remains visible underneath. Clicking “Edit follow-up plan” opens a right-side Ant Design Drawer containing one DatePicker labeled “Follow-up date”, a helper note about business-day-only scheduling, and two read-only summary cards. The picker starts empty and opens to February 2026. The calendar disables weekends and also disables October 12 and October 14, 2026 as blackout days. needConfirm is enabled, so the panel has OK and Cancel. The target date is the only enabled candidate in its local neighborhood.
  scene_context:
    theme: light
    spacing: compact
    layout: drawer_flow
    placement: bottom_right
    scale: default
    instances: 1
    guidance: mixed
    clutter: medium
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_confirm
    precision_surface: discrete
    secondary_supporting_primitive: drawer
  design_intent:
    active_factors:
    - overlay_model
    - confirmation_model
    - placement
    factor_rationale: The task combines an off-center drawer with disabled-date interference and a picker-level confirm step, which raises interaction-knowledge and state-verification difficulty without making the instruction itself ambiguous.
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 4
      depth_layering: 4
      feedback_dynamics: 4
      semantic_observability: 4
      disambiguation_load: 1
    justification: The challenge is not arithmetic; it is recognizing enabled versus disabled dates after month navigation, then explicitly confirming the one correct choice from the drawer.
  success_trigger:
    human_readable:
    - The committed value of “Follow-up date” equals 2026-10-13.
    - The picker-level OK control has been clicked.
    - The drawer remains open or closes according to implementation, but the committed field value must be correct.
    canonical_predicate:
      predicate_type: equals
      target_state:
        date: '2026-10-13'
      tolerance: null
      require_confirm: true
      confirm_control: OK
      require_correct_instance: true
      target_instance_label_or_id: Follow-up date
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Attempting to click a disabled weekend or blackout date so the field remains unset.
  - Selecting a nearby enabled date other than October 13, 2026.
  - Selecting the correct date but dismissing the panel without clicking OK.
  - Editing any non-target control in the drawer.
  expected_interaction_path:
  - Open the drawer.
  - Open the “Follow-up date” picker and navigate to October 2026.
  - Choose the enabled day 13 while avoiding disabled nearby dates.
  - Click OK to commit the selection.
  notes: Instrument disabled day cells separately from enabled cells for debugging, but checker should only depend on the committed field value and the confirm action.
- id: date_picker_single-antd-v2-T03
