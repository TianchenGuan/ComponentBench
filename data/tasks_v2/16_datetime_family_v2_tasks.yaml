    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - internal_scroll_region
    - confirmation_model
    - layout
    factor_rationale: The right field is not initially visible, and the task requires both inner-panel targeting and far-back calendar navigation before two separate commit events complete the interaction.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 2
      depth_layering: 5
      feedback_dynamics: 4
      semantic_observability: 4
      disambiguation_load: 2
