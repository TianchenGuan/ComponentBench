    theme: light
    spacing: compact
    layout: table_cell
    placement: bottom_right
    scale: small
    instances: 3
    guidance: visual
    clutter: high
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: table
  design_intent:
    active_factors:
    - layout
    - instances
    - scale
    factor_rationale: Small in-cell controls, row-local saves, and three same-type instances create grounding and disambiguation pressure, while the visual reference chip keeps the target semantically simple.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 5
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 5
    justification: The exact date is visible, but hitting the correct small table-cell picker, saving only the target row, and leaving the other rows untouched make this a hard row-scoped date task.
  success_trigger:
    human_readable:
    - The committed due date in the row labeled “Milestone B” equals 2027-04-06.
    - The Milestone B row-local Save control has been clicked.
    - Milestone A and Milestone C keep their initial due dates.
    canonical_predicate:
      predicate_type: equals
      target_state:
        date: '2027-04-06'
        saved: true
        non_target_instances_must_remain:
          Milestone A: '2027-03-22'
          Milestone C: '2027-05-11'
      tolerance: null
      require_confirm: true
      confirm_control: save-milestone-b-row
      require_correct_instance: true
      target_instance_label_or_id: Milestone B / Due date
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Applying the reference date to Milestone A or Milestone C.
  - Selecting the correct date in Milestone B but failing to click Save in that row.
  - Changing the target row and a non-target row together.
  - Selecting the wrong date because the reference chip was ignored.
  expected_interaction_path:
  - Read the date from the blue reference chip.
  - Locate the Milestone B row and open its Due date picker.
  - Select 2027-04-06.
  - Click Save in the Milestone B row.
