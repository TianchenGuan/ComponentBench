- id: calendar_embedded-mantine-v2-T47
  name: Purple target marker in dark settings panel with sibling preserved
  canonical_type: calendar_embedded
  implementation_source: mantine
  implementation_variant: Calendar custom day render x2
  implementation_component: 'Mantine: Calendar'
  task_template: match_reference
  secondary_template: confirm_cancel
  browsergym_goal: In the dark settings panel, use only the calendar labeled “Customer calendar” to navigate to May 2027 and select the day marked with the purple target marker, then click “Apply calendars”. Leave “Internal calendar” unchanged. The task will finish automatically when done.
  ui_copy: In the dark settings panel, use only the calendar labeled “Customer calendar” to navigate to May 2027 and select the day marked with the purple target marker, then click “Apply calendars”. Leave “Internal calendar” unchanged. The task will finish automatically when done.
  setup_description: 'Layout is settings_panel with dark theme, compact spacing, off_center placement, default scale, and high clutter. Two Mantine Calendar instances sit one above the other: “Internal calendar” and “Customer calendar”. Each calendar uses custom day rendering with colored markers. In the target Customer calendar, one day in May 2027 has a purple ring marker; other days show gray and orange marks. Internal calendar must remain without a selected date. The panel commits via a shared “Apply calendars” button.'
  scene_context:
    theme: dark
    spacing: compact
    layout: settings_panel
    placement: off_center
    scale: default
    instances: 2
    guidance: visual
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - guidance
    - clutter
    factor_rationale: 'This combines two of the strongest calendar stressors from the evidence: subtle in-grid visual cues and wrong-instance pressure from multiple same-type embedded calendars.'
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 4
      density_choice_interference: 5
      depth_layering: 2
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 5
    justification: The hard part is locating the target marker in the correct calendar and not disturbing the sibling calendar before the panel-level Apply.
  success_trigger:
    human_readable:
    - The applied date in Customer calendar equals 2027-05-18.
    - Internal calendar applied date remains null.
    - The Apply calendars control has been clicked.
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        reference_id: customer-calendar-purple-target
        selected_date: '2027-05-18'
        saved: true
        non_target_instances_must_remain:
          Internal calendar: null
      tolerance: null
      require_confirm: true
      confirm_control: Apply calendars
      require_correct_instance: true
      target_instance_label_or_id: Customer calendar
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting the target-marked day in Internal calendar instead of Customer calendar.
  - Selecting an orange or gray marked day in Customer calendar.
  - Selecting the right day but not clicking Apply calendars.
  - Applying any date to Internal calendar.
  expected_interaction_path:
  - Locate the Customer calendar.
  - Use the legend/marker styling to find the purple target day.
  - Select it.
  - Click Apply calendars.
  notes: As with other visual-cue tasks, benchmark mode should not surface the resolved ISO date directly in visible text.
- id: calendar_embedded-mantine-v2-T48
  name: Team B quarterly planning date with global apply across three calendars
  canonical_type: calendar_embedded
  implementation_source: mantine
  implementation_variant: Calendar x3 with global apply
  implementation_component: 'Mantine: Calendar'
  task_template: select_one
  secondary_template: confirm_cancel
  browsergym_goal: In the quarterly planning dashboard, use only the calendar labeled “Team B” to select May 4, 2027, then click “Apply changes”. Leave Team A and Team C without an applied date. The task will finish automatically when done.
  ui_copy: In the quarterly planning dashboard, use only the calendar labeled “Team B” to select May 4, 2027, then click “Apply changes”. Leave Team A and Team C without an applied date. The task will finish automatically when done.
  setup_description: Layout is dashboard_panel with compact spacing, center placement, default scale, and high clutter. Three Mantine Calendar cards—Team A, Team B, and Team C—sit in one row beneath a toolbar and status strip. All begin on February 2027 with no applied date. Clicking a day sets a pending selection in the corresponding card. A global footer button “Apply changes” commits all pending selections. Only Team B should end with an applied date.
  scene_context:
    theme: light
    spacing: compact
    layout: dashboard_panel
    placement: center
    scale: default
    instances: 3
    guidance: text
    clutter: high
  component_context:
    overlay_model: none
    internal_scroll_region: false
    confirmation_model: explicit_apply
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - clutter
    - confirmation_model
    factor_rationale: Multiple inline calendars with one shared apply step are a strong embedded-calendar stressor because they force the user to reason about pending state locally and committed state globally.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 5
    justification: This is hard because the user must target Team B only, possibly navigate to May 2027, and then commit the change globally without contaminating the other two calendars.
  success_trigger:
    human_readable:
    - Team B applied date equals 2027-05-04.
    - Team A and Team C applied dates remain null.
    - The global Apply changes control has been clicked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_date: '2027-05-04'
        saved: true
        non_target_instances_must_remain:
          Team A: null
          Team C: null
      tolerance: null
      require_confirm: true
      confirm_control: Apply changes
      require_correct_instance: true
      target_instance_label_or_id: Team B
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting May 4 in Team A or Team C instead of Team B.
  - Selecting dates in more than one calendar before applying.
  - Selecting the right pending date in Team B but not clicking Apply changes.
  - Stopping in the wrong month or selecting the wrong day.
  expected_interaction_path:
  - Navigate Team B to May 2027 if needed.
  - Select day 4 in Team B only.
  - Click Apply changes.
  notes: Use per-team committed state rather than transient selected day highlights for success.
