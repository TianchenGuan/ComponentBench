- id: date_picker_single-antd-v2-T01
  name: Billing date via year-month-day with picker OK among three fields
  canonical_type: date_picker_single
  implementation_source: antd
  implementation_variant: needConfirm + year/month/day navigation
  implementation_component: 'AntD: DatePicker'
  task_template: open_and_select
  secondary_template: confirm_cancel
  browsergym_goal: In the scheduling settings panel, edit only the date picker labeled “Billing date”. Set it to September 18, 2028, then click the picker’s OK button to confirm. Do not change “Reminder date” or “Archive date”. The task will finish automatically when done.
  ui_copy: In the scheduling settings panel, edit only the date picker labeled “Billing date”. Set it to September 18, 2028, then click the picker’s OK button to confirm. Do not change “Reminder date” or “Archive date”. The task will finish automatically when done.
  setup_description: 'Layout is settings_panel with compact spacing, off-center placement, default scale, and high clutter. A billing-automation page shows toggles, status chips, and a read-only audit table above a form section containing three Ant Design DatePicker fields: “Reminder date”, “Billing date”, and “Archive date”. Each field looks identical except for its label. The target field starts empty. The other two are prefilled and must remain unchanged. Opening any field shows the standard Ant Design calendar popover with year and month switching, and this instance is configured with needConfirm so the panel footer includes OK and Cancel. The initial visible month is February 2026, so reaching the target requires year/month navigation before selecting the day and confirming it.'
  scene_context:
    theme: dark
    spacing: compact
    layout: settings_panel
    placement: off_center
    scale: small
    instances: 3
    guidance: text
    clutter: high
  component_context:
    overlay_model: single_overlay
    internal_scroll_region: false
    confirmation_model: explicit_confirm
    precision_surface: discrete
    secondary_supporting_primitive: none
  design_intent:
    active_factors:
    - instances
    - confirmation_model
    - clutter
    factor_rationale: Three nearly identical fields in a compact high-clutter panel create wrong-instance pressure, and the picker-level OK requirement forces the agent to verify committed state instead of stopping after a draft selection.
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 2
      depth_layering: 4
      feedback_dynamics: 4
      semantic_observability: 4
      disambiguation_load: 5
    justification: The date itself is exact but human-feasible; the real pressure comes from instance disambiguation, long-range calendar navigation, and the need to convert a draft pick into a committed value with OK.
  success_trigger:
    human_readable:
    - The committed value of the AntD DatePicker labeled “Billing date” equals 2028-09-18.
    - The picker-level OK control has been used to confirm the selection.
    - “Reminder date” and “Archive date” remain at their initial values.
    canonical_predicate:
      predicate_type: equals
      target_state:
        date: '2028-09-18'
        saved: true
        non_target_instances_must_remain:
          Reminder date: '2026-03-07'
          Archive date: '2026-12-31'
      tolerance: null
      require_confirm: true
      confirm_control: OK
      require_correct_instance: true
      target_instance_label_or_id: Billing date
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Setting the correct date on “Reminder date” or “Archive date” instead of “Billing date”.
  - Selecting September 18, 2028 but leaving the picker in a draft state without clicking OK.
  - Changing either non-target field while setting the target date.
  - Selecting the wrong year, month, or day.
  expected_interaction_path:
  - Locate the field labeled “Billing date”.
  - Open the picker and navigate from February 2026 to September 2028.
  - Select day 18.
  - Click OK in the picker footer and verify the other two fields are unchanged.
  notes: Checker should read the committed field value, not the temporary panel state. Bind each field to a stable instance id so correct-instance checking does not rely on DOM order.
- id: date_picker_single-antd-v2-T02
  name: Blackout-aware follow-up date in an off-center drawer
  canonical_type: date_picker_single
  implementation_source: antd
  implementation_variant: disabledDate + needConfirm
  implementation_component: 'AntD: DatePicker inside AntD Drawer'
  task_template: open_and_select
