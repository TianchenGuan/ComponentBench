  - Scrolling the page but not the inner metadata panel, leaving “Archived on” untouched.
  - Selecting a nearby year such as 1999 or 1998-12-30.
  - Clicking OK in the picker but not “Apply metadata”.
  - Applying metadata without changing the target field.
  expected_interaction_path:
  - Scroll the inner metadata panel until “Archived on” appears.
  - Open the picker and navigate back to December 1998.
