      predicate_type: set_equals
      target_state:
        selected_values:
        - urgent
        - backend
        - postmortem-required
      tolerance:
        set_order_independent: true
        string_match: exact
        trim_whitespace: true
      require_confirm: true
      confirm_control: Apply tags
