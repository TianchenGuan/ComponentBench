  - Opening the "More" menu but not activating the "Audit Log" tab.
  - Focusing the menu item without selecting it (active tab does not change).
  expected_interaction_path:
  - If "Audit Log" is not visible, open the "More" dropdown in the tab bar.
  - Click "Audit Log" in the dropdown list.
  notes: |-
    Instrumentation: expose overflow trigger with data-testid="tabs-more"; checker should not depend on menu state, only active tab key.
