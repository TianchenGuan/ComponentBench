    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 3
      density_choice_interference: 4
      depth_layering: 4
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 1
    justification: Requires discovering and using the overflow "More" menu among many similar tab labels; multiple interaction layers increase error risk.
  success_trigger:
    human_readable:
    - 'In the "Compliance" tabs instance, the active tab is "Audit Log" (value/key: audit-log).'
    - If the "More" menu was opened, it does not need to remain open after the selection.
