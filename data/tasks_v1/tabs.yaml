  success_trigger:
    human_readable:
    - 'In the "Project" tabs instance, the active tab is "Details" (value/key: details).'
    - No confirmation is required.
    canonical_predicate:
      predicate_type: equals
      target_state:
        active_tab_value: details
        active_tab_label: Details
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The active tab remains "Overview" or "Activity".
  - A tab is focused but not activated (aria-selected is not true on "Details").
  expected_interaction_path:
  - Click the "Details" tab header in the tab list.
  notes: |-
    Instrumentation: give the Tabs instance data-testid="tabs-project" and each tab data-testid like "tab-details"; checker can read aria-selected on the tab with value "details".
