- id: resizable_columns-antd-T01
  name: Set Amount column to 160px (single table)
  canonical_type: resizable_columns
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Table + react-resizable (ResizableTitle header cell)'
  task_template: set_scalar
  secondary_template: null
  browsergym_goal: Set the “Amount” column width to 160 px in the table. No confirmation is needed. The task will finish automatically
    when done.
  ui_copy: Set the “Amount” column width to 160 px in the table. No confirmation is needed. The task will finish automatically
    when done.
  setup_description: |-
    Layout: isolated_card centered in the viewport with a single “Payments” table.

    The table is an Ant Design Table configured with **resizable columns** using a composed header cell (react-resizable).
    - Column headers: Date, Type, Note, Amount, Action.
    - Each header has a thin vertical resize handle on its **right edge** (visible on hover).
    - While dragging, a small tooltip near the pointer shows the current width in pixels (e.g., “160px”).
    - Under the table title there is a small “Width Monitor” line that always shows the current width of the Amount column as text (e.g., “Amount width: 148px”) for observability.

    Initial state:
    - Amount column starts at 120px.
    - Other columns are already set and do not need to be changed.

    No distractors: no other tables, no modals, no extra form fields.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Single table with a live pixel readout makes the target state easy to observe; only one resize handle interaction
      is required with a generous tolerance.
  success_trigger:
    human_readable:
    - The Amount column width is within ±12px of 160px.
    - No confirmation/apply click is required.
    - The predicate is evaluated on the only resizable table on the page.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        column_widths_px:
          amount: 160
      tolerance:
        type: absolute_px
        value: 12
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Resizing a different column (e.g., Note) while leaving Amount outside tolerance.
  - Amount width is 147px or 173px (outside ±12px).
  - Changing column order or sorting does not count as success.
  expected_interaction_path:
  - Hover the Amount header to reveal the resize handle.
  - Drag the handle left/right until the tooltip or Width Monitor reads 160px.
  - Release the mouse to finish resizing.
  notes: |-
    Instrumentation: add data-testid for the table root (e.g., rc-table-payments) and for the live width readout (e.g., rc-width-amount).
    Checker: read the canonical column width from the table’s column state (not from DOM pixels) to avoid zoom/layout variance.
