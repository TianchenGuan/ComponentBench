    - Section heading “API logs” followed by a Mantine-styled resizable table.

    API logs table:
    - Columns: Time, Method, Endpoint, API Key, Status.
    - Resizable grips on header right edges.
    - **No persistent width monitor**: the only numeric feedback is a small tooltip (e.g., “171px”) that appears next to the cursor *while dragging*.
