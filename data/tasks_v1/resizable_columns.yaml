    finish automatically when done.
  ui_copy: Reset the table’s column widths back to the default layout using the “Reset widths” control. The task will finish
    automatically when done.
  setup_description: |-
    Layout: isolated_card, centered.

    One resizable Ant Design Table with a small toolbar above it:
    - Toolbar buttons: “Reset widths” (primary), “Export CSV” (secondary, distractor).
    - Table headers: Date, Type, Note, Amount, Action.
    - Widths are currently **customized** (not default), and the Width Monitor shows all five widths.

    Default layout (shown as a faint hint text under the Reset button):
    - Date 140px, Type 120px, Note 200px, Amount 120px, Action 100px.

    Initial state (customized):
    - Date 140px, Type 120px, Note 280px, Amount 80px, Action 100px.

    Clicking “Reset widths” immediately restores the default widths and shows a small toast “Column widths reset”.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 5
      disambiguation_load: 1
    justification: A single clearly labeled reset control with explicit default widths minimizes both motor and reasoning
      complexity.
  success_trigger:
    human_readable:
    - 'All column widths match the default layout: Date 140px, Type 120px, Note 200px, Amount 120px, Action 100px.'
    - No additional confirmation is required after the reset.
    canonical_predicate:
      predicate_type: equals
      target_state:
        column_widths_px:
          date: 140
          type: 120
          note: 200
          amount: 120
          action: 100
      tolerance:
        type: absolute_px
        value: 0
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Only some columns match the default widths while others remain customized.
  - Clicking “Export CSV” does not count as success.
  - Visually resizing columns to approximate defaults but leaving any column off by 1px does not count (exact match required).
  expected_interaction_path:
  - Locate the toolbar above the table.
  - Click “Reset widths”.
  - Verify the Width Monitor returns to the default values.
  notes: |-
    Checker should compare against stored “defaultWidths” for the table instance, not recomputed DOM widths.
    Keep “Export CSV” as a harmless distractor (no navigation).
