    human_readable:
    - API Key column width is within ±3px of 171px.
    - No confirmation is required.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        column_widths_px:
          api_key: 171
      tolerance:
        type: absolute_px
        value: 3
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: API logs
      terminal_condition: task ends when predicate holds
