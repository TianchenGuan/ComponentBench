  - The displayed currency formatting is wrong (missing $ prefix, missing thousands separator, or wrong decimal places).
  expected_interaction_path: Click Invoice amount → type 1250.75 (or 1,250.75) → blur/press Enter.
  notes: Use AntD InputNumber formatter/parser (see docs) and ensure checker reads the parsed numeric value (from onChange state), not the formatted DOM string.
