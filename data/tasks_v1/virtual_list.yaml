  success_trigger:
    human_readable:
    - Target component is the virtual list.
    - List selection is single-select and the selected item's key equals 'apr-0031'.
    - User has clicked the confirmation control before finishing.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selection_mode: single
        selected_item_key: apr-0031
      tolerance: null
      require_confirm: true
      confirm_control: Apply
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
