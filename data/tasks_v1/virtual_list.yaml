- id: virtual_list-antd-T04
  name: Check three specific tickets
  canonical_type: virtual_list
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Card + @rc-component/virtual-list (rows styled like List.Item)'
  task_template: select_many
  secondary_template: null
  browsergym_goal: 'In the Open Tickets list, check exactly these three tickets: “Ticket 0002 — Broken link”, “Ticket 0004 — UI glitch”, and “Ticket 0006 — Email not sent”. The task will finish automatically when done.'
