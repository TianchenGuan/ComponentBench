    human_readable:
    - Target component is the virtual list instance Suspended Users.
    - List selection is single-select and the selected item's key equals 'susp-0112'.
    - No confirmation click is required.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selection_mode: single
        selected_item_key: susp-0112
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Suspended Users
