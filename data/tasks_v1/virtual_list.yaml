    Composite implementation note: Mantine provides scroll containers (e.g., ScrollArea) but not a built-in virtual list component; these tasks pair Mantine UI for row layout with headless virtualization via @tanstack/react-virtual.
    Instrumentation hints: the scroll viewport element should have a stable data-testid; each virtual row should carry data-item-key. Expose selection/toggle state via data-selected / aria-selected / aria-checked for robust checker access.
