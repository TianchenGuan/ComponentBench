- id: virtual_list-antd-T01
  name: Select a visible ticket row
  canonical_type: virtual_list
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Card + @rc-component/virtual-list (rows styled like List.Item)'
  task_template: select_one
  secondary_template: null
  browsergym_goal: In the Open Tickets list, select “Ticket 0007 — Login fails on iOS”. The task will finish automatically when done.
  ui_copy: Select “Ticket 0007 — Login fails on iOS” in the Open Tickets list.
  setup_description: |
    Layout: a single isolated AntD Card centered in the viewport titled “Open Tickets”.
    Component: one virtualized list (height ~360px) rendered with @rc-component/virtual-list; about 10 rows are visible at a time with a vertical scrollbar.
    Row affordances: each row looks like an AntD List item with:
      - left: “Ticket #### — <short title>”
      - right: a small status Tag (e.g., New / Investigating / Waiting)
    Interaction model: single-select. Clicking anywhere on a row selects it and applies a light blue highlight; selecting a different row moves the highlight.
    Initial state: no row selected; footer text under the list reads “Selected: none”.
    Distractors: none beyond the non-interactive Card title and a subtle help text (“Scroll to browse all tickets”).
    Feedback: selection highlight + footer updates immediately to “Selected: Ticket ####”.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 5
      disambiguation_load: 1
    justification: Target is visible without scrolling and selection is single-click with immediate, clearly labeled feedback.
  success_trigger:
    human_readable:
    - Target component is the virtual list.
    - List selection is single-select and the selected item's key equals 'ticket-0007'.
    - No confirmation click is required.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selection_mode: single
        selected_item_key: ticket-0007
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - A different ticket is selected (e.g., Ticket 0008).
  - 'No ticket is selected (footer still shows “Selected: none”).'
  - Only keyboard focus moves but the selected state does not change (no highlight / aria-selected not updated).
  expected_interaction_path:
  - Click the row labeled “Ticket 0007 — Login fails on iOS”.
  notes: |-
    Composite implementation note: Ant Design does not expose a single 'VirtualList' UI component; this task uses @rc-component/virtual-list to virtualize rows while using AntD components for row chrome (Typography, Tag, Checkbox, Button) to preserve AntD styling.
    Instrumentation hints: give each list instance a stable data-testid (e.g., vl-primary) and each row a data-item-key. Expose selection/toggle state via aria-selected / aria-checked on the row or checkbox for robust checking.
