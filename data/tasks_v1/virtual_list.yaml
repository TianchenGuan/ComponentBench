  success_trigger:
    human_readable:
    - Target component is the virtual list.
    - List selection is multi-select and the set of checked item keys matches the target set exactly.
    - 'Target set: .'
    - User has clicked the confirmation control before finishing.
    canonical_predicate:
      predicate_type: set_equals
      target_state:
        selection_mode: multiple
        selected_item_keys: []
      tolerance: null
      require_confirm: true
      confirm_control: Save
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Only some triggers are unchecked; at least one remains selected (including offscreen).
  - Selections are cleared but Save is not clicked (no commit).
  - Save is clicked while some triggers remain selected.
  expected_interaction_path:
  - Click “Reset selections” (or manually uncheck all selected triggers).
  - Verify the selected count is 0.
  - Click “Save”.
