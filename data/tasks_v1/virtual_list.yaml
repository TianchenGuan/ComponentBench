    Layout: isolated_card centered titled “Notification Rules”.
    Target component: a virtualized checkbox list (“Triggers”) inside Mantine ScrollArea (h≈320px), virtualized via @tanstack/react-virtual.
    Initial state: 5 triggers are pre-checked; at least 2 of them are below the fold and not initially visible.
    Controls:
      - a small “Reset selections” button in the list header (clears all checks at once)
      - a footer bar with a primary “Save” button (must be clicked to commit)
    Interaction model: clearing can be done by unchecking each item or using “Reset selections”; state is staged until Save.
    Feedback:
      - header shows “Selected: N” and updates immediately
      - after Save, toast appears “Rules updated”
  scene_context:
    theme: light
    spacing: compact
    layout: isolated_card
    placement: center
    scale: default
