    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L1
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 1
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Requires only straightforward vertical scrolling with a clearly labeled textual target and no confirmation step.
  success_trigger:
    human_readable:
    - Target component is the virtual list.
    - The row for item key 'ticket-0040' is rendered and at least 60% of the row is visible within the list viewport.
    - No click/selection is required; scrolling alone can satisfy the goal.
    canonical_predicate:
      predicate_type: item_visible
      target_state:
        item_key: ticket-0040
      tolerance:
        min_visible_ratio: 0.6
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
