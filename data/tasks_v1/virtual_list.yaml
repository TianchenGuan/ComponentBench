  setup_description: |
    Layout: isolated AntD Card centered, titled “Open Tickets”.
    Component: one virtual list with a checkbox column on the left of each row (multi-select mode).
    Row structure (left → right): Checkbox · “Ticket #### — <title>” · Status Tag.
    Initial state: no checkboxes selected; all three target tickets are visible in the initial viewport (top of the list).
    Distractors: adjacent rows (Ticket 0001, 0003, 0005, 0007) are visible and have similar short titles, increasing the chance of off-by-one selection.
    Feedback: a checked box shows a checkmark; a small counter above the list reads “Selected: N”.
    No Apply/Confirm button: selection is immediately committed.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L1
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 5
      disambiguation_load: 1
    justification: All targets are visible, but success requires an exact multi-selection set, making omission/extra checks the main risk.
  success_trigger:
    human_readable:
    - Target component is the virtual list.
    - List selection is multi-select and the set of checked item keys matches the target set exactly.
    - 'Target set: ticket-0002, ticket-0004, ticket-0006.'
    - No confirmation click is required.
    canonical_predicate:
      predicate_type: set_equals
      target_state:
        selection_mode: multiple
        selected_item_keys:
        - ticket-0002
        - ticket-0004
        - ticket-0006
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Any non-target ticket is checked (extra selection).
  - One or more target tickets are not checked (missing selection).
  - Only row highlight changes but the checkbox state does not reflect the required set.
  expected_interaction_path:
  - Click the checkbox for Ticket 0002.
  - Click the checkbox for Ticket 0004.
  - Click the checkbox for Ticket 0006.
  - Verify only these three are checked (counter shows 3).
  notes: |-
    Composite implementation note: Ant Design does not expose a single 'VirtualList' UI component; this task uses @rc-component/virtual-list to virtualize rows while using AntD components for row chrome (Typography, Tag, Checkbox, Button) to preserve AntD styling.
    Instrumentation hints: give each list instance a stable data-testid (e.g., vl-primary) and each row a data-item-key. Expose selection/toggle state via aria-selected / aria-checked on the row or checkbox for robust checking.
