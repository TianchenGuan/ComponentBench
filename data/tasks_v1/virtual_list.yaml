    Component: one virtual list (height ~360px) with 200+ tickets; only visible rows are mounted (virtualized).
    Row content: “Ticket #### — <title>” with a status Tag on the right.
    Interaction model: scrolling is the key action; clicking is optional and does not affect success for this task.
    Initial state: scrolled to the very top showing Ticket 0001–0010 approximately; no selection.
    Distractors: several similar “Payment …” titles appear (e.g., “Payment declined”, “Payment receipt missing”) in nearby rows to create mild interference.
