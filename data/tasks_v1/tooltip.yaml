- id: tooltip-antd-T01
  name: Show tooltip on Save button (hover)
  canonical_type: tooltip
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Tooltip'
  task_template: open_overlay
  secondary_template: null
  browsergym_goal: Show the tooltip for the “Save” button so that the tooltip text “Save changes” is visible. The task will finish automatically when done.
  ui_copy: Show the tooltip for the “Save” button so that the tooltip text “Save changes” is visible. The task will finish automatically when done.
  setup_description: |-
    Light theme, comfortable spacing, isolated card centered in the viewport.
    The card contains a single primary Ant Design button labeled “Save”. The button is wrapped in an AntD Tooltip.
    - Tooltip title: “Save changes”
    - Trigger: default (hover; focus may also work depending on browser focus behavior)
    - Arrow: default
    Initial state: tooltip is not visible. There are no other tooltip instances or interactive distractors.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single large target with immediate visual feedback; the only requirement is to make the tooltip visible with the expected text.
  success_trigger:
    human_readable:
    - The tooltip for the “Save” button is visible/open.
    - The tooltip content text equals “Save changes”.
    canonical_predicate:
      predicate_type: equals
      target_state:
        open: true
        tooltip_text: Save changes
      tolerance:
        tooltip_text_match: exact
        normalize_whitespace: true
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - No tooltip is visible.
  - A tooltip is visible but it is attached to a different element (wrong instance).
  - A tooltip is visible but the text is not exactly “Save changes”.
  - Only the browser-native title tooltip appears (no AntD tooltip overlay rendered).
  expected_interaction_path: Move the mouse over the “Save” button (or focus it) → wait for the tooltip bubble to appear with the correct text.
  notes: 'Instrumentation: add data-testid=''tooltip-trigger-save'' on the button wrapper; in the checker, locate the visible AntD tooltip overlay (e.g., .ant-tooltip) and read its inner text.'
