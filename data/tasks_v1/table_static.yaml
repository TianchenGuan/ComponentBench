    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single table instance with a uniquely identifiable row label and immediate highlight feedback.
  success_trigger:
    human_readable:
    - The Invoices table's active/selected row key equals "INV-1042".
    - Selection is on the only table instance on the page (Invoices).
    canonical_predicate:
      predicate_type: equals
      target_state:
        active_row_key: INV-1042
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - A different invoice row is selected (e.g., INV-1043).
  - Only a cell focus changes without the row becoming selected (aria-selected not true).
  - No row is selected.
  expected_interaction_path:
  - Locate the Invoices table card.
  - Find the row with Invoice ID INV-1042.
  - Click the row to highlight/select it.
  notes: 'Checker hint: assign each row a stable data-row-key equal to the Invoice ID; treat the ''active_row_key'' as the
    data-row-key of the row with aria-selected=true.'
