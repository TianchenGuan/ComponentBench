- id: data_grid_row_selection-antd-T01
  name: Select a single customer row
  canonical_type: data_grid_row_selection
  implementation_source: antd
  implementation_variant: rowSelection.checkbox
  implementation_component: 'AntD: Table (rowSelection)'
  task_template: select_one
  secondary_template: null
  browsergym_goal: In the Customers table, select the row for Customer ID C-014 (Ava Patel). The task will finish automatically when done.
  ui_copy: Customers — Select the row for Customer ID C-014 (Ava Patel).
  setup_description: |-
    Layout is an isolated card centered in the viewport. The card title is "Customers" and it contains a single Ant Design Table with a leading checkbox selection column (rowSelection, default checkbox type).
    Spacing is comfortable and the component is default size. The table has 8 visible rows (no pagination) with columns: Customer ID, Name, Plan, Status.
    Initial state: no rows are selected. There are no other interactive widgets on the page besides the table (no clutter). Selecting a row immediately updates the checkbox and the row highlight (no Apply/OK step).
    Row labels are unique and the target row shows "C-014" in the first data column and "Ava Patel" in the Name column.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Single checkbox selection in a small table with unique labels and immediate visible feedback.
  success_trigger:
    human_readable:
    - The selected row IDs equal ['cust_C014'].
    - No other rows are selected.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_row_ids:
        - cust_C014
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - A different customer row is selected instead of C-014 (Ava Patel).
  - Multiple rows are selected (extra rows selected).
  - The checkbox appears checked but the table selection state is not updated (e.g., focus-only highlight).
  expected_interaction_path:
  - Locate the row with Customer ID C-014 (Ava Patel).
  - Click the selection checkbox at the start of that row (or the row-selection control for that row).
  notes: 'Checker hint: read AntD Table selection via controlled selectedRowKeys / rowSelection.selectedRowKeys or DOM aria-checked on the row checkbox; row key is ''cust_C014''.'
