  - Selecting Cyan but closing the modal without applying.
  - Clicking Apply changes without setting the Accent color to Cyan.
  - Setting a different color and applying.
  expected_interaction_path:
  - Click “Customize theme” to open the modal.
  - Open the Accent color swatch popover.
  - Click “Cyan (#13c2c2)”.
  - Click “Apply changes”.
  notes: 'Checker note: distinguish pending vs committed value. Store committed value in a stable element outside the modal, e.g., `data-testid="accent-color-committed"`.'
