    - Clicking “Customize theme” opens an Ant Design **modal dialog** titled “Customize theme”.
    - Inside the modal:
      - A short description paragraph (non-interactive)
      - A toggle “Use system theme” (distractor)
      - **Color swatch picker (target)**: Ant Design ColorPicker labeled **“Accent color”**
      - Footer buttons: **“Apply changes”** (primary) and **“Cancel”**
    - The ColorPicker itself opens a popover with preset swatches (presets-only panel).
    - Important behavior: selecting a swatch updates an **in-modal preview** but the committed setting is only saved when **“Apply changes”** is clicked. Clicking “Cancel” discards the pending selection.
    - Initial state (before opening the modal): committed Accent color is **Ant Blue (#1677ff)**.
    - Clutter is low and confined to the modal.
