- id: color_swatch_picker-antd-T01
  name: Set accent to Ant Blue
  canonical_type: color_swatch_picker
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: ColorPicker (presets swatches; panelRender renders Presets only)'
  task_template: open_and_select
  secondary_template: null
  browsergym_goal: In the Theme Colors card, set the Accent color to the swatch labeled “Ant Blue (#1677ff)”. The task will finish automatically when done.
  ui_copy: 'Goal: Set Accent color to Ant Blue (#1677ff).'
  setup_description: |-
    You are on a simple settings page with a single isolated card titled “Theme Colors” centered in the viewport.

    - The card contains **one** Ant Design ColorPicker field labeled **“Accent color”**.
    - The ColorPicker trigger shows a small color square and the current value text (hex). It is configured to show **preset swatches only** (the free-form spectrum/slider panel is hidden via `panelRender`), so the only selectable options are the preset swatches.
    - Activating the trigger opens a popover directly under it with a “Preset Colors” section containing two labeled groups:
      1) **Brand**: Ant Blue, Cyan, Green, Gold, Orange, Red, Purple, Magenta
      2) **Neutrals**: Black, Dark Gray, Mid Gray, Light Gray, White
      Each swatch is a small square; hovering a swatch shows a tooltip with the name and hex value.
    - Initial state: Accent color is set to **White (#ffffff)**.
    - No other interactive components are on the page (no clutter).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single labeled picker with a small, clearly named swatch set; only one popover layer and changes apply immediately.
  success_trigger:
    human_readable:
    - 'The Accent color picker’s committed selected swatch value equals #1677ff.'
    - No Apply/OK confirmation is required.
    - Only the single Accent color picker instance is checked.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_color: '#1677ff'
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting any other swatch (including similar blues).
  - 'Leaving the value at #ffffff.'
  - Opening the popover but not selecting a swatch.
  expected_interaction_path:
  - Activate the Accent color trigger to open the popover.
  - Click the “Ant Blue (#1677ff)” swatch in the Brand group.
  - Optionally click outside to dismiss the popover.
  notes: |-
    Instrumentation hints:
    - Add `data-testid="accent-color"` on the ColorPicker root/trigger wrapper.
    - Expose committed canonical color as `data-testid="accent-color-value"` containing lowercase hex (#rrggbb).
