    - 'The committed Accent color equals #13c2c2 after confirmation.'
    - The confirmation control “Apply changes” has been activated (commit required).
    canonical_predicate:
      predicate_type: equals
      target_state:
        committed_color: '#13c2c2'
      tolerance: null
      require_confirm: true
      confirm_control: Apply changes
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
