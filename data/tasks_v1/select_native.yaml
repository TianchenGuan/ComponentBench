      disambiguation_load: 1
    justification: Single, large native select with four clearly distinct options and immediate visible feedback.
  success_trigger:
    human_readable:
    - The target native select has selected option value '30' (label 'Thirty').
    - The task ends when the predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_value: '30'
        selected_label: Thirty
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting any option other than 'Thirty' (value 30).
  - Leaving the select on the initial value ('Twenty').
  - Interacting with the disabled 'Continue' button (it must not affect success).
  expected_interaction_path: Click the 'Age' select → choose 'Thirty'.
