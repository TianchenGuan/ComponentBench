- id: text_input-antd-T06
  name: Enter formatted invite code (compact, small)
  canonical_type: text_input
  implementation_source: antd
  implementation_variant: compact+small with validation
  implementation_component: 'AntD: Input (size=small) in Form.Item validation'
  task_template: enter_formatted
  secondary_template: null
  browsergym_goal: Enter the invite code “Q7K2LM” into the “Invite code” field. The task will finish automatically when done.
  ui_copy: Enter the invite code “Q7K2LM” into the “Invite code” field.
  setup_description: 'Scene is an isolated card centered in the viewport titled “Join workspace”. The page uses compact spacing
    and the AntD Input is rendered in the small size tier. There is a single text input labeled “Invite code” with a subtle
    description: “6 characters, A–Z and 0–9”. The field is inside an AntD Form.Item that shows inline validation feedback:
    when the current value does not match the required format, a red error message appears under the input. Initial value
    is empty. No other text inputs or overlays are present; the only distractor is a disabled-looking ‘Continue’ button that
    is not required for success.'
  scene_context:
    theme: light
    spacing: compact
    layout: isolated_card
    placement: center
    scale: small
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 3
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 1
    justification: Requires entering an exact 6-character formatted code in a small/compact input while reacting to inline
      validation feedback.
  success_trigger:
    human_readable:
    - The “Invite code” input value equals “Q7K2LM” exactly (case-sensitive; trim leading/trailing whitespace).
    - The field is in a valid (non-error) state once the value matches the required format.
    - No Continue/Apply click is required.
    canonical_predicate:
      predicate_type: formatted_equals
      target_state:
        text: Q7K2LM
        format_regex: ^[A-Z0-9]{6}$
        must_be_valid: true
      tolerance:
        whitespace: trim
        case_sensitive: true
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: Invite code
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Wrong code (any character mismatch), including lower-case letters (e.g., “q7k2lm”).
  - Correct characters but with extra internal spaces (e.g., “Q7 K2LM”).
  - Leaving the field in an error state (format does not match).
  expected_interaction_path: Click Invite code input → type Q7K2LM → verify error message disappears (if present).
  notes: Checker can optionally require `aria-invalid=false` or absence of the error helper text in addition to value equality.
