- id: text_input-antd-T01
  name: Set display name
  canonical_type: text_input
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Input'
  task_template: enter_text
  secondary_template: null
  browsergym_goal: 'In the Profile card, set the “Display name” field to: Ava Chen. The task will finish automatically when
    done.'
  ui_copy: 'In the Profile card, set the “Display name” field to: Ava Chen.'
  setup_description: Scene uses an isolated profile card centered in the viewport. The card contains a single Ant Design Input
    labeled “Display name” with a placeholder like “e.g., Ava Chen”. There are no other text inputs on the page, and no modal/popover
    is involved. Spacing is comfortable and the input is default size. Initial value is empty (no text entered). A small non-interactive
    helper line below the input says “This name is shown on your public profile.”
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single visible input with an explicit target string and immediate on-change feedback; no distractors or
      overlays.
  success_trigger:
    human_readable:
    - The AntD “Display name” input’s current value equals “Ava Chen” (after trimming leading/trailing whitespace).
    - No confirmation/apply action is required.
    - The correct (and only) text input instance is the one labeled “Display name”.
    canonical_predicate:
      predicate_type: equals
      target_state:
        text: Ava Chen
      tolerance:
        whitespace: trim
        case_sensitive: true
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: Display name
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Typing the correct text into any other field (there are none, but the checker should still bind to the labeled instance).
  - Value differs from “Ava Chen” (including missing space, extra characters, or wrong casing).
  - Only partially entered text (e.g., “Ava”).
  expected_interaction_path: Click the “Display name” input → type “Ava Chen” → stop.
  notes: 'Instrumentation: bind the checker to the Input via its associated label text “Display name” (or a data-testid on
    the Input wrapper).'
