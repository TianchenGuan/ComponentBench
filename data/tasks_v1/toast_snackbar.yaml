  - A toast appears with partial text (e.g., truncated) that is not an exact match.
  expected_interaction_path:
  - Click “Copy share link”.
  - Observe the info message toast “Link copied to clipboard.”
  notes: 'Checker note: prefer exact string match on the rendered message text node; do not rely on color alone.'
