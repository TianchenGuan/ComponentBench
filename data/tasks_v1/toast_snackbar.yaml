- id: toast_snackbar-antd-T05
  name: 'Dismiss persistent notification: Sync paused'
  canonical_type: toast_snackbar
  implementation_source: antd
  implementation_variant: notification
  implementation_component: 'AntD: notification'
  task_template: clear_reset
  secondary_template: null
  browsergym_goal: Dismiss the notification titled “Sync paused” by clicking its close (×) button. The task will finish automatically when done.
  ui_copy: Dismiss the notification titled “Sync paused” by clicking its close (×) button. The task will finish automatically when done.
  setup_description: |-
    Scene is an isolated card titled “Sync status”. The main content of the card is informational and does not affect success.

    On initial load, an Ant Design **notification** is already visible (configured as persistent with duration disabled). It has:
    - Title: “Sync paused”
    - Description: “Reconnect to continue syncing.”
    - A small close (×) icon in the notification header.

    No other notifications are shown.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 1
    justification: Requires acquiring a small close icon inside the toast; otherwise straightforward with a single visible notification.
  success_trigger:
    human_readable:
    - The notification with title “Sync paused” is no longer visible (dismissed).
    - Dismissal must be achieved via the toast’s close control (not by page navigation).
    canonical_predicate:
      predicate_type: equals
      target_state:
        toast_title: Sync paused
        toast_visible: false
      tolerance:
        text_match: exact
      require_confirm: true
      confirm_control: Close (×) on “Sync paused” notification
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The “Sync paused” notification is still visible (close missed).
  - A different notification is closed (if any appear due to misclicks).
  - The page is refreshed or navigated without dismissing the notification.
  expected_interaction_path:
  - Locate the notification titled “Sync paused”.
  - Click the notification’s close (×) icon.
  - Verify the notification disappears.
  notes: 'Instrumentation: ensure the close icon has an accessible name (e.g., aria-label="Close") and/or a data-testid="toast-close" on each toast.'
- id: toast_snackbar-antd-T06
  name: Undo archive from notification action
  canonical_type: toast_snackbar
  implementation_source: antd
  implementation_variant: notification
  implementation_component: 'AntD: notification (with actions) + message'
  task_template: confirm_cancel
  secondary_template: null
  browsergym_goal: In the notification titled “Item archived”, click “Undo” to restore the item. The task will finish automatically when done.
  ui_copy: In the notification titled “Item archived”, click “Undo” to restore the item. The task will finish automatically when done.
  setup_description: |-
    Scene is an isolated card titled “Archive”. The main card content is static.

    On initial load, an Ant Design **notification** is already visible (persistent). It contains:
    - Title: “Item archived”
    - Description: “Q4 Report.pdf was moved to Archive.”
    - An actions area with two buttons: “Undo” (target) and “View” (distractor).

    Clicking “Undo” immediately shows a separate Ant Design **message.success** toast that reads “Archive undone.”
    Clicking “View” does not show the success message.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 1
    justification: Requires selecting the correct in-toast action among two buttons and observing the follow-up success toast.
  success_trigger:
    human_readable:
    - The in-notification action “Undo” has been activated.
    - A success toast message becomes visible with text exactly “Archive undone.”
    canonical_predicate:
      predicate_type: set_membership
      target_state:
        toasts_visible_include:
        - text: Archive undone.
          kind: success
      tolerance:
        text_match: exact
      require_confirm: true
      confirm_control: Undo
      require_correct_instance: false
      target_instance_label_or_id: Item archived
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Clicking “View” (no follow-up success toast).
  - Closing the notification instead of clicking “Undo”.
  - A toast appears but the text is not exactly “Archive undone.”
  expected_interaction_path:
  - Locate the “Item archived” notification.
  - Click the “Undo” button in the notification actions area.
  - Observe the success message “Archive undone.”
  notes: 'Checker note: use the follow-up message toast as the success signal to avoid depending on internal notification state updates.'
- id: toast_snackbar-antd-T07
  name: Dismiss the Secondary notification in a two-toast stack
  canonical_type: toast_snackbar
  implementation_source: antd
  implementation_variant: notification
  implementation_component: 'AntD: notification (stacked)'
  task_template: clear_reset
  secondary_template: null
  browsergym_goal: Dismiss the Secondary notification titled “Secondary • Card updated” (leave the Primary one visible). The task will finish automatically when done.
  ui_copy: Dismiss the Secondary notification titled “Secondary • Card updated” (leave the Primary one visible). The task will finish automatically when done.
  setup_description: |-
    Scene is a simple form section titled “Payment methods” with a few read-only fields (card brand, last4) shown as background context.

    Two Ant Design **notifications** are visible at load and are stacked in the same corner:
    1) **Primary** notification — Title: “Primary • Card updated”, Description: “Visa ending 4242.”
    2) **Secondary** notification — Title: “Secondary • Card updated”, Description: “Visa ending 4242.”

    Each notification has its own close (×) icon. The task targets the Secondary notification only.
  scene_context:
    theme: light
    spacing: comfortable
    layout: form_section
    placement: center
    scale: default
    instances: 2
    guidance: text
    clutter: low
  difficulty:
    difficulty_bucket: mid
    tier: L2
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 4
    justification: Two highly similar toasts require careful disambiguation and precise clicking on the correct close control.
  success_trigger:
    human_readable:
    - The notification titled “Secondary • Card updated” is not visible.
    - The notification titled “Primary • Card updated” remains visible (must not be dismissed).
    canonical_predicate:
      predicate_type: equals
      target_state:
        must_be_absent:
        - title: Secondary • Card updated
        must_be_present:
        - title: Primary • Card updated
      tolerance:
        text_match: exact
      require_confirm: true
      confirm_control: Close (×) on Secondary notification
      require_correct_instance: true
      target_instance_label_or_id: Secondary
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Dismissing the Primary notification instead of the Secondary.
  - Dismissing both notifications.
  - Leaving the Secondary notification visible.
  expected_interaction_path:
  - Identify the two stacked notifications by their titles.
  - Click the close (×) icon on “Secondary • Card updated”.
  - Verify only the Primary notification remains.
  notes: 'Instrumentation: each toast should expose a stable id and label (Primary/Secondary) via data attributes to support require_correct_instance.'
- id: toast_snackbar-antd-T08
  name: Undo file deletion from a table row via notification action
  canonical_type: toast_snackbar
  implementation_source: antd
  implementation_variant: notification
  implementation_component: 'AntD: Table (context) + notification (with actions) + message'
  task_template: table_operation
  secondary_template: confirm_cancel
  browsergym_goal: In the Files table, click the Delete (trash) action for “Contract.docx” and then click “Undo” in the notification to restore it. The task will finish automatically when done.
  ui_copy: In the Files table, click the Delete (trash) action for “Contract.docx” and then click “Undo” in the notification to restore it. The task will finish automatically when done.
  setup_description: |-
    Scene uses a table_cell layout: a small “Files” table is centered on the page. Spacing is set to **compact** to create denser rows.

    The table has 5 rows. One row has filename “Contract.docx” (target). Each row has an icon-only “Delete” (trash) action in the last column.

    When the delete action is clicked for any row, an Ant Design **notification** appears with title “File deleted” and a description that includes the filename. For the target row, the description reads “Contract.docx was deleted.” The notification includes an actions area with buttons “Undo” (target) and “Dismiss” (distractor).

    Clicking “Undo” shows an Ant Design success **message** toast: “Restored: Contract.docx”.
  scene_context:
    theme: light
    spacing: compact
    layout: table_cell
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 3
    justification: Small icon-only table actions plus an in-toast action choice (Undo vs Dismiss) create a multi-step interaction with higher target acquisition demands.
  success_trigger:
    human_readable:
    - 'A success toast message becomes visible with text exactly “Restored: Contract.docx”.'
    - The “Undo” action must have been clicked in the deletion notification (not just opening the notification).
    canonical_predicate:
      predicate_type: set_membership
      target_state:
        toasts_visible_include:
        - text: 'Restored: Contract.docx'
          kind: success
      tolerance:
        text_match: exact
      require_confirm: true
      confirm_control: Undo
      require_correct_instance: false
      target_instance_label_or_id: File deleted
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Deleting the wrong file row (a different filename appears in the notification).
  - Clicking “Dismiss” instead of “Undo”.
  - 'The notification appears but no “Restored: Contract.docx” toast ever appears.'
  expected_interaction_path:
  - Locate the “Contract.docx” row in the Files table.
  - Click its trash/delete icon.
  - In the resulting notification, click “Undo”.
  - 'Observe the success message “Restored: Contract.docx”.'
  notes: 'Instrumentation: add data-row-key for each table row and data-testid for each row action icon (e.g., delete-row-<key>). In the toast, expose action button labels via accessible names and data-testid="toast-action-undo".'
- id: toast_snackbar-antd-T09
  name: 'Match reference: trigger the Error-style notification (icon-only triggers)'
  canonical_type: toast_snackbar
  implementation_source: antd
  implementation_variant: notification
  implementation_component: 'AntD: notification (type variants)'
  task_template: match_reference
  secondary_template: null
  browsergym_goal: Trigger the notification that matches the sample (the Error style). The task will finish automatically when done.
  ui_copy: Trigger the notification that matches the sample (the Error style). The task will finish automatically when done.
  setup_description: |-
    Scene is an isolated card titled “Toast style gallery” rendered in **dark theme** and **small scale**.

    At the top of the card there is a non-interactive sample labeled “Target sample”. The sample shows the **Error** styling (error icon + red accent) with the label “Error”.

    Below the sample are four small icon-only circular buttons (no text labels). Each button triggers an Ant Design **notification** variant:
    - Success → notification title “Success ping”
    - Info → notification title “Info ping”
    - Warning → notification title “Warning ping”
    - Error → notification title “Error ping”

    All notifications share the same description text “Style demo.” and appear in the same corner. Only the error-styled notification matches the sample.
  scene_context:
    theme: dark
    spacing: comfortable
    layout: isolated_card
    placement: top_right
    scale: small
    instances: 1
    guidance: visual
    clutter: none
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 2
    justification: Icon-only triggers in a dark/small UI increase target acquisition and require mapping the visual reference to the correct toast variant.
  success_trigger:
    human_readable:
    - A notification toast becomes visible with title exactly “Error ping”.
    - The visible notification’s kind/severity matches Error (as defined by the implementation).
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        reference_id: target_sample_error
        toast_expected:
          title: Error ping
          kind: error
      tolerance:
        text_match: exact
        kind_match: exact
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - A notification appears but the title is “Success ping”, “Info ping”, or “Warning ping”.
  - A notification appears with “Error ping” title but wrong styling (kind not error, due to miswired trigger).
  - No notification appears.
  expected_interaction_path:
  - Look at the “Target sample” to identify the Error style.
  - Click the icon-only trigger that corresponds to Error.
  - Observe the notification titled “Error ping”.
  notes: 'Checker note: for robustness, verify both the title text and a categorical kind (success/info/warning/error) derived from toast classes or a data-kind attribute.'
- id: toast_snackbar-antd-T10
  name: Dismiss the middle toast in a three-notification stack (similar titles)
  canonical_type: toast_snackbar
  implementation_source: antd
  implementation_variant: notification
  implementation_component: 'AntD: notification (stacked)'
  task_template: clear_reset
  secondary_template: null
  browsergym_goal: Dismiss the notification titled “Backup completed” (not “Backup complete”). The task will finish automatically when done.
  ui_copy: Dismiss the notification titled “Backup completed” (not “Backup complete”). The task will finish automatically when done.
  setup_description: |-
    Scene is an isolated card titled “Backups”. Global spacing is set to **compact**.

    On page load, three persistent Ant Design **notifications** are already visible and stacked in the same corner. Each notification has a close (×) icon:
    1) Title: “Backup complete”
    2) Title: “Backup completed”  ← target
    3) Title: “Backup completion scheduled”

    All three share a similar description (“Nightly backup status”) to increase confusability. The user must dismiss only the exact-title match.
  scene_context:
    theme: light
    spacing: compact
    layout: isolated_card
    placement: top_right
    scale: default
    instances: 3
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 4
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 5
    justification: Three highly similar notification titles require careful reading and selecting the correct close icon; mistakes are costly because the wrong toast dismissal fails the task.
  success_trigger:
    human_readable:
    - The notification titled “Backup completed” is no longer visible.
    - The notifications titled “Backup complete” and “Backup completion scheduled” remain visible.
    canonical_predicate:
      predicate_type: equals
      target_state:
        must_be_absent:
        - title: Backup completed
        must_be_present:
        - title: Backup complete
        - title: Backup completion scheduled
      tolerance:
        text_match: exact
      require_confirm: true
      confirm_control: Close (×) on “Backup completed”
      require_correct_instance: true
      target_instance_label_or_id: Backup completed
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Closing “Backup complete” instead of “Backup completed”.
  - Closing more than one notification.
  - Leaving “Backup completed” visible.
  expected_interaction_path:
  - Read the titles of the stacked notifications carefully.
  - Click the close (×) icon on the notification titled “Backup completed”.
