  success_trigger:
    human_readable:
    - A toast/snackbar is visible.
    - A visible toast has message text exactly equal to “Link copied to clipboard.”
    canonical_predicate:
      predicate_type: set_membership
      target_state:
        toasts_visible_include:
        - text: Link copied to clipboard.
          kind: info
      tolerance:
        text_match: exact
      require_confirm: false
