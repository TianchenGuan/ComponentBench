- id: toast_snackbar-antd-T01
  name: 'Show success message: Profile saved'
  canonical_type: toast_snackbar
  implementation_source: antd
  implementation_variant: message
  implementation_component: 'AntD: message'
  task_template: activate
  secondary_template: null
  browsergym_goal: Click “Save profile” so that a success toast message appears saying “Profile saved.” The task will finish automatically when done.
  ui_copy: Click “Save profile” so that a success toast message appears saying “Profile saved.” The task will finish automatically when done.
  setup_description: |-
    Scene is an isolated card labeled “Profile”. In the middle of the page there is a single primary button labeled “Save profile”.

    When the button is clicked, an Ant Design global **message** toast appears near the top of the viewport (standard message placement) with success styling and the exact text “Profile saved.” The message auto-dismisses after a short duration.

    No other toast-producing controls are present; the page contains no additional forms or navigation.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single large button triggers a single toast with explicit text; success is detected as soon as the message appears.
  success_trigger:
    human_readable:
    - A toast/snackbar is visible on screen.
    - At least one visible toast has message text exactly equal to “Profile saved.”
    - No confirmation/action click inside the toast is required.
    canonical_predicate:
      predicate_type: set_membership
      target_state:
        toasts_visible_include:
        - text: Profile saved.
          kind: success
      tolerance:
        text_match: exact
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - A toast appears but the text is different (e.g., “Saved”, “Profile updated”).
  - A toast appears with the right styling but without the exact text match.
  - No toast appears (button not clicked or click missed).
  expected_interaction_path:
  - Click “Save profile”.
  - Observe the success message toast “Profile saved.”
  notes: 'Instrumentation: add data-testid="toast-root" for the message container and data-testid="toast-text" for the text node. For AntD message, the checker can also fall back to querying .ant-message-notice-content textContent.'
