- id: stepper-antd-T08
  name: 'Modal wizard: match step to preview'
  canonical_type: stepper
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Steps'
  task_template: match_reference
  secondary_template: null
  browsergym_goal: Open the Setup Wizard modal and set its stepper to match the step highlighted in the preview card. The task will finish automatically when done.
  ui_copy: Setup Wizard — Match the highlighted step in the preview.
  setup_description: |
    Layout: modal_flow.

    Page structure:
    - A single primary button in the center of the page labeled “Open Setup Wizard”.
    - Next to it is a small “Preview” card that shows a miniature step strip with one step visually highlighted (this is the reference).

    Target component:
    - Clicking “Open Setup Wizard” opens an Ant Design Modal containing an Ant Design Steps component at the top.
    - The modal stepper has 5 steps: “Welcome” → “Company info” → “Security” → “Integrations” → “Finish”.
    - Step headers are clickable (Steps configured with `onChange`).

    Reference preview:
    - The preview card highlights exactly one of the modal’s step titles (e.g., “Security”), but the task instruction does not name it.
    - The preview is implemented as a static element with a stable selector (e.g., data-testid='step-preview') and encodes the target step in a data attribute for the checker.

    Initial state:
    - The modal (when opened) starts on “Welcome”.

    Distractors:
    - The modal also contains placeholder text content and a “Close” button (not required for success).

    Feedback:
    - Changing steps updates the highlighted active step in the modal header immediately.
  scene_context:
    theme: light
    spacing: comfortable
    layout: modal_flow
    placement: center
    scale: default
    instances: 1
    guidance: visual
    clutter: low
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 2
    justification: Requires opening a modal overlay and mapping a visual reference (preview highlight) to the correct step in the stepper, increasing depth and observability demands.
  success_trigger:
    human_readable:
    - Target stepper instance is the intended one.
    - Active step matches the step highlighted in the on-page reference preview.
    - 'Reference source element: step-preview.'
    - Task ends when the predicate holds.
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        reference_element_testid: step-preview
        reference_semantics:
          field: highlighted_step_label_or_index
          extraction: data attribute or aria-current on reference preview
        match_field: active_step_label
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The wizard modal is never opened, so the stepper cannot be set to match the preview.
  - The active step in the modal does not match the highlighted preview step.
  - A different UI element is matched (e.g., changing unrelated content) while the stepper remains on the wrong step.
  expected_interaction_path:
  - Click “Open Setup Wizard” to open the modal.
  - Look at the preview card to identify the highlighted target step.
  - In the modal stepper, click the corresponding step header.
  notes:
  - 'Instrumentation: the preview card should expose the target step via data-target-step or an aria-current marker so the checker can derive the canonical target.'
  - 'AntD docs note: setting `onChange` makes Steps clickable. This task relies on that behavior.'
