- id: stepper-antd-T01
  name: 'Checkout: select Shipping step'
  canonical_type: stepper
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Steps'
  task_template: select_one
  secondary_template: null
  browsergym_goal: In the Checkout progress stepper, select the “Shipping” step. The task will finish automatically when done.
  ui_copy: Checkout progress — Select the “Shipping” step.
  setup_description: |
    Layout: isolated_card centered on the page (single card, no scrolling).

    Component: Ant Design Steps configured as a 3-step checkout progress indicator with clickable steps (Steps uses an `onChange` handler so each step header is interactable).
    Steps (left→right): “Cart” → “Shipping” → “Payment”.

    Initial state:
    - Current/active step is “Cart” (step 1).
    - No errors, no optional steps, no extra buttons.

    Affordances / visuals:
    - Each step shows a number + title.
    - The active step is highlighted; inactive steps are muted.

    Distractors:
    - None (only a short paragraph of static explanatory text under the stepper).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single stepper with only three clearly labeled steps; clicking the target step immediately changes the active state with obvious visual feedback.
  success_trigger:
    human_readable:
    - Target stepper instance is the intended one.
    - Active step label is “Shipping” (step 2).
    - Task ends when the predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        active_step:
          label: Shipping
          index: 1
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The active step is still “Cart” or has moved to “Payment”.
  - A different stepper instance is modified (not applicable here, but should be checked defensively).
  - Only the step content text changes while the stepper’s active indicator remains on a different step.
  expected_interaction_path:
  - Click the step header labeled “Shipping”.
  notes:
  - 'Instrumentation: add data-testid=''stepper-checkout'' on the Steps container; each step header should expose its title as accessible name.'
  - 'AntD docs: Steps become clickable when `onChange` is set; status values include wait/process/finish/error and vertical orientation is supported. (Used for other variants.)'
