    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 2
      disambiguation_load: 1
    justification: Requires handling a popover confirmation layer; the toggle only commits after an explicit confirm.
  success_trigger:
    human_readable:
    - Target toggle button is ON (pressed).
    - Change is committed by clicking 'Confirm'.
    canonical_predicate:
      predicate_type: equals
      target_state:
        pressed: true
      tolerance: null
      require_confirm: true
      confirm_control: Confirm
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Clicking the toggle but not clicking 'Confirm' in the popover.
  - Clicking 'Cancel' (toggle stays Off).
  - Dismissing the popover and leaving Delete mode Off.
  - Ending with Delete mode Off.
  expected_interaction_path: Click 'Delete mode' → in the popover click 'Confirm' → verify the button is pressed.
  notes: Checker should verify (a) confirm was clicked (e.g., commit flag) and (b) pressed state is true on the toggle.
