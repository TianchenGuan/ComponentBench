  - Only one of Email/SMS is selected (partial selection).
  - Email and SMS are selected but an additional channel is also selected.
  - Selections were made in a different menu button (no other instances should exist).
  expected_interaction_path:
  - Open the “Notification channels” menu button.
  - Click “Email” and “SMS” to toggle them on.
  - Ensure “Push” and “In-app” remain off.
  notes: 'Checker hint: use the menu’s selectedKeys array (or equivalent state) to compare sets.'
- id: menu_button-antd-T07
  name: Change date format and apply
  canonical_type: menu_button
  implementation_source: antd
  implementation_variant: with_apply_footer
  implementation_component: 'AntD: Dropdown + Menu + custom footer (Apply/Cancel)'
  task_template: confirm_cancel
  secondary_template: null
  browsergym_goal: Open the “Date format” menu button, choose “YYYY-MM-DD”, then click Apply. The task will finish automatically
    when done.
  ui_copy: Open the “Date format” menu button, choose “YYYY-MM-DD”, then click Apply. The task will finish automatically when
    done.
  setup_description: 'Layout: isolated_card anchored near the top-right of the viewport (placement=top_right). The card contains
    one menu button labeled “Date format: MM/DD/YYYY”. Clicking opens a dropdown panel. Inside the panel is a single-select
    list of three formats: “MM/DD/YYYY”, “DD/MM/YYYY”, “YYYY-MM-DD”. Below the list is a footer row with two small buttons:
    “Cancel” and primary “Apply”. Important: clicking a format only stages the choice (a small dot indicator moves), but the
    trigger button label does not update until Apply is clicked. Initial state: MM/DD/YYYY is the applied value. Feedback:
    after Apply, the trigger updates to “Date format: YYYY-MM-DD” and a brief toast “Saved” appears.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: top_right
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 1
    justification: Requires a two-step commit (select then Apply); staged vs applied state increases the chance of stopping
      early.
  success_trigger:
    human_readable:
    - The applied Date format value equals “YYYY-MM-DD”.
    - The Apply control inside the dropdown has been activated after selecting the target format.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_item: YYYY-MM-DD
      tolerance: null
      require_confirm: true
      confirm_control: Apply
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - “YYYY-MM-DD” is only staged/previewed but Apply was not clicked (button label still shows the old format).
  - Cancel is clicked after selecting the target (reverts to MM/DD/YYYY).
  - A different format is applied.
  expected_interaction_path:
  - Click the “Date format” menu button to open the dropdown.
  - Click “YYYY-MM-DD” to stage it.
  - Click Apply.
  notes: 'Checker hint: track both staged_value and applied_value; success should use applied_value when require_confirm=true.'
