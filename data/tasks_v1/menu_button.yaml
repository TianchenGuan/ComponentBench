- id: menu_button-antd-T01
  name: Open Account actions menu
  canonical_type: menu_button
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Dropdown + Menu + Button'
  task_template: open_overlay
  secondary_template: null
  browsergym_goal: Open the “Account actions” menu button and leave the menu open. The task will finish automatically when
    done.
  ui_copy: Open the “Account actions” menu button and leave the menu open. The task will finish automatically when done.
  setup_description: 'Layout: isolated_card centered in the viewport. The card title reads “Account”. Inside the card there
    is a single AntD Button labeled “Account actions” with a down chevron; it is the trigger for an AntD Dropdown. The dropdown
    opens on click and shows a small Menu with three items: “View profile”, “Billing”, and “Sign out”. No other menu buttons
    are present. Initial state: the menu is closed, and no item is selected. Feedback: when the menu is open, the dropdown
    surface is visible and the trigger button has aria-expanded=true.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Only requires opening a single dropdown menu; there are no similar instances or dense choices.
  success_trigger:
    human_readable:
    - The “Account actions” dropdown menu is in the open state (menu surface visible / aria-expanded=true).
    - No specific menu item selection is required.
    canonical_predicate:
      predicate_type: equals
      target_state:
        menu_open: true
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The dropdown is still closed (aria-expanded=false).
  - The dropdown briefly opens but is not open at the terminal moment (e.g., it immediately closes).
  - A different overlay on the page is opened instead of the menu (none are expected in this scene).
  expected_interaction_path:
  - Click the “Account actions” button to open the dropdown menu.
  notes: 'Checker hint: read the trigger button aria-expanded or the presence of the dropdown popup element.'
