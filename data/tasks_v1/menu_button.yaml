  setup_description: 'Layout: settings_panel centered titled “Notifications”. Spacing is comfortable. There is one menu button
    labeled “Notification channels (0 selected)” that opens a Dropdown containing a checkable AntD Menu (multiple selection
    enabled). Menu items: “Email”, “SMS”, “Push”, “In-app”. Each item shows a checkbox/checkmark when selected. Selecting
    items does not close the dropdown (so multiple items can be toggled). A small footer text reads “Select channels” but
    there is no Apply button. Initial state: none selected. Clutter (medium): the panel also contains unrelated switches for
    “Send weekly summary” and “Quiet hours”, but they do not affect success.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: settings_panel
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 2
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 2
    justification: Multi-selection increases state dimensionality and error likelihood (extra options accidentally toggled),
      while feedback is split between checkmarks and the count in the trigger.
  success_trigger:
    human_readable:
    - In the Notification channels menu, the selected set is exactly {Email, SMS}.
    - No other channels (Push, In-app) are selected.
    canonical_predicate:
      predicate_type: set_membership
      target_state:
        selected_items:
        - Email
        - SMS
      tolerance:
