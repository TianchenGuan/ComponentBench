- id: kanban_board_drag_drop-antd-T01
  name: Move a single card into In progress
  canonical_type: kanban_board_drag_drop
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Card + Typography + Tag + external DnD (@dnd-kit/core, @dnd-kit/sortable)'
  task_template: transfer_move
  secondary_template: null
  browsergym_goal: On the Sprint Planning board, move the card “OPS-14 Update status page” into the “In progress” column. The task will finish automatically when done.
  ui_copy: 'Goal: Move “OPS-14 Update status page” to the “In progress” column on the Sprint Planning board.'
  setup_description: 'The page shows a single centered card titled “Sprint Planning” (isolated_card layout). Inside the card is one Kanban board with four labeled columns arranged left-to-right: “Backlog”, “To do”, “In progress”, and “Done”.

    Each column contains 2–4 draggable task cards. Each task card is rendered as an Ant Design Card with a bold title that starts with a short code (e.g., “OPS-14”) followed by a short description. The entire card surface is draggable (no separate drag handle required).

    Initial state: the card titled “OPS-14 Update status page” starts in the “To do” column. The other cards are already placed and should be left unchanged.

    There is no Apply/Save button; dropping the card immediately commits the new column placement. There are no other Kanban boards on the page and no other components are required for success.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single-board, few cards, and the goal only requires placing one uniquely titled card into a clearly labeled column with immediate feedback.
  success_trigger:
    human_readable:
    - The target Kanban instance is “Sprint Planning”.
    - Card OPS-14 is located in column “In progress” (membership only; order within the column does not matter).
    canonical_predicate:
      predicate_type: set_membership
      target_state:
        board_instance: Sprint Planning
        card_id: card_ops_14
        card_title: OPS-14 Update status page
        column_id: in_progress
        column_label: In progress
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The card is moved to any column other than “In progress” (including “Done”).
  - A different card is moved into “In progress” while OPS-14 remains in its original column.
  - OPS-14 is picked up/dragged but dropped back into “To do” (no state change).
  expected_interaction_path: Drag the “OPS-14 Update status page” card from “To do” and drop it anywhere inside the “In progress” column.
  notes: 'Checker hint: read data attributes like data-board-id, data-column-id, and data-card-id from the rendered DOM. Card titles are also present as visible text.

    DnD implementation: external dnd-kit SortableContext wrapping columns and cards; AntD provides the visual Card/Tag/Typography only.'
- id: kanban_board_drag_drop-antd-T02
  name: Reorder a card to the bottom of a column
  canonical_type: kanban_board_drag_drop
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Card + List + external DnD (@dnd-kit/sortable)'
  task_template: drag_operation
  secondary_template: null
  browsergym_goal: In the “To do” column, move the card “BUG-142 Fix login bug” to the bottom of the column. The task will finish automatically when done.
  ui_copy: 'Goal: Make “BUG-142 Fix login bug” the last card in “To do”.'
  setup_description: "The page contains one centered Kanban board inside an Ant Design Card. Columns are labeled “To do”, “In progress”, and “Done”.\nThe “To do” column contains exactly three draggable cards in this initial top-to-bottom order:\n  1) “BUG-142 Fix login bug”\n  2) “DOC-8 Update README”\n  3) “QA-3 Add regression tests”\nCards can be dragged by grabbing anywhere on the card surface. As you drag, a placeholder gap indicates the drop position. Dropping immediately commits the new order; there is no Apply/OK step.\nNo other board instances are present, and other UI on the page is limited to a non-interactive hint text above the board."
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Requires a simple within-column reorder among only three clearly titled cards with strong visual drop feedback.
  success_trigger:
    human_readable:
    - 'In column “To do”, the card order (top → bottom) is: DOC-8, QA-3, then BUG-142.'
    - Cards in other columns are ignored by the checker.
    canonical_predicate:
      predicate_type: equals
      target_state:
        board_instance: Primary
        column_id: todo
        column_label: To do
        ordered_card_ids:
        - card_doc_8
        - card_qa_3
        - card_bug_142
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - BUG-142 is not the last card in “To do” (e.g., it remains first or is placed in the middle).
  - BUG-142 is moved to another column instead of being reordered within “To do”.
  - DOC-8 and QA-3 are swapped but BUG-142 is still not last.
  expected_interaction_path: Drag “BUG-142 Fix login bug” downward within the “To do” column until the placeholder indicates the last position, then drop.
  notes: Checker should compare the DOM order of cards within the To do column container (by data-card-id) to the expected list.
