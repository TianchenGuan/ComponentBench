  setup_description: "The board is shown inside a Mantine Card titled “Ops checklist”. Columns are “To do”, “In progress”, and “Done”.\nInitial state: “OPS-2 Rotate secrets” is in “In progress”.\nFeedback behavior: dragging any card puts the board into a “pending” state and shows a footer bar with two buttons:\n  - “Save changes” (primary)\n  - “Discard”\nThe board reverts if “Discard” is clicked. The move is not considered committed until “Save changes” is pressed (the pending indicator disappears afterwards).\nCards are draggable by grabbing the card body. Dropping updates the pending layout immediately, but the saved state only updates on Save."
  scene_context:
    theme: light
    spacing: compact
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: low
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 5
      semantic_observability: 3
      disambiguation_load: 2
    justification: Requires understanding and completing a two-phase interaction (pending vs saved), with an explicit Save step and a potential Discard action that can undo progress.
  success_trigger:
    human_readable:
    - OPS-2 is located in column “Done”.
    - The board has no pending/dirty state (changes were saved via “Save changes”).
    canonical_predicate:
      predicate_type: equals
      target_state:
        board_instance: Ops checklist
        card_id: card_ops_2
        card_title: OPS-2 Rotate secrets
        expected_column_id: done
        expected_column_label: Done
        requires_committed_state: true
      tolerance: null
      require_confirm: true
      confirm_control: Save changes
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - OPS-2 is in Done but the pending indicator is still present (Save changes not clicked).
