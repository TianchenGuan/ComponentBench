- id: kanban_board_drag_drop-antd-T07
  name: Move a card and click Apply changes
  canonical_type: kanban_board_drag_drop
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Card + Button (Apply/Cancel) + external DnD (@dnd-kit/core)'
  task_template: confirm_cancel
  secondary_template: transfer_move
  browsergym_goal: Move the card “DESIGN-5 Update icons” into the “Done” column, then click “Apply changes” to save. The task will finish automatically when done.
  ui_copy: 'Goal: Move “DESIGN-5 Update icons” to Done and click Apply changes.'
  setup_description: "The page is in dark theme. A single Kanban board is shown in a centered card titled “Design Tasks”.\nThe board has four columns: “To do”, “In progress”, “Review”, and “Done”. Cards are draggable by grabbing anywhere on the card.\nInitial state: “DESIGN-5 Update icons” is in the “Review” column.\nImportant feedback behavior: dragging a card creates an “Unsaved changes” banner below the board and reveals two buttons in a footer bar:\n  - “Apply changes” (primary)\n  - “Cancel”\nThe board does NOT commit changes until “Apply changes” is clicked. If you click “Cancel”, the board reverts to the last saved state.\nSuccess requires both the correct final placement and a committed (applied) state."
  scene_context:
    theme: dark
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: low
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 4
      semantic_observability: 2
      disambiguation_load: 1
    justification: Adds a required confirmation step and a reversible pending state; the agent must notice that dragging alone does not commit.
  success_trigger:
    human_readable:
    - Card DESIGN-5 is located in column “Done”.
    - The board has no pending/unsaved state (changes have been applied via “Apply changes”).
    canonical_predicate:
      predicate_type: equals
      target_state:
        board_instance: Design Tasks
        card_id: card_design_5
        card_title: DESIGN-5 Update icons
        expected_column_id: done
        expected_column_label: Done
        requires_committed_state: true
      tolerance: null
      require_confirm: true
      confirm_control: Apply changes
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - DESIGN-5 is in the correct column but “Apply changes” was not clicked (pending/unsaved state remains).
  - DESIGN-5 is moved to the wrong column (e.g., “In progress”) even if Apply changes is clicked.
  - The agent clicks “Cancel” after moving the card, causing the board to revert.
  expected_interaction_path: Drag “DESIGN-5 Update icons” to “Done” → click “Apply changes” in the footer → verify the unsaved banner disappears.
  notes: 'Checker hint: track a committed_version counter or a boolean dirty flag in app state; require dirty=false and card membership correct.'
- id: kanban_board_drag_drop-antd-T08
  name: Precise reorder with small cards in compact mode
  canonical_type: kanban_board_drag_drop
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Card (small) + Typography (ellipsis) + external DnD (@dnd-kit/sortable) with drag handles'
  task_template: drag_operation
  secondary_template: null
  browsergym_goal: In the “In progress” column, place the card “BUG-210 Fix footer overflow” between “BUG-205 Fix navbar” and “BUG-212 Fix dropdown”. The task will finish automatically when done.
  ui_copy: 'Goal: Put “BUG-210 Fix footer overflow” between “BUG-205 Fix navbar” and “BUG-212 Fix dropdown” in In progress.'
  setup_description: 'The board is rendered in compact spacing with small-scale cards: reduced padding, smaller fonts, and tighter vertical gaps. The Kanban is inside a centered card titled “UI Bug Triage”.

    Columns are “To do”, “In progress”, “Review”, and “Done”. The “In progress” column contains seven cards with similar “BUG-###” prefixes, making them easy to confuse at a glance.

    Drag affordance: cards are draggable ONLY by a small “grip” (⋮⋮) drag handle icon on the left edge of each card. The rest of the card is clickable but not draggable.

    Initial state: “BUG-210 Fix footer overflow” starts in “In progress”, but not in the correct position relative to the two reference cards.

    Dropping commits immediately; no Apply/Save control is present.'
  scene_context:
    theme: light
    spacing: compact
    layout: isolated_card
    placement: center
    scale: small
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 4
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 2
    justification: Small dense targets, drag-handle-only interaction, and many similar card titles increase both acquisition difficulty and the chance of ordering mistakes.
  success_trigger:
    human_readable:
    - In column “In progress”, BUG-210 appears immediately below BUG-205 and immediately above BUG-212.
    - Only the relative order among these three cards is checked; other cards may remain in any order.
    canonical_predicate:
      predicate_type: equals
      target_state:
        board_instance: UI Bug Triage
        column_id: in_progress
        column_label: In progress
        relative_order_constraint:
          must_be_between:
            card_id: card_bug_210
            above_card_id: card_bug_212
            below_card_id: card_bug_205
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - BUG-210 is above BUG-205 or below BUG-212 (wrong relative placement).
  - BUG-210 is moved to another column.
  - The agent drags by the card body (which does not start a drag) and leaves the order unchanged.
  expected_interaction_path: Use the small grip handle on BUG-210 → drag within In progress until the placeholder is between BUG-205 and BUG-212 → drop.
  notes: 'Checker hint: compute indices of the three relevant card ids within the In progress column and verify index(BUG-205) < index(BUG-210) < index(BUG-212).'
