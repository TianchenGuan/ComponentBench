    Inside the modal is the Kanban board (this is the only interactive Kanban instance). The modal board has four columns: “Backlog”, “To do”, “Review”, and “Done”.

    Initial state: the card titled “DEP-7 Deploy to staging” is currently in the “To do” column. The “Review” column already contains other cards.

    Drag-and-drop is enabled inside the modal; dropping a card commits immediately. The modal has standard close controls (X in the top-right and Cancel/Close buttons), but closing the modal is not required for success.

    Outside the modal (behind it) there is a faint, non-interactive preview of the board used as a visual backdrop and should be ignored.'
