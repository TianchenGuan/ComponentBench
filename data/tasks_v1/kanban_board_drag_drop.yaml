  - The correct order is achieved in a different column instead of “Review”.
  - Cards are moved across columns (membership changes) rather than just reordering within Review.
  expected_interaction_path: Read the “Reference (Review)” order → drag cards within the Review column until the top-to-bottom order matches → stop when stable.
