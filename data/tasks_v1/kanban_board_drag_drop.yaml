  - DEP-7 is moved on the background preview board (non-interactive) rather than the modal board (should not be possible; checker should still guard by instance id).
  - The modal is opened but DEP-7 remains in “To do”.
  expected_interaction_path: Click “Open Sprint Board” → in the modal, drag “DEP-7 Deploy to staging” from “To do” to “Review” → drop.
  notes: 'Checker hint: modal Kanban root should have a distinct data-board-id (e.g., sprint_modal) so the checker can disambiguate from any background preview elements.

