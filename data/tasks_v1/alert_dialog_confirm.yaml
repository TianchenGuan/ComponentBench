- id: alert_dialog_confirm-antd-T01
  name: Confirm deleting a draft (basic modal confirm)
  canonical_type: alert_dialog_confirm
  implementation_source: antd
  implementation_variant: Modal.confirm
  implementation_component: 'AntD: Modal.confirm'
  task_template: confirm_cancel
  secondary_template: null
  browsergym_goal: 'Delete the draft named “Q1 Budget Draft”: click the “Delete draft” button and then click “Confirm” in
    the confirmation dialog. The task will finish automatically when done.'
  ui_copy: 'Delete the draft named “Q1 Budget Draft”: click the “Delete draft” button and then click “Confirm” in the confirmation
    dialog.'
  setup_description: |-
    Baseline isolated-card layout centered in the viewport. A single card titled “Drafts” contains one row labeled “Q1 Budget Draft” with a primary action button labeled “Delete draft”.

    When “Delete draft” is clicked, an Ant Design static confirmation modal (Modal.confirm) appears centered with:
    - Title: “Delete this draft?”
    - Body text: “This cannot be undone.”
    - Footer buttons: “Cancel” (left) and “Confirm” (right, danger-styled).
    - Standard close (×) icon in the top-right of the modal.

    No other dialogs are present. There are no other destructive actions on the page and no other overlays. The modal closes immediately after a button is pressed, and a small non-blocking toast appears (“Action recorded”) purely as feedback (toast is NOT used for success).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single instance with clearly labeled Confirm/Cancel buttons; the only challenge is opening the modal and
      clicking the obvious primary action.
  success_trigger:
    human_readable:
    - The “Delete this draft?” confirmation modal was opened from the “Delete draft” trigger for “Q1 Budget Draft”.
    - The user explicitly clicked the modal footer button labeled “Confirm”.
    - The confirmation modal is closed after the click.
    canonical_predicate:
      predicate_type: equals
      target_state:
        dialog_open: false
        last_action: confirm
        dialog_instance: delete_draft_q1_budget_draft
      tolerance: null
      require_confirm: true
      confirm_control: Confirm
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Clicking “Cancel” instead of “Confirm”.
  - Closing the modal via the × close icon, pressing Escape, or clicking the mask/backdrop (counts as dismiss, not confirm).
  - Confirming any other dialog (if a different dialog is opened by mistake).
  - “Confirm” clicked but the dialog remains open (e.g., due to a blocked close); success requires the dialog to be closed.
  expected_interaction_path:
  - Click “Delete draft” in the Drafts card.
  - In the modal, click “Confirm”.
  notes: 'Instrumentation: attach data-testid to the trigger (cb-open-delete-draft) and to modal buttons (cb-confirm, cb-cancel).
    Checker can read {open, lastAction, instanceId} from a window.__cbDialogState object.'
