    task will finish automatically when done.
  ui_copy: Use the preview card to choose the correct confirmation dialog, then click “Confirm” in that dialog.
  setup_description: |-
    Isolated-card layout centered in the viewport. Two side-by-side action cards are shown:
    - Left card: “Deactivate user” with a button “Deactivate…”
    - Right card: “Remove from team” with a button “Remove…”

    Each button opens an Ant Design Modal.confirm with similar structure (title, short warning text, Cancel/Confirm).
    The titles differ:
    - “Deactivate this user?”
    - “Remove this user from the team?”

    On the right side of the page (same viewport), there is a “Preview” card that shows a small static image of the *target* confirmation dialog (a screenshot-like thumbnail). The preview is intentionally visual: it shows the dialog title and the confirm button style, but the browsergym instruction does NOT name which action to pick.

    The agent must visually match the preview to the dialog it opens, then click “Confirm”. Only one dialog can be open at a time.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 2
    guidance: visual
    clutter: low
  difficulty:
    difficulty_bucket: mid
    tier: L2
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 3
    justification: The goal is specified visually, so the agent must match dialog content/title from pixels; two similar actions
      increase confusion even though buttons are large.
  success_trigger:
    human_readable:
    - The opened dialog matches the preview card (by instance id bound to the preview).
    - The user clicked the “Confirm” footer button in that dialog.
    - The dialog is closed after confirmation.
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        dialog_open: false
        last_action: confirm
        dialog_instance: preview_target
      tolerance: exact_match_by_instance_id
      require_confirm: true
      confirm_control: Confirm
      require_correct_instance: true
      target_instance_label_or_id: Preview target
      terminal_condition: true
  negative_cases:
  - Confirming the non-matching dialog (does not correspond to the preview).
  - Opening the correct dialog but clicking “Cancel” or dismissing it.
  - Confirming after switching dialogs (preview must match the confirmed dialog instance).
  expected_interaction_path:
  - Look at the Preview card thumbnail to identify the target dialog title/style.
  - Click the button that opens the matching confirmation dialog.
  - Click “Confirm”.
  notes: 'Implementation tip: bind the preview to a specific instance id (e.g., data-cb-preview-target=''remove_from_team'')
    so checker does not need OCR; it only validates that the confirmed instance matches preview-target id.'
