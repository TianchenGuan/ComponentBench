- id: alert_dialog_confirm-antd-T07
  name: Match a dialog to a visual preview and confirm
  canonical_type: alert_dialog_confirm
  implementation_source: antd
  implementation_variant: Modal.confirm
  implementation_component: 'AntD: Modal.confirm'
  task_template: match_reference
  secondary_template: null
