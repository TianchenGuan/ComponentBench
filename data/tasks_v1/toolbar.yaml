    A centered isolated card contains a toolbar labeled "Formatting". The toolbar is a horizontal row of three toggle-like controls implemented with Ant Design Buttons (or Button.Group) that visually indicate pressed state: "Bold", "Italic", and "Underline". Each control has a tooltip on hover that repeats the label.
    Below the toolbar, a small preview sentence is shown and a compact status readout lists the current toggle states (e.g., "Bold: Off"). Initially, all toggles are Off.
    There are no other required controls; no modal or dropdown is involved.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 2
