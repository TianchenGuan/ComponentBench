- id: toolbar-antd-T01
  name: Click Refresh in actions toolbar
  canonical_type: toolbar
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Flex or Space + Button (toolbar composite)'
  task_template: activate
  secondary_template: null
  browsergym_goal: In the "Actions" toolbar, click "Refresh". The task will finish automatically when done.
  ui_copy: |-
    Actions toolbar: Refresh · Export · Help
    Last action: None
  setup_description: |-
    A single isolated card is centered in the viewport. At the top of the card there is an Ant Design-style horizontal toolbar labeled "Actions" implemented as a Flex/Space row of three medium-size Buttons: "Refresh", "Export", and "Help".
    Below the toolbar, a read-only status line shows "Last action: …" and updates immediately when a toolbar button is pressed. The initial value is "None".
    No other interactive controls are required; the rest of the card contains explanatory text only. The toolbar is fully visible without scrolling.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 5
      disambiguation_load: 1
    justification: Single, clearly labeled button in an uncluttered toolbar; success is immediately visible in a text status
      line.
  success_trigger:
    human_readable:
    - Target component is the toolbar labeled "Actions".
    - The toolbar's last-dispatched action becomes exactly "refresh" (case-insensitive match to the button label "Refresh").
    - No confirmation step is required.
    canonical_predicate:
      predicate_type: equals
      state_field: last_action
      target_state: refresh
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: Actions
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Clicking "Export" or "Help".
  - Clicking anything outside the toolbar (status text, card body).
  - A hover tooltip appearing without a click should not count as success.
  expected_interaction_path:
  - Locate the card and the "Actions" toolbar.
  - Click the "Refresh" button.
  - 'Verify the status line updates to Last action: Refresh.'
  notes: 'Instrumentation: add data-testid="toolbar-actions" on the toolbar root and data-testid for each button (e.g., "toolbar-actions-refresh").
    Checker reads toolbar state.last_action.'
- id: toolbar-antd-T02
