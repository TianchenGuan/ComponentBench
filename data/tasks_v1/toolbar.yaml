- id: toolbar-antd-T06
  name: Set Bold and Underline on the Primary toolbar
  canonical_type: toolbar
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Space + Button toggles (two toolbars on page)'
  task_template: select_many
  secondary_template: null
  browsergym_goal: In the "Primary (Editor)" toolbar, turn ON "Bold" and "Underline", and make sure "Italic" is OFF. The task
    will finish automatically when done.
  ui_copy: |-
    Primary (Editor) toolbar and Secondary (Comment) toolbar
    Target formatting preview: Bold + Underline (Italic off)
  setup_description: |-
    A centered isolated card contains TWO visually similar Ant Design toolbars stacked vertically with small headings:
    1) "Primary (Editor)" toolbar (target) and 2) "Secondary (Comment)" toolbar (distractor).
    Each toolbar contains three toggle buttons: "Bold", "Italic", and "Underline". Pressed buttons appear filled and have aria-pressed=true.
    To the right of the toolbars there is a small "Target formatting" preview panel that visually highlights the Bold and Underline icons and shows Italic as inactive (guidance=mixed). The preview is informational only.
    Initial state: On the Primary toolbar, only Italic is On; Bold and Underline are Off. On the Secondary toolbar, Bold is On and the others are Off.
    No dropdowns or modals are used; the only challenge is selecting the correct toolbar instance and setting multiple toggles.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 2
    guidance: mixed
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 3
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 3
    justification: Requires updating multiple toggles and disambiguating between two near-identical toolbars, aided by a mixed
      text+visual reference.
  success_trigger:
    human_readable:
    - Target component is the toolbar instance labeled "Primary (Editor)".
    - 'Within the target toolbar: bold=true, underline=true, italic=false.'
    - Other toolbar instances may change during exploration but do not count for success.
    canonical_predicate:
      predicate_type: equals
      state_field: toggles
      target_state:
        bold: true
        italic: false
        underline: true
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Primary (Editor)
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Applying the correct toggles in the Secondary (Comment) toolbar instead of the Primary toolbar.
  - Bold and Underline are On but Italic is also On.
  - Only one of Bold/Underline is enabled.
  - Relying on the preview panel without changing the toolbar state.
  expected_interaction_path:
  - Identify the two toolbars and confirm which one is labeled "Primary (Editor)".
  - 'On the Primary toolbar: click Bold to enable it.'
  - Click Underline to enable it.
  - If Italic is enabled, click it to disable.
  - Verify the Primary toolbar matches the target preview.
  notes: Checker must scope to the correct toolbar root (data-testid="toolbar-primary"). Ensure both toolbars have distinct
    labels/aria-label to support accessibility-tree agents.
- id: toolbar-antd-T07
  name: Reorder clipboard tools and click Done
  canonical_type: toolbar
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Flex + Button/IconButton + Tooltip (sortable toolbar composite)'
  task_template: drag_operation
  secondary_template: null
  browsergym_goal: 'In the "Clipboard" toolbar, enter customize mode and reorder the tools to: Undo, Cut, Copy, Paste. Then
    click "Done". The task will finish automatically when done.'
  ui_copy: 'Clipboard toolbar: Cut · Copy · Paste · Undo · Customize · Done'
  setup_description: |-
    A centered isolated card shows a single toolbar labeled "Clipboard" with four action chips/icons in a row: "Cut", "Copy", "Paste", and "Undo". At the right end of the toolbar there is a "Customize" button (gear icon with text) that toggles reorder mode.
    Initial state: the tool order is Cut, Copy, Paste, Undo. When "Customize" is activated, each tool shows a visible drag handle (grip icon) and the cursor indicates draggable items; a "Done" button appears inside the toolbar to exit customize mode.
    During customize mode, dragging a tool chip rearranges the toolbar order live. The toolbar also shows a small inline hint text: "Drag to reorder".
    No other reorderable lists exist on the page; the card background is otherwise empty.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 1
    justification: Requires a drag-and-drop interaction to achieve an exact order and an explicit "Done" confirmation to commit
      the change.
  success_trigger:
    human_readable:
    - Target component is the toolbar labeled "Clipboard".
    - Toolbar is in committed (not customizing) state after clicking "Done".
    - 'The committed tool order is exactly: [undo, cut, copy, paste].'
    canonical_predicate:
      predicate_type: equals
      state_field: items_order_committed
      target_state:
      - undo
      - cut
      - copy
      - paste
      tolerance: null
      require_confirm: true
      confirm_control: Done
      require_correct_instance: false
      target_instance_label_or_id: Clipboard
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Reordering items visually but not clicking "Done" (order not committed).
  - A different order (e.g., Cut first) even if "Done" is clicked.
  - Dragging outside the toolbar or selecting items without moving them.
  expected_interaction_path:
  - Locate the "Clipboard" toolbar.
  - Click "Customize" to reveal drag handles and the "Done" button.
  - Drag "Undo" to the first position.
  - Adjust remaining items to Cut, Copy, Paste.
  - Click "Done" to commit.
  notes: Checker should distinguish live vs committed order; store items_order_live and items_order_committed, where committed
    updates only on Done. Provide stable ids for each tool chip (e.g., data-tool-id).
- id: toolbar-antd-T08
  name: 'Compact toolbar: reorder tools in the Main instance'
  canonical_type: toolbar
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Flex (compact) + Icon Buttons + Tooltip (sortable toolbar composite)'
  task_template: drag_operation
  secondary_template: null
  browsergym_goal: 'In the "Main" toolbar, enter customize mode and reorder the tools to: Select, Move, Crop, Rotate, Flip,
    Reset. Then click "Apply". The task will finish automatically when done.'
  ui_copy: |-
    Settings panel with Main toolbar and Footer toolbar
    Customize → Apply
  setup_description: |-
    The page is a settings_panel layout anchored to the bottom-left of the viewport. The panel contains several unrelated switches and checkboxes (clutter=medium).
    Inside the panel are TWO compact toolbars with very similar icon-only buttons and small labels above each:
    - "Main" toolbar (target)
    - "Footer" toolbar (distractor)
    Both toolbars are rendered in compact spacing with small-scale controls: each tool is an icon-only Ant Design Button with a tooltip that reveals its name on hover.
    The Main toolbar has 6 tools: Select, Move, Crop, Rotate, Flip, Reset. Initial order (left→right) is: Crop, Rotate, Select, Move, Flip, Reset.
    A small "Customize" icon button at the right edge of each toolbar enters reorder mode for that toolbar only. In reorder mode, small drag handles appear and an "Apply" button appears at the far right of that toolbar to commit changes.
    No page-level Apply exists; the Apply control is within the toolbar row.
  scene_context:
    theme: light
    spacing: compact
    layout: settings_panel
    placement: bottom_left
    scale: small
    instances: 2
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 3
      disambiguation_load: 4
    justification: Small, icon-only draggable targets in compact mode plus two similar toolbar instances create high acquisition
      and disambiguation load; success requires an exact committed order.
  success_trigger:
    human_readable:
    - Target component is the toolbar instance labeled "Main" (not the Footer toolbar).
    - Changes are committed by clicking the "Apply" control in the Main toolbar.
    - Committed tool order equals [select, move, crop, rotate, flip, reset].
    canonical_predicate:
      predicate_type: equals
      state_field: items_order_committed
      target_state:
      - select
      - move
      - crop
      - rotate
      - flip
      - reset
      tolerance: null
      require_confirm: true
      confirm_control: Apply
      require_correct_instance: true
      target_instance_label_or_id: Main
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Reordering the Footer toolbar instead of the Main toolbar.
  - Getting the order correct but not clicking "Apply".
  - A nearly-correct order with any two adjacent tools swapped.
  - Leaving the toolbar in customize mode (Apply not pressed).
  expected_interaction_path:
  - Identify the "Main" toolbar label in the bottom-left settings panel.
  - Click its "Customize" control.
  - Drag tools into the requested order (Select, Move, Crop, Rotate, Flip, Reset).
  - Click "Apply" in the Main toolbar.
  notes: Use distinct data-testid for each toolbar instance and for the per-toolbar Customize/Apply controls. Checker should
    verify the correct instance and committed order only.
