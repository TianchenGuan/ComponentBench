    (Choose 09:00)'
  setup_description: A single isolated settings card is centered in the viewport. The card contains one labeled Ant Design
    TimePicker input labeled “Reminder time”. The component uses a 24-hour HH:mm display (seconds column hidden) and shows
    the placeholder “Select a time” when empty. Clicking the input opens the standard AntD dropdown panel with two scroll
    columns (hours 00–23 and minutes 00–59). The picker is configured with needConfirm=false, so a time selection is committed
    immediately (and is also committed on blur). There are no other interactive components on the page and no distractor time
    pickers.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single HH:mm TimePicker with immediate commit and no distractors; the target value is easy to confirm in
      the input text.
  success_trigger:
    human_readable:
    - The AntD TimePicker labeled “Reminder time” has canonical time value exactly 09:00 (24-hour, HH:mm).
    - No additional confirmation (OK/Apply) is required for this instance.
    canonical_predicate:
      predicate_type: equals
      target_state:
        time_24h: 09:00
      tolerance:
        seconds: 0
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Any time value other than 09:00 (including 09:00 with non-zero seconds).
  - The dropdown panel is opened but the input value is still empty.
  - A partially-entered value (e.g., only hour changed) that does not equal 09:00.
  expected_interaction_path: Click the Reminder time input → select hour 09 → select minute 00 → click outside/press Enter
    to close if needed.
  notes: 'Instrumentation: add data-testid=''tp-reminder'' on the input; checker should read the displayed input value and
    normalize to HH:mm (24h).'
