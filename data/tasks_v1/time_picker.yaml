  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: TimePicker'
  task_template: set_scalar
  secondary_template: null
  browsergym_goal: Set the “Reminder time” field to 09:00. The task will finish automatically when done.
  ui_copy: 'Reminder time

