    Layout: dashboard page with a header row and a card labeled "Filters". The "Edit filters" button is in the Filters card.
    When "Edit filters" is clicked, an Ant Design Modal opens (modal_flow). The modal contains three same-type searchable Selects:
     - "Primary region" (default: North America)
     - "Secondary region" (default: Europe) ← TARGET
     - "Tertiary region" (default: East Asia)
    Each Select uses showSearch and opens its own dropdown popover within the modal.
    Region options include: North America, South America, Europe, Middle East, East Asia, Southeast Asia, South Asia, Africa, Oceania.
    Clutter (medium): the dashboard background includes charts and tables, but they are not interactive once the modal is open; within the modal there are also "Cancel" and "Save" buttons that do not affect success.
    Success is determined only by the selected value in the "Secondary region" Select; saving/closing the modal is not required.
  scene_context:
    theme: light
    spacing: comfortable
    layout: modal_flow
    placement: center
    scale: default
    instances: 3
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 4
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 5
    justification: Requires opening a modal and disambiguating among three similar searchable Select instances. Moderate option
      confusability and additional overlay layering increase interaction complexity.
  success_trigger:
    human_readable:
    - The "Edit filters" modal is open OR was opened during the task (opening is necessary to access the Selects).
    - The selected value of the "Secondary region" Select equals "Southeast Asia".
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_option: Southeast Asia
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Secondary region
      terminal_condition: true
  negative_cases:
  - Setting "Primary region" or "Tertiary region" to Southeast Asia while "Secondary region" remains Europe.
  - Selecting "South Asia" instead of "Southeast Asia".
  - Typing in the search field but not committing the selection (value does not change).
  expected_interaction_path:
  - Click "Edit filters" to open the modal.
  - Click the Secondary region Select to open its dropdown.
  - Type "South" and choose "Southeast Asia".
  notes: Checker should scope queries to the modal container to avoid matching background selects (if any) and bind instances
    via their visible labels.
