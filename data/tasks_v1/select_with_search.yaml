- id: select_with_search-antd-T01
  name: 'Select shipping country: Canada'
  canonical_type: select_with_search
  implementation_source: antd
  implementation_variant: Select (showSearch)
  implementation_component: 'AntD: Select (showSearch=true)'
  task_template: search_and_select
  secondary_template: null
  browsergym_goal: In the Country dropdown, search for and select "Canada". The task will finish automatically when done.
  ui_copy: 'Country: [Select] (Search to filter options)'
  setup_description: |-
    Layout: isolated_card centered in the viewport. The card title is "Shipping address".
    The card contains a single Ant Design Select labeled "Country" with placeholder "Select a country".
    Behavior: clicking the Select opens a dropdown (popover) with a search input at the top (showSearch enabled). Typing filters the visible options.
    Options (single-select): United States, Canada, Mexico, United Kingdom, Germany, Japan.
    Initial state: no country selected (empty value). No validation errors are shown.
    No other interactive elements are present on the page (no clutter/distractors).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: A single, centrally placed searchable Select with a short option list and immediate feedback. The selected
      value is clearly shown in the input.
  success_trigger:
    human_readable:
    - The selected value of the "Country" Select equals "Canada".
    - Selection is applied immediately (no additional confirmation required).
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_option: Canada
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Selecting any other country (e.g., "United States" or "Mexico").
  - Typing "Canada" into the search field but not actually selecting the "Canada" option.
  - Leaving the Select empty (no selection).
  expected_interaction_path:
  - Click the Country Select to open the dropdown.
  - Type "Can" in the search field.
  - Click the "Canada" option (or press Enter when it is highlighted).
  notes: 'Instrumentation: add data-testid=''country-select'' on the Select trigger; checker reads the controlled value (option
    key/label).'
