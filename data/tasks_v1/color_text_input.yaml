    Interaction detail: clicking into a ColorInput opens its popover showing many small swatches (7 per row). Each swatch has an accessible label containing its hex value.

    Initial state: Tag color=#4c6ef5, Badge color=#40c057.

    Goal: choose the swatch ''#fa5252'' (a red swatch) specifically for Tag color.

    Feedback: after selecting a swatch, the popover closes and the Tag color text value updates to the selected hex; the preview swatch updates accordingly.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: dashboard
    placement: center
    scale: default
    instances: 2
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 4
      density_choice_interference: 4
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 3
    justification: Requires opening a popover and selecting one item from a dense swatch grid while disambiguating between two similar ColorInput instances.
  success_trigger:
    human_readable:
    - The Tag color field's parsed color equals RGBA(250, 82, 82, 1.0).
    - Only the Tag color field is checked.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        color_rgba:
          r: 250
          g: 82
          b: 82
          a: 1.0
        is_cleared: false
      tolerance:
        rgb_abs: 0
        a_abs: 0.0
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Tag color
      terminal_condition: task ends when predicate holds
  negative_cases:
  - 'The swatch #fa5252 is selected for Badge color instead of Tag color.'
  - A nearby red swatch is selected (similar but incorrect hex).
  - The popover is opened but no selection is made and the value remains unchanged.
  expected_interaction_path:
  - Locate the Tag color input.
  - Open its swatches popover.
  - 'Click the swatch labeled #fa5252.'
  - 'Confirm the Tag color input now shows #fa5252.'
  notes: Even though selection is via swatches, the checker should still read the ColorInput's text value / canonical color state so the canonical_type remains color_text_input.
