- id: color_text_input-antd-T01
  name: Set Accent color by HEX in AntD ColorPicker
  canonical_type: color_text_input
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: ColorPicker (showText=true, defaultFormat=hex)'
  task_template: enter_formatted
  secondary_template: null
  browsergym_goal: 'Set the Accent color to #1677ff using the HEX text input in the Accent color control. The task will finish automatically when done.'
  ui_copy: 'Accent color: set to #1677ff'
  setup_description: 'Layout: isolated_card centered on the page with a single labeled control.

    Component: AntD ColorPicker with showText enabled; the trigger shows a small color block and the current value text. Clicking the trigger opens a popover panel that contains a format selector (HEX/HSB/RGB) and an editable HEX input field.

    Initial state: Accent color is set to #000000 (black) and format is HEX.

    Feedback: the trigger text and preview update as soon as a valid HEX value is entered; invalid input shows a validation style on the input.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 1
    justification: Single instance in a clean card; the user only needs to open the popover and type an exact HEX value.
  success_trigger:
    human_readable:
    - The Accent color ColorPicker's parsed color equals RGBA(22, 119, 255, 1.0).
    - The value is valid (the component is not in an error/invalid state).
    - No confirmation button is required.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        color_rgba:
          r: 22
          g: 119
          b: 255
          a: 1.0
        is_cleared: false
      tolerance:
        rgb_abs: 0
        a_abs: 0.0
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: Accent color
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The color is entered in the wrong field (if any other color control is present as a distractor).
  - The HEX text is incomplete or invalid (e.g., '#1677f', '#1677ff00' if alpha is not supported/expected).
  - The parsed color is close but not exact (any channel differs from the target).
  expected_interaction_path:
  - Click the Accent color ColorPicker trigger to open the popover.
  - Click into the HEX input (labeled 'HEX').
  - 'Select all text, type #1677ff, and press Enter or click outside to commit.'
  notes: 'Checker hint: read the ColorPicker value as a canonical RGBA color (from controlled state or from the rendered text input after parsing). Prefer a stable data-testid on the Accent ColorPicker root and on the HEX input inside the popup.'
