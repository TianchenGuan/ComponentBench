- id: toggle_button_group_multi-antd-T01
  name: Delivery days toggle set
  canonical_type: toggle_button_group_multi
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Checkbox.Group + Checkbox (styled as pill toggle buttons)'
  task_template: select_many
  secondary_template: null
  browsergym_goal: In the "Delivery days" toggle button group, select Monday, Wednesday, and Friday (and leave the other days unselected). The task will finish automatically when done.
  ui_copy: 'Delivery days: Select Monday, Wednesday, and Friday.'
  setup_description: |-
    Layout: isolated_card centered in the viewport.

    A single card titled “Delivery days” contains one toggle-button-style multi-select group implemented with Ant Design checkboxes styled as pill buttons.

    - Options (left to right): Monday, Tuesday, Wednesday, Thursday, Friday.
    - Each option is a rectangular/pill button that can be toggled on/off; selected buttons show a filled background plus a check indicator.
    - Initial state: no day is selected.
    - No other components affect success; there is no Apply/Save button for this card.
    - No distractors (clutter=none).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Few clearly labeled options with immediate visual selected-state feedback and only one instance on the page.
  success_trigger:
    human_readable:
    - 'Selected options in the target toggle group equal exactly: Monday, Wednesday, Friday'
    - No extra options are selected beyond the target set.
    canonical_predicate:
      predicate_type: set_equals
      target_state:
        selected_values:
        - Monday
        - Wednesday
        - Friday
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting the wrong set (e.g., selecting Tuesday instead of Wednesday).
  - Selecting extra days in addition to Monday, Wednesday, and Friday.
  - Leaving one of the required days unselected.
  expected_interaction_path: Click Monday, click Wednesday, click Friday (verify only those three are highlighted/checked).
  notes: 'Instrumentation: add data-testid to the group root (e.g., delivery-days-group) and each option (value=Monday..Friday) so the checker can read the checked values.'
