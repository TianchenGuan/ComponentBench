- id: time_input_text-antd-T01
  name: Set meeting time to 09:30 (24h, minutes)
  canonical_type: time_input_text
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: TimePicker'
  task_template: enter_formatted
  secondary_template: null
  browsergym_goal: Set the Meeting time field to 09:30. The task will finish automatically when done.
  ui_copy: 'Meeting time: [Time input]

    Goal: 09:30'
  setup_description: |-
    Layout: isolated_card placed at the center of the viewport. Light theme with comfortable spacing.
    The card title is “Schedule”. Inside the card there is a single AntD TimePicker labeled “Meeting time”.
    - Configuration: format='HH:mm' (hours and minutes only), allowClear=true, needConfirm=false.
    - Visuals: an input box with a small clock icon; clicking the input opens a popup panel with hour/minute columns.
    - Initial state: empty (no time selected).
    - No other required controls; no modal or drawer. No distractors (clutter=none).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single, clearly labeled time field with minute-level precision and an obvious textual value display.
  success_trigger:
    human_readable:
    - The AntD TimePicker labeled “Meeting time” has committed value 09:30 (24-hour, minutes).
    - No confirmation click is required for this task (needConfirm=false).
    - Task ends immediately when the value equals the target.
    canonical_predicate:
      predicate_type: equals
      target_state:
        time_24h: 09:30
        granularity: minute
      tolerance:
        seconds: 0
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Any other time value (including 09:03, 19:30, or empty).
  - A partially typed value that has not been parsed/committed by the component.
  - Changing a different time field (not applicable here, but should not pass in multi-instance variants).
  expected_interaction_path:
  - Click the Meeting time input
  - Type 09:30
  - Press Enter or click outside to commit (if needed)
  notes: |-
    Checker hint: read the controlled value emitted by onChange (dayjs) and normalize to 'HH:mm'. Prefer the component value over transient hover/preview states.
