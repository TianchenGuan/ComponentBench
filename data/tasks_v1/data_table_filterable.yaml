- id: data_table_filterable-antd-T01
  name: Filter Orders by Status (Shipped)
  canonical_type: data_table_filterable
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Table'
  task_template: open_and_select
  secondary_template: null
  browsergym_goal: In the Orders table, filter the Status column to only show "Shipped", then click OK to apply the filter.
    The task will finish automatically when done.
  ui_copy: 'Orders table: Set Status filter to Shipped and apply with OK.'
  setup_description: 'Scene context: theme=light; spacing=comfortable; layout=isolated_card; placement=center; scale=default;
    instances=1; guidance=text; clutter=none.

    Layout: isolated_card centered in the viewport. A single Ant Design Table titled "Orders" is shown.

    The table uses default (comfortable) spacing and default scale. Columns: Order ID, Customer, Status, Country, Amount.

    Filter affordances: the Status and Country column headers each have a small funnel icon. Clicking the Status funnel opens
    an AntD filter dropdown popover.

    Status filter configuration: single-select (radio-like) list of 6 statuses (Pending, Processing, Shipped, Delivered, Refunded,
    Cancelled) with OK and Reset buttons at the bottom.

    Initial state: no filters active; all rows visible; no filter chips.

    Distractors: none beyond the second (unused) Country filter icon.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 1
    justification: Single column, single-select option with clear visual feedback in the header; only one table instance and
      minimal clutter.
  success_trigger:
    human_readable:
    - Target table instance is "Orders".
    - 'Column filter model contains exactly one filter: Status equals "Shipped".'
    - No other column or global filters are active.
    - Filter has been applied (popover confirmed via OK).
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_id: orders
        logic_operator: AND
        global_filter: null
        column_filters:
        - column: Status
          operator: equals
          value: Shipped
      tolerance: null
      require_confirm: true
      confirm_control: OK
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Status set to any value other than "Shipped".
  - Country (or any other) filter changed instead of Status.
  - '"Shipped" selected but OK not pressed (filter popover closed without applying).'
  - Multiple statuses selected or residual filters left active.
  expected_interaction_path:
  - Click the Status column filter (funnel) icon.
  - Select "Shipped" in the dropdown list.
  - Click OK to apply.
  notes: 'Instrumentation: expose current AntD Table filters (filteredValue) for the Orders table as a canonical filter model
    for the checker.'
