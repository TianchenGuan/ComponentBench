    - Country filter is set to the set {Canada, Germany}.
    - No other filters are active.
    - Filter changes are applied (OK clicked).
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_id: customers
        logic_operator: AND
        global_filter: null
