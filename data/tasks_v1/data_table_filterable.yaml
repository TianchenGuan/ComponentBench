  - Check Canada and Germany.
  - Click OK.
  notes: Ensure filter order does not matter in the checker; treat multi-select values as an unordered set.
- id: data_table_filterable-antd-T03
  name: Name contains fragment (preview-highlighted)
  canonical_type: data_table_filterable
  implementation_source: antd
  implementation_variant: custom_filterDropdown
  implementation_component: 'AntD: Table (custom filterDropdown with Input)'
  task_template: enter_text
  secondary_template: null
  browsergym_goal: In the Customers table, set the Name filter so it contains the fragment shown in the preview row (it is
    "son"), then click Search to apply. The task will finish automatically when done.
  ui_copy: 'Customers table: Filter Name by the highlighted fragment from the preview row and apply with Search.'
  setup_description: 'Scene context: theme=light; spacing=comfortable; layout=isolated_card; placement=center; scale=default;
    instances=1; guidance=mixed; clutter=none.

    Layout: isolated_card centered. Above the table, a small "Preview row" strip shows an example name with the target fragment
    highlighted in yellow.

    The Ant Design Table titled "Customers" uses comfortable spacing and default scale.

    Name column uses a custom filterDropdown: clicking the Name filter icon opens a popover containing a single-line text
    Input labeled "Search name", plus two buttons: "Search" and "Reset".

    Initial state: no filters active; the preview row is visible and highlights the substring "son".

    Distractors: other columns (Country, Status) have standard filter icons but are not needed.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: mixed
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 1
    justification: Typing a short substring into a single input; the preview highlight reduces ambiguity and the Search button
      gives clear apply feedback.
  success_trigger:
    human_readable:
    - Target table instance is "Customers".
    - Name text filter is active with a contains (case-insensitive) query equal to "son".
    - No other filters are active.
    - Filter is applied via the "Search" button.
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_id: customers
        logic_operator: AND
        global_filter: null
        column_filters:
        - column: Name
          operator: contains_ci
          value: son
      tolerance:
        trim_whitespace: true
        case_sensitive: false
      require_confirm: true
      confirm_control: Search
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Typed text does not include the fragment (e.g., 'so' or 'sons').
  - Correct text typed but Search not clicked (popover closed without applying).
  - Filter applied to a different column instead of Name.
  - Extra filters active in Country/Status.
  expected_interaction_path:
  - Click the Name column filter icon.
  - Type son into the Search name input.
  - Click Search.
  notes: Variant is a common AntD pattern using custom filterDropdown for text search; checker should read the controlled
    filter value stored for the Name column.
