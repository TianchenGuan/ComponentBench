- id: data_table_filterable-antd-T06
  name: Set Amount range ($50-$125)
  canonical_type: data_table_filterable
  implementation_source: antd
  implementation_variant: custom_filterDropdown
  implementation_component: 'AntD: Table (custom filterDropdown with two InputNumber fields)'
  task_template: set_range
  secondary_template: null
  browsergym_goal: In the Orders table, set the Amount filter to show values from 50 to 125 (inclusive), then click Apply.
    The task will finish automatically when done.
  ui_copy: 'Orders table: Set Amount range to 50-125 and apply.'
  setup_description: 'Scene context: theme=light; spacing=comfortable; layout=isolated_card; placement=center; scale=default;
    instances=1; guidance=text; clutter=none.

    Layout: isolated_card centered; light theme, comfortable spacing, default scale.

    Ant Design Table titled "Orders" with columns including Amount. The Amount header has a filter icon.

    Custom Amount filter dropdown: clicking the Amount filter icon opens a popover with two InputNumber fields labeled "Min"
    and "Max", prefilled as blank, and two buttons: "Apply" and "Reset".

    Initial state: no filters active.

    Feedback: after Apply, the Amount filter icon becomes highlighted and the table rows update immediately.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 1
    justification: Requires entering an exact numeric range into two small fields and applying; mistakes require resetting/retyping.
  success_trigger:
    human_readable:
    - Target table instance is "Orders".
    - Amount filter range is set to min=50 and max=125 (inclusive).
    - No other filters are active.
    - Range is applied via the Apply button.
    canonical_predicate:
      predicate_type: equals
      target_state:
        table_id: orders
        logic_operator: AND
        global_filter: null
        column_filters:
        - column: Amount
          operator: between_inclusive
          value:
            min: 50
            max: 125
      tolerance:
        endpoints: 0
      require_confirm: true
      confirm_control: Apply
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Entered 50-125 but forgot to click Apply.
  - Entered a nearby range (e.g., 49-125 or 50-126).
  - Only one endpoint entered (min only or max only).
  - Used the wrong column's filter.
  expected_interaction_path:
  - Click the Amount filter icon.
  - Type 50 in Min and 125 in Max.
  - Click Apply.
  notes: Checker should canonicalize numeric inputs as integers and enforce inclusive endpoints.
