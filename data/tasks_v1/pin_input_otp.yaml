    - Target OTP value (concatenated left→right) is '482159' with length 6.
    - No extra confirmation is required (typing/pasting is sufficient).
    - Only one OTP instance is present, so instance disambiguation is not required.
    canonical_predicate:
      predicate_type: equals
      target_state:
        code: '482159'
        length: 6
        charset: numeric
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
