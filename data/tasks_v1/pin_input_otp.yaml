  - Only partially filling the OTP (fewer than 6 digits).
  - Leaving stray characters (non-digits) in any box.
  expected_interaction_path: Click the first OTP box → type 482159 continuously (auto-advances) → stop when all 6 boxes are filled.
  notes: 'Instrumentation: wrap the OTP composite in data-testid=''otp-sms''; checker concatenates the 6 input values in DOM order.'
