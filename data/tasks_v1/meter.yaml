  - The pending value shows 85% but Apply was not clicked (committed value unchanged).
  - Modal is closed with Cancel/close icon after setting value (no commit).
  - Value is outside tolerance after applying.
  expected_interaction_path:
  - Click “Edit quota” to open the modal.
  - Click the Quota Usage meter bar near 85%.
  - Click “Apply” in the modal footer.
  notes: Checker should distinguish pending vs committed meter state; e.g., commit on Apply sets data-meter-committed='true'.
    Confirm control data-testid='quota-apply'.
