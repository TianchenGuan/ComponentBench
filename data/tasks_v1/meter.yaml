- id: meter-antd-T03
  name: Enable Auto mode on Network Load meter
  canonical_type: meter
  implementation_source: antd
  implementation_variant: progress-line-indeterminate-toggle
  implementation_component: 'AntD: Progress (type=''line'') with indeterminate/active mode (meter harness)'
  task_template: toggle_state
  secondary_template: null
  browsergym_goal: Turn on Auto mode for the Network Load meter. The task will finish automatically when done.
  ui_copy: 'Network Load: Auto mode'
  setup_description: |-
    A single meter card is centered on a dark-themed page.
    - Layout: isolated_card, placement center.
    - Theme: dark (text and controls are high-contrast on a dark background).
    - Component: AntD Progress (type='line') used as a meter approximation.
    - Spacing/scale: comfortable spacing, default size.
    - Instances: 1 labeled “Network Load”.
    - Sub-controls: inside the meter header row, an “Auto” pill toggle (part of the meter widget) switches the meter between determinate (fixed percent) and indeterminate (animated) mode.
    - Initial state: determinate at 40% (shows “40%”).
    - Desired state: Auto ON → indeterminate animation; the numeric percent label is replaced by “Auto”.
    - Distractors: a read-only status line below shows “Last updated: just now”.
    - Feedback: toggle updates immediately; no Apply/Save.
  scene_context:
    theme: dark
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 1
    justification: Only one toggle within a single meter; slightly harder because the target state is an animation/text change
      in dark theme.
  success_trigger:
    human_readable:
    - The Network Load meter is in indeterminate (Auto) mode.
    - No confirmation is required.
    canonical_predicate:
      predicate_type: equals
      target_state:
        mode: indeterminate
        details_open: false
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Meter remains determinate (shows a fixed percent).
  - Auto is toggled on and then turned off again (final state must be Auto on).
  - Any unrelated UI changes (theme toggle, if present in header) must not count as success.
  expected_interaction_path:
  - Click the “Auto” pill toggle in the Network Load meter header.
  - Confirm the meter enters animated/indeterminate mode (shows “Auto”).
  notes: Checker should read meter mode from a data attribute, e.g., data-meter-mode='determinate|indeterminate'. For AntD,
    percent may be undefined in indeterminate mode; do not require aria-valuenow when mode=indeterminate.
