    - Initial state: Primary=20%, Secondary=55%, Archive=80%. The reference bar corresponds to ~72%.
    - Interaction: clicking on each meter bar sets its value. Numeric percent labels are hidden on all three meters; you can hover to see a tooltip with exact percent.
