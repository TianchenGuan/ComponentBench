- id: meter-antd-T01
  name: Set Fuel Level meter to 50%
  canonical_type: meter
  implementation_source: antd
  implementation_variant: progress-line
  implementation_component: 'AntD: Progress (type=''line'') (meter approximation)'
  task_template: set_scalar
  secondary_template: null
  browsergym_goal: Set the Fuel Level meter to 50%. The task will finish automatically when done.
  ui_copy: 'Fuel Level: set to 50%'
  setup_description: |-
    A single centered isolated card shows a labeled meter titled “Fuel Level”.
    - Layout: isolated_card, placed in the center of the viewport.
    - Component: AntD Progress (type='line') used as a meter approximation with a clickable track.
    - Spacing/scale: comfortable spacing, default size.
    - Instances: 1 meter instance.
    - Sub-controls: the progress track is interactive; clicking on the track sets the meter value to the nearest whole percent based on click position. The percent text is shown to the right (showInfo=true).
    - Initial state: 20%.
    - Distractors: none (only a non-interactive label and helper text “Range 0–100”).
    - Feedback: value updates immediately after click; no Apply/Save button.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single large target with visible numeric feedback and immediate updates; no disambiguation or overlays.
  success_trigger:
    human_readable:
    - The Fuel Level meter value is 50% (±3 percentage points).
    - No confirmation is required.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        value_percent: 50
        mode: determinate
      tolerance:
        value_percent: 3
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Meter ends at 49% or 54% (outside tolerance).
  - Any other component is changed (there are no other meter instances, but clicking unrelated text should not count).
  expected_interaction_path:
  - Click on the Fuel Level meter track around the halfway point until the label reads 50%.
  notes: 'Instrumentation: expose meter root with data-testid=''meter-fuel'' and aria-valuenow=percent. Checker can read committed
    value from aria-valuenow or a data-meter-value attribute.'
