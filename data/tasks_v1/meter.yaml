    human_readable:
    - The Quota Usage meter committed value is 85% (±2 percentage points).
    - Apply has been clicked to commit the change.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        value_percent: 85
        mode: determinate
      tolerance:
        value_percent: 2
      require_confirm: true
      confirm_control: Apply
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
