- id: rich_text_editor-mantine-T01
  name: Write a short status update
  canonical_type: rich_text_editor
  implementation_source: mantine
  implementation_variant: null
  implementation_component: 'Mantine: @mantine/tiptap RichTextEditor'
  task_template: enter_text
  secondary_template: null
  browsergym_goal: 'In the editor labeled “Status update”, type: We shipped the February build. The task will finish
    automatically when done.'
  ui_copy: 'Status update

    Please enter: We shipped the February build.'
  setup_description: |-
    Scene is an isolated card centered on the page. Inside the card is a single Mantine RichTextEditor with a standard toolbar (Bold/Italic/etc.) above an empty editing area.
    The editor label above the toolbar reads “Status update”. The editor is focused only when clicked inside the content area; there is no Save/Apply button and changes are immediate.
    No other interactive controls are present.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single empty editor with a short plain-text target; no overlays, formatting, or disambiguation.
  success_trigger:
    human_readable:
    - The RichTextEditor instance labeled “Status update” has plain text exactly equal to “We shipped the February
      build.” after whitespace normalization.
    canonical_predicate:
      predicate_type: equals
      target_state:
        instance_label: Status update
        mode: plaintext_equals
        text: We shipped the February build.
      tolerance:
        normalize_whitespace: true
        ignore_trailing_newline: true
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Text is entered into a different editor (not applicable here, but must not pass if an extra editor is added).
  - Missing or extra punctuation (e.g., missing the final period).
  - Text differs by more than whitespace normalization (extra words, different casing).
  - Only part of the sentence is present.
  expected_interaction_path: Click into the editor content area → type the sentence.
  notes: |-
    Checker hint: read editor.getText() and normalize whitespace (collapse runs of whitespace to single spaces; trim ends).
    Instrumentation: data-testid on wrapper and label, e.g., data-testid="rte-status-update".
- id: rich_text_editor-mantine-T02
