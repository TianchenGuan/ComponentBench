- id: rich_text_editor-mantine-T06
  name: Add a hyperlink in dark mode
  canonical_type: rich_text_editor
  implementation_source: mantine
  implementation_variant: null
  implementation_component: 'Mantine: @mantine/tiptap RichTextEditor'
  task_template: open_overlay
  secondary_template: null
  browsergym_goal: In the editor labeled “Resources”, turn the text “release notes” into a link to https://example.com/notes
    and confirm the link in the link dialog. The task will finish automatically when done.
  ui_copy: 'Resources

    Link “release notes” → https://example.com/notes'
  setup_description: |-
    Scene uses the dark theme but otherwise baseline: an isolated centered card with one RichTextEditor labeled “Resources”.
    The editor starts with one paragraph: “See the release notes for details.”
    The toolbar includes a Link control. Clicking it opens an in-component link popover/dialog with a URL input and a “Save link” button (and a “Cancel” button).
    The selection must be on the text to be linked before opening the link popover.
  scene_context:
    theme: dark
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L1
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 3
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 1
    justification: Requires selecting the correct substring and completing a small overlay flow (URL + Save link),
      but still single-instance with clear text.
  success_trigger:
    human_readable:
    - The “Resources” editor’s plain text remains “See the release notes for details.”
    - The substring “release notes” is a link with href exactly “https://example.com/notes”.
    - The link popover was confirmed via the “Save link” control (i.e., the editor state includes the link mark
      after the popover closes).
    canonical_predicate:
      predicate_type: equals
      target_state:
        instance_label: Resources
        mode: marked_substring
        text: See the release notes for details.
        marked_spans:
        - substring: release notes
          marks:
          - type: link
            href: https://example.com/notes
      tolerance:
        normalize_whitespace: true
      require_confirm: true
      confirm_control: Save link
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Wrong text is linked (e.g., linking “See the”).
  - Link URL differs (missing https, extra slash, different domain).
  - Link mark is created but the link dialog is not confirmed (e.g., popover left open or canceled).
  - Additional formatting is applied unintentionally.
  expected_interaction_path: Select “release notes” → click Link → type/paste URL → click “Save link”.
  notes: |-
    Checker hint: validate link mark attributes in TipTap JSON (mark type=link, attrs.href).
    Also verify the link dialog is closed (if your harness exposes an 'open' state), or rely on the persisted mark as the confirmation signal.
