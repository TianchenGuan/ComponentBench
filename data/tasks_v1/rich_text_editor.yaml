  notes: |-
    Checker hint: use editor.getText(); treat a result that becomes empty after trimming and removing zero-width characters as empty.
    To avoid false positives, also confirm editor.getJSON() contains no meaningful nodes beyond an empty paragraph.
- id: rich_text_editor-mantine-T03
  name: Bold a single word
  canonical_type: rich_text_editor
  implementation_source: mantine
  implementation_variant: null
  implementation_component: 'Mantine: @mantine/tiptap RichTextEditor'
  task_template: toggle_state
  secondary_template: null
  browsergym_goal: In the editor labeled “Team message”, make the word “noon” bold (and leave the rest unchanged).
    The task will finish automatically when done.
  ui_copy: 'Team message

    Make “noon” bold.'
  setup_description: |-
    Isolated card at center. One RichTextEditor labeled “Team message”.
    The editor starts with one paragraph: “Lunch is at noon”.
    The toolbar is visible with a Bold control (B icon / aria-label “Bold”).
    No Save button; formatting updates immediately.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Requires selecting a specific word and toggling one formatting control; otherwise a simple single-instance
      scene.
  success_trigger:
    human_readable:
    - In “Team message”, the plain text remains exactly “Lunch is at noon”.
    - Only the substring “noon” is marked bold; no other characters have the bold mark.
    canonical_predicate:
      predicate_type: equals
      target_state:
        instance_label: Team message
        mode: marked_substring
        text: Lunch is at noon
        marked_spans:
        - substring: noon
          marks:
          - bold
        forbidden_marks_outside_spans:
        - bold
      tolerance:
        normalize_whitespace: true
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Bold is applied to the wrong word (e.g., “Lunch”).
  - Additional text is added or removed.
  - Bold is applied to the entire sentence or includes trailing spaces/punctuation.
  expected_interaction_path: Click into editor → drag/select “noon” → click Bold in toolbar (or use Ctrl/Cmd+B).
  notes: |-
    Checker hint: use TipTap JSON/HTML to verify mark coverage for the substring “noon”.
    Prefer a span-based check: locate the exact substring in the editor’s plain text and validate marks at those offsets.
