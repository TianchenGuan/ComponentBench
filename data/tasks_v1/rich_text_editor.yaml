    - The “Draft note” editor’s plain text is empty (length 0) after trimming whitespace.
    canonical_predicate:
      predicate_type: equals
      target_state:
        instance_label: Draft note
        mode: plaintext_equals
        text: ''
      tolerance:
        trim_whitespace: true
