    finish automatically when done.
  ui_copy: 'Draft note

    Clear the editor so it contains no text.'
  setup_description: |-
    Baseline isolated card centered on the page with one RichTextEditor labeled “Draft note”.
    The content area starts with a single paragraph containing: “Draft: TBD”.
    The toolbar includes standard controls and the cursor is not initially focused.
    There is a subtle placeholder text (“Write something…”) that appears only when the editor becomes empty.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 1
      disambiguation_load: 1
    justification: Clearing existing content is straightforward and immediate; the only challenge is selecting and
