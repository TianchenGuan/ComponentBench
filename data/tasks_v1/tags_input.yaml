- id: tags_input-antd-T01
  name: Add two simple tags (Alpha/Beta)
  canonical_type: tags_input
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Select (mode=tags)'
  task_template: enter_text
  secondary_template: null
  browsergym_goal: In the Tags field, add the tags "alpha" and "beta" (and do not add anything else). The task will finish automatically when done.
  ui_copy: In the Tags field, add the tags "alpha" and "beta" (and do not add anything else). The task will finish automatically when done.
  setup_description: |-
    The page shows a single centered card titled “Create rule”.
    Inside the card is a one-row form with a label “Tags” and an Ant Design Select configured in **tags** mode.

    Component configuration and affordances:
    - The Select is empty initially (no selected tags).
    - Placeholder text reads “Type and press Enter…”.
    - A dropdown arrow icon is on the right; clicking the field also focuses the internal text input.
    - Pressing Enter commits the current text as a tag (chip) in the selector.

    There are no other interactive components on the card (no clutter), and the Tags field is the only tags-input instance on the page.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Single instance in a clean card with immediate visual chip feedback; only two short tags must be committed.
  success_trigger:
    human_readable:
    - 'The target Tags Input component contains exactly these tags (order does not matter): alpha, beta.'
    - No extra tags are present and no required tag is missing.
    canonical_predicate:
      predicate_type: set_equals
      target_state:
        tags:
        - alpha
        - beta
      tolerance:
        case_sensitive: false
        trim_whitespace: true
        normalize_internal_whitespace: true
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Tags are set on the wrong Tags Input instance (when more than one is present).
  - The set of tags is missing at least one required tag.
  - The set of tags contains any extra tag not requested.
  - A tag is present with different spelling/casing than required when case-sensitive matching is in effect.
  - 'Partial entry: text is typed in the input but not committed as a tag (e.g., not submitted).'
  expected_interaction_path:
  - Click inside the Tags field to focus the input.
  - Type alpha → press Enter to commit.
  - Type beta → press Enter to commit.
  - 'Verify exactly two chips are shown: alpha and beta.'
  notes: |-
    Checker hint: read the selected values from the Select value array or from rendered selection items (e.g., `.ant-select-selection-item` text).
    Instrumentation: add `data-testid` to the Select root, internal input, and each rendered tag pill for robust state extraction.
