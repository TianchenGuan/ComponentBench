- id: mentions_input-antd-T01
  name: 'Chat composer: greet Ava'
  canonical_type: mentions_input
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Mentions'
  task_template: open_and_select
  secondary_template: null
  browsergym_goal: 'In the Message field, create a mention for Ava Chen by selecting her from the @ suggestions. The Message field should end up as exactly: "Hi @Ava Chen". The task will finish automatically when done.'
  ui_copy: 'Message: Type @ to mention a teammate. Goal: "Hi @Ava Chen"'
  setup_description: |-
    You are on a simple “Chat composer” card centered in the viewport.

    - Target component: an Ant Design **Mentions** input (single instance) labeled **Message**.
    - The Mentions input is a multiline textarea with a placeholder: “Type @ to mention a teammate”.
    - When you type **@**, a suggestions dropdown appears under the caret (Mentions popup).
    - Suggestions list (short, 6 items) shows full names:
      - Ava Chen, Noah Patel, Maya Rivera, Liam Ortiz, Emma Johnson, Olivia Kim
    - Selecting a suggestion inserts a mention token into the textarea (the inserted text includes the leading “@”).
    - Below the field there is a small read-only line “Detected mentions: …” that updates when a suggestion is selected.
    - Initial state: the Message field is empty; no popup is open.

    No other interactive elements are on the card (no submit button, no extra fields).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Single instance with a short suggestion list; the main challenge is opening the dropdown and selecting the correct option.
  success_trigger:
    human_readable:
    - 'The only Mentions input on the page (Message) must contain the exact text: "Hi @Ava Chen" (whitespace-normalized).'
    - 'The selected mentions list for this input must be exactly: [Ava Chen].'
    - No other characters (including trailing punctuation) may be present.
    canonical_predicate:
      predicate_type: equals
      target_state:
        text: Hi @Ava Chen
        mentions:
        - id: ava
          label: Ava Chen
      tolerance:
        normalize_whitespace: true
        ignore_trailing_whitespace: true
        require_mention_selection_event: true
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Text is correct but Ava Chen was not inserted via the suggestions list (no mention-selection event recorded).
  - A different person is mentioned (e.g., @Olivia Kim).
  - Extra text is present (e.g., "Hi @Ava Chen!" or an extra space at the beginning).
  expected_interaction_path:
  - Click into Message → type "Hi " → type "@" → click "Ava Chen" in the dropdown → verify text/Detected mentions.
  notes: 'Checker hint: for AntD Mentions, record selections via onSelect and expose a hidden JSON array of selected mention ids/labels for the checker.'
