- id: search_input-antd-T01
  name: Submit a simple query with Input.Search (Enter)
  canonical_type: search_input
  implementation_source: antd
  implementation_variant: Input.Search
  implementation_component: 'AntD: Input.Search'
  task_template: enter_text
  secondary_template: null
  browsergym_goal: In the search box labeled “Site search”, type sushi and submit the search (press Enter or use the search icon). The task will finish automatically when done.
  ui_copy: 'Site search: [ Search… ] (Press Enter to search)'
  setup_description: |-
    Baseline isolated card centered in the viewport. The card title is “Site search”.
    It contains a single Ant Design Input.Search with the label “Site search” and placeholder “Search…”.
    The component uses the default size and spacing and shows the magnifying-glass search icon (no separate Search button).
    Initial state: empty value; below the input a read-only status line reads “Last searched: —”.
    Feedback: when a search is submitted (Enter key or clicking the search icon), the status line updates to “Last searched: <query>” and a small inline spinner flashes for ~300ms.
    No other inputs are present (clutter: none).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single, default-size search input with an explicit label; only needs typing a short word and submitting once.
  success_trigger:
    human_readable:
    - The single Input.Search labeled “Site search” has submitted_query equal to "sushi".
    - The query is considered submitted only after the onSearch event fires (Enter key or clicking the search icon).
    canonical_predicate:
      predicate_type: equals
      target_state:
        submitted_query: sushi
      tolerance: null
      require_confirm: true
      confirm_control: Enter or search icon
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Typing "sushi" but not submitting (status line remains unchanged / submitted_query not updated).
  - Submitting a different query (e.g., "sushis" or "Sushi").
  - Adding extra leading/trailing whitespace (e.g., " sushi ") if the component keeps it in the value.
  expected_interaction_path:
  - Click into the “Site search” input.
  - Type sushi.
  - Press Enter (or click the search icon).
  notes: 'Checker hint: expose data-testid for the input (e.g., search-site) and store lastSubmittedQuery from onSearch. AntD Input.Search onSearch fires for Enter/search-icon per docs.'
