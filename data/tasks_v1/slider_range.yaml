- id: slider_range-antd-T01
  name: Set price filter to $20–$80
  canonical_type: slider_range
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Slider (range=true)'
  task_template: set_range
  secondary_template: null
  browsergym_goal: Set the "Price range" slider to $20–$80. The task will finish automatically when done.
  ui_copy: |-
    Price range ($)
    Selected: $10 – $90
  setup_description: |
    Layout: isolated_card centered in the viewport.
    The card title is "Price Filter". Inside it there is a single Ant Design range Slider labeled "Price range ($)".
    - Slider configuration: min=0, max=100, step=1, range=true, tooltip shows values on hover/drag.
    - Initial state: the selected range is $10–$90 (both thumbs on the track) and the text below reads "Selected: $10 – $90".
    There are no other interactive controls on the card (no Apply/Reset), and changes update immediately as you drag/click.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single, default-sized range slider with immediate feedback and an on-page textual readout of the selected
      values.
  success_trigger:
    human_readable:
    - Target range is set to 20–80 USD (both thumbs).
    - Final values are within tolerance (from ±0, to ±0).
    - No extra confirmation click is required.
    - Any non-target sliders must remain irrelevant; only the target slider state is checked.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        from: 20
        to: 80
        unit: USD
      tolerance:
        from: 0
        to: 0
        unit: USD
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
      state_scope: committed
  negative_cases:
  - Setting $20–$80 on a non-existent or wrong slider (should be the only slider on the card).
  - Leaving one thumb at the wrong value (e.g., $20–$79 or $21–$80).
  - Ending in a range that visually looks close but is not exactly $20–$80.
  expected_interaction_path:
  - Drag the left thumb to 20
  - Drag the right thumb to 80
  - Verify the "Selected" text updates to $20 – $80
  notes: 'Instrumentation: add data-testid="price-range" on the Slider root and expose current value in the "Selected" text
    for the checker.'
