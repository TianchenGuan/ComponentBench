- id: slider_range-mantine-T10
  name: Invert track in dark modal and Save changes
  canonical_type: slider_range
  implementation_source: mantine
  implementation_variant: inverted track
  implementation_component: 'Mantine: RangeSlider (inverted) inside Modal (custom wrapper)'
  task_template: confirm_cancel
  secondary_template: set_range
  browsergym_goal: Open "Advanced grading", set the "Grade window" range to 60–90, then click Save. The task will finish automatically
    when done.
  ui_copy: |-
    Button: Advanced grading
    Modal: Advanced grading
    Grade window (inverted) Selected: 40 – 80
    Buttons: Cancel | Save
  setup_description: |
    Layout: modal_flow. The main page shows a button labeled "Advanced grading".
    Clicking opens a modal titled "Advanced grading" using a dark theme (dark background, light text).
    Inside the modal there is one Mantine RangeSlider labeled "Grade window".
    - Slider configuration: min=0, max=100, step=1, inverted=true (the filled track is inverted compared to the default appearance).
    - Initial state: Selected is 40–80, shown in a readout "Selected: 40 – 80".
    Changes are considered pending until the user clicks "Save" in the modal footer. "Cancel" closes the modal without committing.
    No other interactive elements in the modal besides the slider and footer buttons.
  scene_context:
    theme: dark
    spacing: comfortable
    layout: modal_flow
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: low
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 2
      depth_layering: 3
      feedback_dynamics: 4
      semantic_observability: 3
      disambiguation_load: 2
    justification: Dark modal overlay adds layering and requires a Save confirmation; inverted track can confuse perception
      of which segment is selected.
  success_trigger:
    human_readable:
    - Target range is set to 60–90 pts (both thumbs).
    - Final values are within tolerance (from ±0, to ±0).
    - User must confirm changes with the specified control.
    - Any non-target sliders must remain irrelevant; only the target slider state is checked.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        from: 60
        to: 90
        unit: pts
      tolerance:
        from: 0
        to: 0
        unit: pts
      require_confirm: true
      confirm_control: Save
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
      state_scope: committed
  negative_cases:
  - Setting 60–90 but clicking Cancel instead of Save.
  - Closing the modal without saving (e.g., clicking outside if enabled).
  - Setting 60–89 or 61–90.
  expected_interaction_path:
  - Click "Advanced grading" to open the modal
  - Adjust the slider to 60 and 90 (despite inverted track styling)
  - Click "Save" to commit and close the modal
  notes: Checker should validate committed state after Save; inverted affects visuals only, not the numeric state.
