- id: menubar-mantine-T09
  name: 'Editor header: enable Show line numbers and Save (3 instances)'
  canonical_type: menubar
  implementation_source: mantine
  implementation_variant: composite
  implementation_component: 'Mantine: Menu (custom dropdown with Save/Cancel) across multiple headers'
  task_template: confirm_cancel
  secondary_template: null
  browsergym_goal: There are three menu bars on the page. In the one labeled “Editor header”, open “View settings”, turn ON
    “Show line numbers”, then click “Save”. The task will finish automatically when done.
  ui_copy: 'Headers: Main header, Editor header, Preview header. Use Editor header → View settings → Show line numbers → Save.'
  setup_description: |
    Layout: drawer_flow.
    The page simulates an editor opened in a side drawer. Three separate header/menubar instances exist, each with a label:
    1) Main header (top of page)
    2) Editor header (top of the drawer)   ← target instance
    3) Preview header (inside a preview panel)
    Each header has a dropdown labeled “View settings” implemented with Mantine Menu, but the contents differ.
    - Editor header View settings dropdown contains:
        • Show line numbers (initially OFF)  ← target
        • Wrap lines (initially ON)
        • Highlight active line (initially OFF)
      and action buttons at the bottom: “Save” and “Cancel”.
    Behavior:
    - Toggling options changes pending state; only “Save” commits the changes for that header.
    - “Cancel” discards pending changes.
    Initial state: committed Show line numbers = OFF in Editor header; dropdown closed.
    There are no additional interactive controls outside the menubars (clutter=none).
  scene_context:
    theme: light
    spacing: comfortable
    layout: drawer_flow
    placement: center
    scale: default
    instances: 3
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 5
      semantic_observability: 3
      disambiguation_load: 5
    justification: High disambiguation (three similar headers) plus a pending-vs-committed state that requires an explicit
      Save action.
  success_trigger:
    human_readable:
    - In the menubar labeled “Editor header”, the committed toggle state “Show line numbers” is ON.
    - The change is only counted after clicking “Save” in the Editor header dropdown.
    canonical_predicate:
      predicate_type: equals
      target_state:
        committed_toggle_states:
          Show line numbers: true
      tolerance: null
      require_confirm: true
      confirm_control: Save
      require_correct_instance: true
      target_instance_label_or_id: Editor header
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Turning ON Show line numbers but not clicking Save (pending only).
  - Clicking Cancel after changing the toggle (committed remains OFF).
  - Completing the steps in Main header or Preview header instead of Editor header.
  - Saving but toggling the wrong option (e.g., Wrap lines) while Show line numbers remains OFF.
  expected_interaction_path: Locate Editor header → open View settings → toggle Show line numbers ON → click Save.
  notes: Checker must index state by header instance id; require_correct_instance should bind to the Editor header root.
