  browsergym_goal: Open “View settings” in the top app menu bar, turn ON “Show rulers”, then click “Apply”. The task will
    finish automatically when done.
  ui_copy: 'View settings menu: Show grid, Show rulers, Wrap text. Buttons: Apply, Cancel.'
  setup_description: |
    Layout: settings_panel.
