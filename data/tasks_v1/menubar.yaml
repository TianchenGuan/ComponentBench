      density_choice_interference: 2
      depth_layering: 3
      feedback_dynamics: 5
      semantic_observability: 3
      disambiguation_load: 2
    justification: Requires distinguishing pending vs committed state and pressing an explicit Apply control; missing Apply
      must not count as success.
  success_trigger:
