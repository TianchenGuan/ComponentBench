  success_trigger:
    human_readable:
    - Notification Center drawer is open.
    - The notification with id 'invoice_1842' is expanded/opened in the list (details visible).
    canonical_predicate:
      predicate_type: equals
      target_state:
        panel_open: true
        notification_states:
          invoice_1842:
            expanded: true
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Expanding 'invoice_1842_overdue' instead of 'invoice_1842'.
  - Typing in the search box but never opening/expanding the target notification.
  - Opening the drawer but expanding a different notification.
  expected_interaction_path:
  - Click the bell badge to open the drawer.
  - 'Type ''Invoice #1842'' into the search box (or scroll to it).'
  - 'Click the ''Invoice #1842'' row to expand/open details.'
  notes: Provide stable ids for rows (data-notif-id) and expose expanded state (aria-expanded) for checker.
- id: notification_center-antd-T06
