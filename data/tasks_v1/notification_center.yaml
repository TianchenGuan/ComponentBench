    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 5
      disambiguation_load: 1
    justification: A single tab change with clear visual feedback (active tab styling and filtered list); no overlay layers or disambiguation.
  success_trigger:
    human_readable:
    - The active Notification Center view/tab is set to 'Unread'.
    canonical_predicate:
      predicate_type: equals
      target_state:
        active_view: Unread
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Remaining on the 'All' or 'Archived' tab.
  - Filtering the list by other controls (e.g., search) without selecting the 'Unread' tab.
  expected_interaction_path:
