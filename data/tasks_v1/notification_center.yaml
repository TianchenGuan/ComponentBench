- id: notification_center-antd-T01
  name: Open notifications drawer
  canonical_type: notification_center
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Badge + Button (icon) + Drawer + List (notification rows)'
  task_template: open_overlay
  secondary_template: null
  browsergym_goal: Click the bell icon to open the Notification Center drawer. The task will finish automatically when done.
  ui_copy: Open the Notification Center (bell).
  setup_description: |-
    Baseline isolated card centered in the viewport. At the top of the card is a small header row with a bell icon button labeled "Notifications".
    The bell is wrapped in an Ant Design Badge showing the current unread count ("3"). No other badges on the page show a number.

    The Notification Center itself is not visible until the bell is activated: clicking the bell opens an Ant Design Drawer that slides in from the right.
    The drawer title is "Notification Center" and contains a scrollable list of notification rows (titles + timestamps), but the task only requires opening it.

    Distractors: a non-functional "Help" link in the card footer and a "Messages" icon button (no badge) next to the bell. These do not open the drawer.
    Feedback: the drawer opening animation is immediate; there is no confirmation button for opening/closing.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Single obvious bell target with a numeric badge; success is simply the drawer-open state with no nested steps or confirmations.
  success_trigger:
    human_readable:
    - The Notification Center drawer for the only instance is open (visible and interactive).
    canonical_predicate:
      predicate_type: equals
      target_state:
        panel_open: true
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Clicking the 'Messages' icon or any other control without opening the Notification Center drawer.
  - Opening some other overlay (e.g., a generic help modal) while the Notification Center drawer remains closed.
  expected_interaction_path:
  - Click the bell icon with the unread badge.
  - Wait for the drawer to slide in.
  notes: 'Composite implementation: bell+Badge opens a Drawer containing a notification List. Instrumentation suggestion: data-testid on bell button (notif-bell-primary) and drawer root (notif-drawer-primary) with an aria-label ''Notification Center''.'
- id: notification_center-antd-T02
  name: Show only unread notifications
