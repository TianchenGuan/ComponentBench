  - Selecting the two items but not clicking 'Mark as read' (they remain unread).
  - Marking a similarly named notification (e.g., 'Server status update') as read instead of 'Server maintenance'.
  - Marking only one of the two target notifications as read.
  expected_interaction_path:
  - Check the checkbox for 'Server maintenance'.
  - Check the checkbox for 'Policy update'.
  - Click 'Mark as read' in the bulk action bar.
  notes: Checker should use stable ids (server_maintenance, policy_update) and read states; selection state itself should not be required for success.
