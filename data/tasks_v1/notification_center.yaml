  - Verify the Unread tab becomes active.
  notes: Checker can read active tab value via data-testid (notif-tab-unread) or aria-selected on tab roles.
- id: notification_center-antd-T03
  name: Mark a single notification as read
  canonical_type: notification_center
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: List + Button/Icon actions (mark read)'
  task_template: toggle_state
  secondary_template: null
  browsergym_goal: In the Notification Center, mark the notification titled 'Build completed' as read. The task will finish automatically when done.
  ui_copy: Mark 'Build completed' as read.
  setup_description: |-
    Baseline isolated card centered in the viewport with an inline Notification Center (no drawer).
    The list shows 6 notifications with left-side status dots: unread items have a blue dot, read items have no dot.

    The notification titled "Build completed" appears near the top of the list and is currently unread (blue dot shown).
    On the right side of each row is a small icon-only action button with tooltip "Mark as read" (check icon) when the row is unread;
    when the row becomes read, the action changes to "Mark as unread".

    Distractors: two other notifications have similar wording ("Build started", "Build queued") but only "Build completed" should be changed.
    Feedback: when toggled, the blue dot disappears and the unread badge count in the card header decreases by 1.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 3
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 5
      disambiguation_load: 1
    justification: Requires selecting the correct row among similar titles and using a small per-row action, but the read/unread state is strongly observable.
  success_trigger:
    human_readable:
    - Notification 'build_completed' is in the read state.
    canonical_predicate:
      predicate_type: equals
      target_state:
        notification_states:
          build_completed:
            read: true
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Marking 'Build started' or 'Build queued' as read instead of 'Build completed'.
  - Opening the notification details without changing its read/unread state.
  expected_interaction_path:
  - Locate the row with title 'Build completed'.
  - Click its 'Mark as read' action icon.
  - Confirm the unread dot disappears.
  notes: 'Instrumentation: each row should expose a stable id (data-notif-id=''build_completed'') and the read state (e.g., aria-checked on a toggle or data-read=''true/false'').'
- id: notification_center-antd-T04
  name: Reset notification filters
  canonical_type: notification_center
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Input (Search) + Select (Type filter) + Button (Reset)'
  task_template: clear_reset
  secondary_template: null
  browsergym_goal: Reset the Notification Center so it shows All notifications with an empty search box. The task will finish automatically when done.
  ui_copy: 'Reset filters: All + empty search.'
  setup_description: |-
    Baseline isolated card centered in the viewport with an inline Notification Center.
    Above the list is a small filter bar:
      - a Search input labeled "Search notifications"
      - a Type Select labeled "Type" with options All, Info, Warning, Error, Success
      - a text button labeled "Reset filters"

    Initial state is intentionally non-default:
      - the search input contains the text "invoice"
      - the Type Select is set to "Error"
      - the list is filtered down to 2 items that match both constraints

    Clicking "Reset filters" clears the search input back to empty and sets Type back to "All", restoring the full list.
    Distractors: elsewhere on the page (below the card) there is an unrelated "Reset layout" button for the dashboard; it must not be used.
    Feedback: the list count increases and the filter chips/inputs return to default immediately; no Apply button.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 5
      disambiguation_load: 1
    justification: A single visible 'Reset filters' control restores default state with immediate feedback; no multi-instance ambiguity.
  success_trigger:
    human_readable:
    - Notification Center search query is empty.
    - Notification Center type filter is set to 'All'.
    - Active view/tab is 'All'.
    canonical_predicate:
      predicate_type: equals
      target_state:
        search_query: ''
        filters:
          type: All
        active_view: All
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Clearing only the search box but leaving Type set to 'Error'.
  - Setting Type to 'All' but leaving 'invoice' in the search box.
  - Using the unrelated 'Reset layout' control outside the Notification Center.
  expected_interaction_path:
  - Click 'Reset filters' in the Notification Center filter bar.
  - Verify search becomes empty and Type shows 'All'.
  notes: Checker can read controlled input value for search and selected option for Type. Provide data-testid for reset button (notif-reset).
- id: notification_center-antd-T05
  name: Search and open a specific invoice notification
