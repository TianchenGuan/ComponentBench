- id: notification_center-antd-T09
  name: Match unread badge count to a reference
  canonical_type: notification_center
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Badge + List with per-row read/unread toggles'
  task_template: match_reference
  secondary_template: null
  browsergym_goal: In the Primary Notification Center, adjust notifications so the unread badge count matches the target shown in the reference preview (target unread count is 2). The task will finish automatically when done.
  ui_copy: 'Primary: match the unread badge to the target preview (2).'
  setup_description: |-
    Two Notification Center widgets are displayed side-by-side in an isolated card layout:
      - Left instance label: "Primary"
      - Right instance label: "Secondary"

    Each instance shows its own unread Badge in the header and a list of notifications with per-row read/unread toggle actions.
    Above the Primary instance there is a small, non-interactive reference preview titled "Target for Primary".
    The preview contains a static bell + badge showing the desired unread count (it shows the number 2).

    Initial state:
      - Primary unread badge shows "4" (4 unread items in its list).
      - Secondary unread badge shows "1".
      - Each Primary row has a "Mark as read"/"Mark as unread" icon action that toggles the row state immediately.

    The goal is only to make the Primary unread badge equal the target preview number (2). The Secondary instance should be left unchanged.
    Distractors: the two instances have similar layouts and both support read/unread toggles.
    Feedback: toggling Primary items updates only the Primary badge number in the header immediately.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 2
    guidance: mixed
    clutter: none
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 1
      feedback_dynamics: 3
      semantic_observability: 5
      disambiguation_load: 5
    justification: Exact aggregate unread-count target combined with two similar instances requires careful scoping and multiple small toggles, despite clear badge feedback.
  success_trigger:
    human_readable:
    - In the Primary Notification Center instance, the unread badge count equals the reference target value (2).
    canonical_predicate:
      predicate_type: equals
      target_state:
        unread_count: 2
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Primary
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Adjusting the Secondary instance to 2 unread while Primary remains at a different count.
  - Primary unread badge count ends at 1 or 3 (or any value other than 2).
  - Interacting outside the Notification Center widgets without achieving the correct Primary unread count.
  expected_interaction_path:
  - Focus on the Primary widget.
  - Compare its live badge number to the target preview.
  - Toggle Primary notifications read/unread until the badge shows 2.
  notes: Checker must scope unread_count to the Primary instance. Provide instance roots notif-center-primary and notif-center-secondary; compute unread_count per instance from notification model.
- id: notification_center-antd-T10
  name: Scroll to archive a specific security alert
  canonical_type: notification_center
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Badge + Drawer + Virtualized List + per-row Archive action'
  task_template: scroll_find
  secondary_template: null
  browsergym_goal: 'Open the Notification Center and archive the notification titled ''Security alert: new login''. The task will finish automatically when done.'
  ui_copy: 'Archive: Security alert: new login.'
  setup_description: |-
    The Notification Center launcher is anchored in the bottom-right corner of the viewport (not centered) and rendered at small scale (smaller icon and tighter hit targets).
    A bell icon with a numeric Badge opens the Notification Center Drawer from the right.

    Inside the drawer, the notification list is long (~50 items) and requires scrolling; virtualization may be enabled so only a subset of rows is in the DOM at once.
    Each row has an icon-only "Archive" action (box/arrow icon) aligned to the far right.

    The target row:
      - visible title text: "Security alert: new login"
      - canonical id: 'security_new_login'
      - initially unread

    Distractors:
