  - Collapsing the Editor (left) pane instead of the Details (right) pane.
  - Collapsing the correct pane but immediately expanding it again (final state must be collapsed).
  expected_interaction_path:
  - Locate the chevron/collapse control on the divider.
  - Click the control that collapses the right (Details) pane.
  - 'Verify the status text changes to “Details: Collapsed”.'
  notes: 'Checker hint: treat a pane as ''collapsed'' using the component''s internal collapsed state or a data attribute (preferred) rather than a raw pixel threshold.'
- id: window_splitter-antd-T03
  name: Reset to equal split using divider control
  canonical_type: window_splitter
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Splitter (custom handle with reset)'
  task_template: clear_reset
  secondary_template: null
  browsergym_goal: Reset the Primary splitter so both panes are equal (50% / 50%) using the Reset control on the divider. The task will finish automatically when done.
  ui_copy: Primary splitter — Reset layout to 50/50
  setup_description: 'A centered isolated card titled “Primary splitter” contains an Ant Design Splitter with two panes (“Left pane” and “Right pane”). The initial layout is intentionally uneven: Left pane about 70%, Right pane about 30%. The splitter handle is customized to include a small inline control labeled “Reset” (a circular arrow icon with text) embedded on the bar itself. A percentage readout below the splitter shows the current sizes to one decimal place. Clicking the embedded Reset control immediately restores the default equal split.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: The intent is simple (restore default), but the reset control is a smaller target embedded on the divider.
  success_trigger:
    human_readable:
    - The Primary splitter is in horizontal (left/right) mode.
    - Both panes are equal within ±2 percentage points (i.e., ~50% / 50%).
    - The final state must be non-collapsed (both panes visible).
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        orientation: horizontal
        measure: primary_pane_fraction
        primary_pane: left
