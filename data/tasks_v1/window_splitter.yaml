- id: window_splitter-antd-T01
  name: Resize sidebar to 30% (basic)
  canonical_type: window_splitter
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Splitter'
  task_template: set_scalar
  secondary_template: null
  browsergym_goal: Resize the divider in the Primary splitter so the Sidebar pane is 30% of the available width. The task will finish automatically when done.
  ui_copy: 'Primary splitter — Sidebar width target: 30%'
  setup_description: 'A single isolated card is centered in the viewport titled “Primary splitter”. Inside the card is an Ant Design Splitter in its default (horizontal) layout with two side-by-side panes: the left pane is labeled “Sidebar” and the right pane is labeled “Main”. The splitter bar is visible between panes with the default draggable hit area and a subtle grip indicator. Below the splitter, a live text readout updates while dragging: “Sidebar: 50% • Main: 50%” (starting state). No other interactive elements are required; the only meaningful change is the splitter position.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single splitter with a generous percentage target and a live readout; requires only a straightforward drag and release.
  success_trigger:
    human_readable:
    - The Primary splitter’s orientation is horizontal (left/right panes).
    - The Sidebar (left) pane width is 30% of the splitter container width within an absolute tolerance of ±5 percentage points.
    - No confirmation button is required; the live splitter state is used.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        orientation: horizontal
        measure: primary_pane_fraction
        primary_pane: left
        value: 0.3
        unit: fraction_of_container
      tolerance:
        type: absolute
        value: 0.05
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Sidebar ends up noticeably different than 30% (outside the allowed tolerance), even if it looks close.
  - The divider is dragged but released back near the starting 50/50 position.
  - Any change to non-target UI elements (if present) without achieving the target splitter state.
  expected_interaction_path:
  - Hover the splitter bar until the resize cursor appears.
  - Drag the bar left/right while watching the percentage readout.
  - Release when the Sidebar readout is about 30%.
  notes: 'Instrumentation: add data-testid=''splitter-primary'' on the Splitter root; expose computed pane fractions via DOM text readout for debugging.'
- id: window_splitter-antd-T02
