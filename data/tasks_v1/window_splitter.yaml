  setup_description: 'A centered isolated card titled “Primary splitter” contains an Ant Design Splitter configured with `collapsible` enabled. Two side-by-side panes are shown: the left pane is labeled “Editor” and the right pane is labeled “Details”. The splitter handle includes the standard collapsible chevron controls on the bar. Initial state: both panes are expanded (about 60% Editor / 40% Details). A small status line under the component reads: “Details: Expanded” and flips to “Details: Collapsed” when the right pane collapses.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 1
