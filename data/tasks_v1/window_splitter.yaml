      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Dragging the divider near 50/50 but leaving it outside the tolerance.
  - Clicking Reset but ending with a collapsed pane (must restore a normal split).
  - Resetting a different (non-existent) control outside the divider (if any decorative buttons exist).
  expected_interaction_path:
  - Find the “Reset” control embedded on the splitter bar.
  - Click Reset once.
  - Verify the readout shows about 50% / 50%.
  notes: 'Implementation note: this uses AntD Splitter ''customize handle elements'' style; ensure the reset control is inside the splitter bar DOM so it is counted as part of the component.'
- id: window_splitter-antd-T04
  name: Set sidebar width within a pixel range
  canonical_type: window_splitter
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Splitter (fixed container width)'
  task_template: set_range
  secondary_template: null
  browsergym_goal: Resize the divider in the Primary splitter so the Sidebar pane is between 300 and 340 pixels wide. The task will finish automatically when done.
  ui_copy: 'Primary splitter — Sidebar width target: 300–340 px'
  setup_description: 'A centered isolated card titled “Primary splitter” contains an Ant Design Splitter inside a fixed-width container (exactly 800 px wide). Two panes are side-by-side: “Sidebar” on the left and “Content” on the right. Below the splitter is a live pixel readout: “Sidebar width: 400 px” (starting state) that updates continuously while dragging. The splitter bar is the default AntD bar; there is no Apply button. The rest of the page is empty to keep the interaction focused.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Uses a wide acceptable range and provides a pixel readout; the main action is a simple drag.
  success_trigger:
    human_readable:
    - The Primary splitter is horizontal (left/right).
    - The Sidebar (left) pane width in pixels is within [300, 340] (inclusive) at the final state.
    - No confirmation action is required.
    canonical_predicate:
      predicate_type: range_contains
      target_state:
        orientation: horizontal
        measure: pane_px
        pane: left
        min_value: 300
        max_value: 340
        unit: px
      tolerance:
        type: measurement_jitter_px
        value: 2
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Sidebar width ends up below 300 px or above 340 px.
  - Sidebar width is in range while dragging but ends outside the range after releasing the mouse.
  - Changing browser zoom or other non-component settings instead of resizing the splitter.
  expected_interaction_path:
  - Drag the splitter bar left until the pixel readout approaches the target range.
  - Fine-adjust the drag and release when the readout is between 300 and 340 px.
  notes: 'Checker: compute the left pane''s content box width from DOM bounding box; use the fixed 800 px container to avoid responsive drift.'
