    Layout: isolated_card centered, titled “Upload simulator”.

    Target component: one Ant Design line Progress bar labeled “Primary upload”, currently running at ~40% with status “active”.

    Controls:
    - “Cancel upload” button: opens an AntD Popconfirm anchored to the button, with two actions: “Yes, cancel” and “Keep uploading”.
    - “Reset” button: sets progress to 0% but keeps status “normal” (distractor; should not count as cancellation).

    Cancellation behavior (after confirming “Yes, cancel”):
    - Progress percent becomes 0%.
    - Progress status becomes “exception” (canceled/error styling) and remains stopped.

    Feedback: the Popconfirm must be responded to; if the user clicks outside, it dismisses and the upload continues.
