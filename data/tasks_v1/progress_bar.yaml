    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 1
    justification: Requires interacting with a confirmation overlay and choosing the correct action; cancellation has a distinct status change on the progress bar.
  success_trigger:
    human_readable:
    - The “Primary upload” progress bar status is “exception” (canceled/error state).
    - The progress bar value is 0% and remains stopped (no longer increasing).
    canonical_predicate:
      predicate_type: equals
      target_state:
        value_percent: 0
        variant: determinate
        status: exception
      tolerance:
        value_percent: 0
        stability_ms: 1000
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The cancel popover is opened but “Keep uploading” is chosen or the popover is dismissed.
  - The Reset button is used (value becomes 0% but status remains “normal”).
  - The progress continues running (value keeps increasing).
  expected_interaction_path: Click “Cancel upload” → in Popconfirm click “Yes, cancel” → verify progress shows exception state at 0% and is stopped.
  notes: 'Instrumentation: map AntD Progress status prop to canonical status; treat canceled state as status=''exception''.'
- id: progress_bar-antd-T07
  name: Match Target progress to a Reference bar (45%)
  canonical_type: progress_bar
