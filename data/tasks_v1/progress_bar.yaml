  ui_copy: Adjust the Target progress bar so it matches the Reference progress (45%). The task will finish automatically when done.
  setup_description: |
    Layout: isolated_card centered, titled “Progress matching”.

    Target components on page (instances=2 of the same canonical type):
    1) “Reference” progress bar (AntD Progress, line): fixed at 45% and shows its percent text.
    2) “Target” progress bar (AntD Progress, line): starts at 10%. Its percent text is hidden (showInfo=false) so the user relies on the bar fill and the label “Target”.

    Controls (affect ONLY the Target bar):
    - “–5%” and “+5%” small buttons directly to the right of the Target bar.
    - A “Reset Target” link sets Target back to 10% (distractor).

    Feedback: the Target bar fill updates immediately after each button press. The Reference bar never changes.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 2
    guidance: mixed
    clutter: low
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 3
      disambiguation_load: 3
    justification: Requires matching to a reference with two similar progress bars; the target bar hides its numeric label, increasing reliance on visual comparison and correct-instance selection.
  success_trigger:
    human_readable:
    - The Target progress bar value is within ±1% of 45%.
    - The Reference bar remains unchanged at 45%.
    - Only the Target instance is considered for success.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        value_percent: 45
        variant: determinate
      tolerance:
        value_percent: 1
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Target
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The Reference bar is modified (should be impossible, but must not be counted).
  - The Target bar is close but outside tolerance (e.g., 43% or 47%).
  - The Target bar is reset to 10% after matching.
  - Any attempt focuses on the wrong instance (Reference) instead of Target.
  expected_interaction_path: Compare Reference fill → click Target “+5%” until visually aligned → stop when Target reaches ~45%.
  notes: 'Instrumentation: give each Progress a stable data-testid and an instance label (Reference/Target) in the DOM for disambiguation.'
