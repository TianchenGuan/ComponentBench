- id: progress_bar-antd-T01
  name: Complete Primary upload to 100%
  canonical_type: progress_bar
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Progress (type=''line'')'
  task_template: activate
  secondary_template: null
  browsergym_goal: Start the Primary upload and let the progress reach 100%. The task will finish automatically when done.
  ui_copy: Start the Primary upload and let the progress reach 100%. The task will finish automatically when done.
  setup_description: |
    Layout: isolated_card centered in the viewport. The card title is “Upload simulator”.

    Target component: one Ant Design line Progress bar labeled “Primary upload”. It shows a percentage text to the right (showInfo enabled) and animates smoothly while running. Initial value is 0% with status “normal”.

    Controls (non-scored, used to drive the progress):
    - “Start upload” button: begins increasing the Progress percent from 0% to 100% over ~10 seconds.
    - “Pause” button (disabled until started): pauses at the current percent.
    - “Reset” button: returns to 0%.
    - “Cancel” button: opens a confirmation popover (not required for this task).

    There are no other progress bars and no distractor panels.
    Feedback: while running, the Progress status becomes “active”; at completion, it becomes “success” and stays at 100%.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single progress bar with visible percentage text; only one obvious action (start) and the bar completes automatically.
  success_trigger:
    human_readable:
    - The “Primary upload” progress bar value is exactly 100%.
    - The progress bar status is “success” (completed state).
    - The progress bar is the only instance on the page.
    canonical_predicate:
      predicate_type: equals
      target_state:
        value_percent: 100
        variant: determinate
        status: success
      tolerance:
        value_percent: 0
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Progress is still running and has not reached 100%.
  - Progress reaches 100% but status is not the completed/success state (e.g., still “active”).
  - Any interaction only changes other UI while the progress bar remains below 100%.
  expected_interaction_path: Click “Start upload” → wait until the Progress shows 100% and success styling.
  notes: 'Instrumentation: add data-testid=''primary-progress'' to the Progress root; expose canonical state {value_percent,status,variant} from props/state.'
