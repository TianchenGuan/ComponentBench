    - The “Primary upload” progress bar value is 0%.
    - The progress bar status is “normal” (not active/success/exception).
    canonical_predicate:
      predicate_type: equals
      target_state:
        value_percent: 0
        variant: determinate
        status: normal
      tolerance:
        value_percent: 0
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Progress is reset on another control but the bar remains above 0%.
  - Progress is paused (status not “normal”) even if it reads 0%.
  - Any change is applied to a non-target component (none exist here) while the progress bar remains at 65%.
  expected_interaction_path: Click “Reset” → verify the bar reads 0% and returns to normal styling.
  notes: 'Checker note: treat 0% with status ''normal'' as the canonical reset state.'
