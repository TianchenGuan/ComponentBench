      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: A single labeled progress bar with a dedicated Reset control; state change is immediate and clearly visible.
  success_trigger:
