- id: progress_bar-antd-T05
  name: Pause upload near 60%
  canonical_type: progress_bar
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Progress (type=''line'')'
  task_template: toggle_state
  secondary_template: null
  browsergym_goal: Start the Primary upload and pause it when it is around 60%. The task will finish automatically when done.
  ui_copy: Start the Primary upload and pause it when it is around 60%. The task will finish automatically when done.
  setup_description: |
    Layout: isolated_card centered, titled “Upload simulator”.

    Target component: one Ant Design line Progress bar labeled “Primary upload”, starting at 0% with visible percent text.

    Controls:
    - “Start upload”: begins filling from 0% upward at a steady rate.
    - “Pause”: stops the progress at its current value (the bar and percent stop updating).
    - “Resume”: appears in place of “Pause” once paused.
    - “Reset”: returns to 0% (distractor).

    The progress increments smoothly; the user must pause at roughly the requested target.
    Feedback: the percent text updates continuously while running; once paused, it remains fixed.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 3
      semantic_observability: 2
      disambiguation_load: 1
    justification: Requires timing-sensitive interaction to stop a continuously changing value near a target percent, with tolerance but no multi-instance ambiguity.
  success_trigger:
    human_readable:
    - The “Primary upload” progress bar value is within ±2% of 60%.
    - After reaching the target band, the progress value remains stable (not increasing) for at least 1 second.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        value_percent: 60
        variant: determinate
      tolerance:
        value_percent: 2
        stability_ms: 1000
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Progress is paused outside the allowed band (e.g., 55% or 65%+).
  - Progress briefly enters the band but continues increasing (not actually paused).
  - Progress is reset to 0% instead of being paused near 60%.
  expected_interaction_path: Click “Start upload” → monitor percent text → click “Pause” when near 60% → ensure it stays fixed.
  notes: 'Checker note: implement stability by sampling percent over time; do not rely on the Pause button state.'
- id: progress_bar-antd-T06
  name: Cancel an in-progress upload and confirm
  canonical_type: progress_bar
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Progress (type=''line'') + Popconfirm'
  task_template: confirm_cancel
  secondary_template: null
