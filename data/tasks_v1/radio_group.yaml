- id: radio_group-antd-T01
  name: 'Checkout: choose Express shipping'
  canonical_type: radio_group
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Radio.Group'
  task_template: select_one
  secondary_template: null
  browsergym_goal: On the Checkout card, set the “Shipping speed” option to “Express (2–3 days)”. The task will finish automatically when done.
  ui_copy: Set Shipping speed to Express (2–3 days).
  setup_description: |-
    A single isolated card titled “Checkout” is centered in the viewport (light theme, comfortable spacing, default scale).
    It contains one Ant Design Radio.Group labeled “Shipping speed” with three vertically-stacked options:
    - Standard (5–7 days)
    - Express (2–3 days)
    - Overnight (1 day)
    Initial state: “Standard (5–7 days)” is selected.
    Below the group is a read-only summary line (“Selected: …”) that updates immediately when the selection changes.
    There is no Apply/Save button; the selection is considered active immediately. No other radio groups are present.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Three clearly-labeled options with immediate feedback and only one radio group on the page.
  success_trigger:
    human_readable:
    - The checked/selected option in the “Shipping speed” Radio.Group equals Express (value "express").
    - No confirmation control is required; selection may auto-apply.
    - Task ends as soon as the Radio.Group selected value matches the target.
    canonical_predicate:
      predicate_type: equals
      target_state:
        selected_value: express
        selected_label: Express (2–3 days)
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting “Overnight (1 day)” or leaving “Standard (5–7 days)” selected.
  - Clicking only the label text without changing the checked state (no value change).
  - Changing any other control (there are none) without setting Shipping speed to Express.
  expected_interaction_path:
  - Click the “Express (2–3 days)” radio option (dot or label).
  - Verify the summary line updates to Express.
  notes: 'Instrumentation: wrap the Radio.Group with data-canonical-type="radio_group" and expose its selected value via a data-selected-value attribute for the checker.'
