- id: masked_input-antd-T01
  name: Set support phone number
  canonical_type: masked_input
  implementation_source: antd
  implementation_variant: composite
  implementation_component: 'AntD: Input (masked via antd-mask-input / react-imask adapter)'
  task_template: enter_formatted
  secondary_template: null
  browsergym_goal: In the 'Support phone (US)' field, enter (415) 555-0136. The task will finish automatically when done.
  ui_copy: 'Support phone (US): (415) 555-0136'
  setup_description: |-
    Baseline isolated card centered in the viewport titled “Contact details”.
    It contains a single Ant Design Input labeled “Support phone (US)”.
    The input uses a phone mask and shows the placeholder “(###) ###-####”; only digits can be typed and the formatting characters appear automatically.
    The field starts empty and has no validation errors. No other masked inputs are present and there is no submit button required for completion.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Single visible masked field with a common phone format; the main challenge is typing digits and letting
      the mask format them.
  success_trigger:
    human_readable:
    - The value of the “Support phone (US)” masked input equals “(415) 555-0136”.
    - No confirmation/apply click is required.
    canonical_predicate:
      predicate_type: equals
      target_state:
        text: (415) 555-0136
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Leaving the field incomplete (e.g., “(415) 555-____” or with any placeholder characters).
  - Entering the right digits but wrong formatting (missing parentheses, spaces, or dash).
  - Extra digits beyond the mask or any non-digit characters in digit slots.
  - Changing a different field (not applicable here because only one masked input exists).
  expected_interaction_path:
  - Click the Support phone field.
  - Type 4155550136 (mask formats it as you type).
  notes: 'Instrumentation: add data-testid=''support-phone'' on the input; checker reads the input value attribute (formatted).'
