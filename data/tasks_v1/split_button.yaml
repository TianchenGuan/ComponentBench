- id: split_button-antd-T01
  name: 'Compose: run Save draft primary action'
  canonical_type: split_button
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Dropdown.Button (split button via Dropdown + Menu)'
  task_template: activate
  secondary_template: null
  browsergym_goal: Click the primary (left) action of the split button to run “Save draft”. The task will finish automatically when done.
  ui_copy: Click the primary (left) action of the split button to run “Save draft”. The task will finish automatically when done.
  setup_description: |-
    Layout: isolated card titled “Compose message” centered in the viewport.

    Target component: one Ant Design split button implemented with `Dropdown.Button`. The left button shows the currently selected action label; the right segment is a chevron that opens a dropdown menu.

    Configuration and initial state:
    - Split button label (left segment): “Save draft”.
    - Dropdown trigger: click on the chevron segment.
    - Menu items (in order): “Save draft”, “Send now”, “Schedule…”, “Discard”.
    - The currently selected/default action is “Save draft”.

    Feedback and state observability:
    - Inside the split-button container (beneath the buttons) there is a small inline status line: “Last action: —” initially.
    - When the left segment is clicked, the component records `lastInvokedAction` and updates the status line to “Last action: <action label>”.
    - No toast is required for success; the status line is persistent.

    Distractors:
    - A non-interactive message body preview above the split button.
    - No other clickable controls in the card.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single split button with a large primary target; success is immediate after one click with persistent feedback.
  success_trigger:
    human_readable:
    - Target split button’s `lastInvokedAction` equals “save_draft”.
    - No confirmation step is required.
    canonical_predicate:
      predicate_type: equals
      target_state:
        last_invoked_action: save_draft
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Opening the dropdown menu without clicking the primary (left) action.
  - Selecting a menu item but not invoking the action via the primary (left) button.
  - Invoking any action other than “Save draft” (e.g., “Send now”).
  expected_interaction_path:
  - Click the left segment labeled “Save draft”.
  notes: |-
    Instrumentation: add `data-testid="split-button-root"` on the Dropdown.Button wrapper and expose `data-selected-action` and `data-last-invoked-action` attributes for the checker.
