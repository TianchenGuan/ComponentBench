  scene_context:
    theme: light
    spacing: comfortable
    layout: form_section
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 2
    justification: Requires editing a small set of checkboxes among multiple similar permission items, including unchecking a pre-checked distractor.
  success_trigger:
    human_readable:
    - Checked leaf ids equal exactly {perm/finance/invoices, perm/finance/payroll, perm/finance/budgets}.
    - No other leaves are checked (e.g., perm/finance/tax_forms must be unchecked).
    canonical_predicate:
      predicate_type: set_equals
      target_state:
        checked_node_ids:
        - perm/finance/invoices
        - perm/finance/payroll
        - perm/finance/budgets
      tolerance:
        order: ignore
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Leaving “Tax Forms” checked does not count.
  - Checking any extra permission (even within Finance) does not count.
  - Missing any of the required three items does not count.
  - Checking the Finance parent (if it results in additional children being checked) does not count.
  expected_interaction_path:
  - Verify all Finance leaves are visible (parents are already expanded).
  - Uncheck “Tax Forms”.
  - Check “Invoices”, “Payroll”, and “Budgets”, ensuring no other leaves are checked.
  notes: 'Checker hint: use antd Tree checkedKeys filtered to leaf nodes (exclude parent keys if ever included) and compare as a set.'
