- id: tree_view-antd-T01
  name: Expand Projects folder
  canonical_type: tree_view
  implementation_source: antd
  implementation_variant: Tree
  implementation_component: 'AntD: Tree'
  task_template: disclose
  secondary_template: null
  browsergym_goal: In the Project Files tree, expand the “Projects” folder so its children are visible. The task will finish automatically when done.
  ui_copy: In the Project Files tree, expand the “Projects” folder so its children are visible. The task will finish automatically when done.
  setup_description: 'Layout: isolated_card centered on the page with a header “Project Files”. The card contains a single Ant Design Tree showing a small file hierarchy with root nodes: “Projects”, “Archive”, and “Trash”. Only “Projects” has children (e.g., “Alpha”, “Beta”). The tree uses default AntD affordances: a small caret/switcher icon to the left of expandable nodes, and clicking the node label selects it (selection highlight), but selection does not affect success.


    Initial state: all root nodes are collapsed; no node is selected; no checkboxes are shown (checkable=false). There are no other interactive elements in the card (no search box, no buttons).'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single tree with one obvious expandable target and immediate visual feedback when expanded.
  success_trigger:
    human_readable:
    - The Tree node with id 'projects' is in expanded state (its children are rendered/visible).
    canonical_predicate:
      predicate_type: expanded_contains
      target_state:
        expanded_node_ids:
        - projects
      tolerance:
        mode: superset_ok
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Expanding “Archive” or “Trash” (they are leaf roots) does not count.
  - Selecting “Projects” without expanding it does not count.
  - Expanding a different instance (not applicable; only one tree) does not count.
  expected_interaction_path:
  - Locate the “Projects” row in the tree.
  - Click the expand/caret control (or the row if expand-on-click is enabled) to expand it.
  notes: 'Checker hint: use data-testid on Tree root and per-node key mapping; verify expanded state via expandedKeys or DOM children visibility.'
