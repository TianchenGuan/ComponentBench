  expected_interaction_path:
  - Drag 'Verify email' to the top of the list.
  - Click 'Save order' to open the confirmation popover.
  - Click 'Confirm' in the popover.
  notes: Checker should validate committed order state after the Popconfirm 'Confirm' action (not merely the transient, unsaved UI order).
