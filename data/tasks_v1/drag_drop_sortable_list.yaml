  implementation_source: mantine
  implementation_variant: composite_dnd_kit_sortable_scrollable_dense
  implementation_component: 'Mantine: Card + scrollable list + external dnd-kit Sortable (composite)'
  task_template: scroll_find
  secondary_template: drag_operation
  browsergym_goal: In the "Report sections" list, scroll to find "Changelog" and move it to the very top. The task will finish automatically when done.
  ui_copy: In the "Report sections" list, scroll to find "Changelog" and move it to the very top. The task will finish automatically when done.
