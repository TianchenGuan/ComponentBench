    tier: L1
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 1
      disambiguation_load: 1
    justification: Requires dragging plus a confirm step in a popover; the final state is only committed after confirmation.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Verify email, Create account, Connect workspace, Invite team.'
    - Changes must be committed by activating 'Confirm'.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Verify email
        - Create account
        - Connect workspace
        - Invite team
