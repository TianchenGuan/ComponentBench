  canonical_type: drag_drop_sortable_list
  implementation_source: mantine
  implementation_variant: composite_dnd_kit_sortable_handle_only
  implementation_component: 'Mantine: Paper + sortable rows + reference panel + external dnd-kit Sortable (composite)'
  task_template: match_reference
  secondary_template: drag_operation
  browsergym_goal: Arrange the "Feature ranking" list to match the Reference order shown on the page. The task will finish automatically when done.
  ui_copy: Arrange the "Feature ranking" list to match the Reference order shown on the page. The task will finish automatically when done.
  setup_description: |-
    Centered card titled **Feature ranking** contains:
    - one sortable list with 5 feature items (instances=1),
    - a **Reference order** panel that shows the desired ranking visually as numbered chips (1–5).

    Initial list order (top → bottom):
    Analytics, Automation, Collaboration, Customization, Security.

    Visual guidance (guidance=visual):
    - The Reference order panel shows the exact target ordering of the same labels.
    - The instruction does not repeat the full ordering textually.

    Dragging behavior:
    - Handle-only dragging via a small grip icon.
    - Order updates immediately on drop; no Save.

    Clutter is low:
    - A short description paragraph explains that higher items are more important (non-interactive).

    No scrolling.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: visual
    clutter: low
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 2
    justification: Must interpret a visual reference ranking and reorder multiple items using a handle-only drag affordance.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Security, Collaboration, Analytics, Automation, Customization.'
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Security
        - Collaboration
        - Analytics
        - Automation
        - Customization
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Order is not exact (one or more items are still in the wrong position).
  - A drag was started but dropped outside the list, leaving the order unchanged or partially changed.
  expected_interaction_path:
  - Look at the Reference order panel.
  - Reorder 'Feature ranking' list to match it.
  notes: Checker can compute target_state from the reference panel to keep tasks data-driven; still validate exact final order.
- id: drag_drop_sortable_list-mantine-T08
