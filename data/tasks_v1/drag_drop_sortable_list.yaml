      target_acquisition: 5
      density_choice_interference: 4
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 3
    justification: Dense, small-scale scrollable list in a cluttered dashboard requires precise handle dragging and scrolling to reach the target item.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Changelog, Executive summary, Key metrics, Revenue, Costs, Customer feedback, Roadmap, Risks, Compliance, Operations, Marketing, Sales, Support, Engineering, HR, Legal, Appendix.'
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Changelog
        - Executive summary
        - Key metrics
        - Revenue
        - Costs
        - Customer feedback
        - Roadmap
        - Risks
        - Compliance
        - Operations
        - Marketing
        - Sales
        - Support
        - Engineering
        - HR
        - Legal
        - Appendix
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Order is not exact (one or more items are still in the wrong position).
  - A drag was started but dropped outside the list, leaving the order unchanged or partially changed.
  expected_interaction_path:
  - Scroll within the 'Report sections' list to find 'Changelog'.
  - Drag 'Changelog' from the bottom to the very top (use autoscroll as needed).
  notes: Implement autoscroll and DragOverlay to support moving items across long distances in an overflow container.
- id: drag_drop_sortable_list-mantine-T09
  name: 'Mantine: Reorder table rows (escalation) and apply'
  canonical_type: drag_drop_sortable_list
  implementation_source: mantine
  implementation_variant: composite_dnd_kit_sortable_table_rows
  implementation_component: 'Mantine: Table + ActionIcon handle + external dnd-kit Sortable (composite)'
  task_template: table_operation
  secondary_template: drag_operation
  browsergym_goal: 'In the "Escalation order" table, reorder the rows so the order is: Chloe Park, Alice Chen, Evelyn Patel, Bruno Silva, Diego Ruiz. Then click "Apply". The task will finish automatically when done.'
  ui_copy: 'In the "Escalation order" table, reorder the rows so the order is: Chloe Park, Alice Chen, Evelyn Patel, Bruno Silva, Diego Ruiz. Then click "Apply". The task will finish automatically when done.'
  setup_description: |-
    Scene resembles a **table cell** editor for incident settings (layout=table_cell).

    A compact card titled **On-call escalation** contains a table labeled **Escalation order**:
    - Each row is draggable via a small grip icon in the first column (handle-only).
    - Columns: Drag handle | Name | Role (text) | Active (toggle, disabled).

    Initial row order (top → bottom):
    Alice Chen, Bruno Silva, Chloe Park, Diego Ruiz, Evelyn Patel.

    Commit behavior:
    - Row order changes are staged until **Apply** is clicked.
    - Footer has **Cancel** and **Apply** buttons.

    Distractors (clutter=medium):
    - A small dropdown "Escalation delay" above the table (not required).
    - A tooltip icon next to the header (not required).

    No scrolling (5 rows visible).
  scene_context:
    theme: light
    spacing: compact
    layout: table_cell
    placement: top_right
    scale: small
    instances: 1
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 5
      target_acquisition: 5
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 2
      disambiguation_load: 2
    justification: Compact table row handles require precise acquisition; success needs an exact full reordering plus Apply commit.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: Chloe Park, Alice Chen, Evelyn Patel, Bruno Silva, Diego Ruiz.'
    - Changes must be committed by activating 'Apply'.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - Chloe Park
        - Alice Chen
        - Evelyn Patel
        - Bruno Silva
        - Diego Ruiz
      tolerance: null
      require_confirm: true
      confirm_control: Apply
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Order is not exact (one or more items are still in the wrong position).
  - A drag was started but dropped outside the list, leaving the order unchanged or partially changed.
  - Correct order is shown, but 'Apply' was not activated to commit the change.
  expected_interaction_path:
  - Drag rows by the handle to match the requested escalation order.
  - Click 'Apply' to commit.
  notes: Mantine UI provides a drag-and-drop table example that can be adapted (dnd-kit based); ensure checker reads committed order after Apply.
- id: drag_drop_sortable_list-mantine-T10
  name: 'Mantine: Discard drawer reorder via confirmation'
  canonical_type: drag_drop_sortable_list
  implementation_source: mantine
  implementation_variant: composite_dnd_kit_sortable_drawer_confirm
  implementation_component: 'Mantine: Drawer + sortable list + confirmation modal + external dnd-kit Sortable (composite)'
  task_template: confirm_cancel
  secondary_template: drag_operation
  browsergym_goal: In the support drawer, drag "VIP customers" to the top of the "Queue order" list. Then close the drawer and choose "Discard" when asked to discard changes. The task will finish automatically when done.
  ui_copy: In the support drawer, drag "VIP customers" to the top of the "Queue order" list. Then close the drawer and choose "Discard" when asked to discard changes. The task will finish automatically when done.
  setup_description: |-
    Scene uses **drawer flow** (drawer anchored to the right).
    The drawer titled **Support settings** is already open on load.

    Target component:
    - A sortable list labeled **Queue order** (instances=1) inside the drawer.
    - Initial order (top → bottom): General inquiries, Billing issues, Bug reports, Feature requests, VIP customers.
    - Handle-only dragging via a small grip icon.

    Drawer controls:
    - Top-right close button (X icon).
    - The drawer footer has a disabled **Save** button and an enabled **Close** button (not required if X is used).

    Confirmation (confirm_cancel):
    - If the list order has been changed, closing the drawer triggers a confirmation modal titled "Discard changes?"
    - The modal has two actions: **Keep editing** and **Discard**
    - Clicking **Discard** closes the drawer and restores the original list order.

    Distractors (clutter=medium):
    - Two toggles above the list ("Auto-assign", "Play sound") not required.
    - A small paragraph under the list describing what queue order means.

    Initial state:
    - Drawer is open and the list is in the original order.
  scene_context:
    theme: light
    spacing: comfortable
    layout: drawer_flow
    placement: top_right
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 4
      target_acquisition: 4
      density_choice_interference: 3
      depth_layering: 4
      feedback_dynamics: 4
      semantic_observability: 2
      disambiguation_load: 3
    justification: Requires triggering and correctly handling a discard confirmation after making a reorder change; drawer context adds layering and clutter.
  success_trigger:
    human_readable:
    - 'Target sortable list order (top → bottom) must be: General inquiries, Billing issues, Bug reports, Feature requests, VIP customers.'
    - Changes must be committed by activating 'Discard'.
    - Task ends when the order predicate holds.
    canonical_predicate:
      predicate_type: equals
      target_state:
        ordered_labels:
        - General inquiries
        - Billing issues
        - Bug reports
        - Feature requests
        - VIP customers
      tolerance: null
      require_confirm: true
      confirm_control: Discard
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Order is not exact (one or more items are still in the wrong position).
  - A drag was started but dropped outside the list, leaving the order unchanged or partially changed.
  - Correct order is shown, but 'Discard' was not activated to commit the change.
  expected_interaction_path:
  - Drag 'VIP customers' to the top to create unsaved changes.
  - Close the drawer (X or Close button).
  - In the confirmation modal, click 'Discard'.
  notes: Checker should require the Discard action event and confirm that the final (restored) order equals the original order.
