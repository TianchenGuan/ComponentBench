- id: transfer_list-mantine-T10
  name: Transfer all matching search results
  canonical_type: transfer_list
  implementation_source: mantine
  implementation_variant: composite
  implementation_component: 'Mantine: Combobox-based transfer list with search + ''move all results'' (composite)'
  task_template: search_and_select
  secondary_template: null
  browsergym_goal: In the transfer list, search for “Admin” in Available permissions and use the “Add all results” control so that Selected contains all Admin permissions (and only those). The task will finish automatically when done.
  ui_copy: Search “Admin” → Add all results → Selected should contain only Admin permissions.
  setup_description: 'Layout: isolated card centered on the page titled “Permission builder”. Light theme, comfortable spacing.

    A Mantine composite transfer list is shown with columns “Available permissions” (left) and “Selected” (right). Above the left list is a search input labeled “Search available”. Between lists are move controls.

    Special control: next to the move-to-right button is an additional button labeled “Add all results”. When clicked, it transfers all currently visible (filtered) items from the left list to the right list.

    Available permissions contains 25 items, including exactly four that contain the word “Admin”: Admin - Billing, Admin - Users, Admin - Integrations, and Admin - Security. Other non-admin items include Viewer, Editor, Export, Delete, Manage billing, View audit log, etc.

    Initial state: Selected is empty. The task requires filtering to “Admin” and transferring all matching results at once; non-admin items must remain unselected and untransferred.'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 4
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 4
      disambiguation_load: 1
    justification: The agent must understand filtered views vs. underlying list membership and use a specialized 'move all results' control to achieve an exact final set.
  success_trigger:
    human_readable:
    - 'Target (right) list contains exactly: Admin - Billing, Admin - Users, Admin - Integrations, Admin - Security (order ignore).'
    canonical_predicate:
      predicate_type: target_set_equals
      target_state:
        target_items:
        - Admin - Billing
        - Admin - Users
        - Admin - Integrations
        - Admin - Security
      tolerance:
        order: ignore
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selected contains any non-admin permission (extra item).
  - Selected is missing any of the four Admin permissions (incomplete transfer).
  - The search is applied but Add all results is not used and the final set is incorrect.
  - Admin items are selected but not actually transferred to the right list.
  expected_interaction_path:
  - Type “Admin” into the Search available field to filter the left list.
  - Click “Add all results” to transfer the filtered admin permissions to Selected.
  - Clear the search and confirm no extra non-admin permissions are in Selected.
  notes: 'Implementation detail: Add all results should operate on the current filtered left-list items. Checker ignores search text; it only checks final right-list membership.'
