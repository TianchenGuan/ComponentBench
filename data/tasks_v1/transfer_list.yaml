- id: transfer_list-antd-T08
  name: Match required permissions in dark compact mode
  canonical_type: transfer_list
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Transfer (compact density, dark theme)'
  task_template: match_reference
  secondary_template: null
  browsergym_goal: In the “Role permissions” transfer list, make the Selected permissions exactly match the “Required permissions” reference shown above the component. The task will finish automatically when done.
  ui_copy: 'Role permissions: Selected must match the Required permissions reference.'
  setup_description: 'Layout: isolated card centered on the page titled “Role permissions”. Theme is dark and spacing mode is compact (tighter rows and smaller checkbox hit areas).

    At the top of the card, a read-only reference strip labeled “Required permissions” shows the target set as pill chips (visual guidance). Below it is a single AntD Transfer component with titles “All permissions” (left) and “Selected” (right). No search input.

    The left list contains 40 permission-like labels with intentionally similar wording (e.g., “Read”, “Read-only”, “Read (audit)”, “Write”, “Write (admin)”, “Export”, “Export (csv)”, “Delete”, “Delete (hard)”, “Manage billing”, “Manage billing (view)”, “View audit log”, “View audit logs (export)”, etc.). Initial state: the right list contains a few unrelated permissions (e.g., “Read-only”, “Export (csv)”) to force both additions and removals.

    The only way to meet the goal is to make the right list membership match the reference chips exactly.'
  scene_context:
    theme: dark
    spacing: compact
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: visual
    clutter: none
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 4
      density_choice_interference: 5
      depth_layering: 2
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 1
    justification: Compact dark styling and many near-duplicate option labels increase misclick and confusion risk; the agent must match an exact set via a visual reference.
  success_trigger:
    human_readable:
    - 'Target (right) list contains exactly: Read, Write, Export, Delete, Manage billing, View audit log (order ignore).'
    canonical_predicate:
      predicate_type: target_set_equals
      target_state:
        target_items:
        - Read
        - Write
        - Export
        - Delete
        - Manage billing
        - View audit log
      tolerance:
        order: ignore
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selected contains extra permissions beyond the reference chips.
  - Selected is missing any required permission from the reference chips.
  - A similarly named permission is selected instead of the exact one (e.g., 'Read-only' instead of 'Read').
  expected_interaction_path:
  - Compare the Required permissions chips to the items in Selected.
  - Remove any non-required items from Selected (move left).
  - Add each required permission from All permissions (move right).
  - Re-check that Selected matches the reference exactly.
  notes: Checker should compare against canonical item IDs (not just rendered text) if the implementation uses separate labels/values.
