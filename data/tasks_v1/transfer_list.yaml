- id: transfer_list-antd-T01
  name: Select two beta testers
  canonical_type: transfer_list
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Transfer'
  task_template: transfer_move
  secondary_template: null
  browsergym_goal: In the transfer list, move Ava Patel and Noah Kim from Available to Selected. The task will finish automatically when done.
  ui_copy: Move Ava Patel and Noah Kim to Selected.
  setup_description: 'Layout: an isolated card centered on the page titled “Beta tester selection”. The card contains a single Ant Design Transfer component with two columns labeled “Available” (left/source) and “Selected” (right/target). Each row has a checkbox and the person’s full name. Between the columns are the standard AntD transfer operation buttons (move right ''>'' and move left ''<'').

    Spacing is comfortable and the component is rendered at default size. There is no search box. Initial state: the Selected column is empty and no items are checked. There are 8 available names: Ava Patel, Noah Kim, Emma Chen, Liam Davis, Sofia Garcia, Ethan Wright, Mia Johnson, and Lucas Brown. No other interactive UI is present (no clutter).'
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 5
      disambiguation_load: 1
    justification: Only two uniquely named items must be transferred in a single, default Transfer component with no overlays or extra steps.
  success_trigger:
    human_readable:
    - 'Target (right) list contains exactly: Ava Patel, Noah Kim (order ignore).'
    canonical_predicate:
      predicate_type: target_set_equals
      target_state:
        target_items:
        - Ava Patel
        - Noah Kim
      tolerance:
        order: ignore
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Any other name is moved to Selected (extra items in the right list).
  - Only one of the two names is in Selected (partial completion).
  - Ava Patel/Noah Kim are checked but remain in Available (selection without transfer).
  expected_interaction_path:
  - In Available, check Ava Patel and Noah Kim.
  - Click the '>' (move to right) operation button once.
  - Verify both names appear under Selected.
  notes: 'Instrumentation: expose data-testid for the transfer root (e.g., transfer-beta), the left/right lists, and the move buttons to support robust checking.'
