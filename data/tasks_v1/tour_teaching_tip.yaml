- id: tour_teaching_tip-antd-T01
  name: Open Quick Start tour (Welcome)
  canonical_type: tour_teaching_tip
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Tour'
  task_template: open_overlay
  secondary_template: null
  browsergym_goal: Start the Quick Start tour and leave it open on the “Welcome” step. The task will finish automatically when done.
  ui_copy: Start the Quick Start tour and leave it open on the “Welcome” step. The task will finish automatically when done.
  setup_description: |-
    A single centered card titled "Quick Start" is shown (isolated_card layout, center placement) in a light theme with comfortable spacing.
    Inside the card there is one primary button labeled "Begin Quick Start Tour" and a short paragraph of helper text.
    Clicking the button opens an AntD Tour overlay (mask enabled, default arrow) with 3 steps anchored to simple demo elements inside the same card.
    Step titles (in order) are: "Welcome", "Upload a file", and "Save changes".
    The tour is initially closed. When open, the tour shows a step counter (e.g., "1 / 3"), a close (×) icon in the header, and a "Next" button in the footer (no custom actions).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Single instance, centered default Tour; success is just opening to the first step.
  success_trigger:
    human_readable:
    - Tour overlay is open.
    - 'Current tour step title is exactly: "Welcome".'
    - Current tour step index equals 0 (0-based).
    canonical_predicate:
      predicate_type: equals
      target_state:
        open: true
        current_step_title: Welcome
        current_step_index: 0
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - The tour remains closed.
  - A different overlay opens (e.g., a tooltip/popover), but the Tour is not open.
  - The tour is open but showing “Upload a file” or “Save changes” instead of “Welcome”.
  expected_interaction_path:
  - Click “Begin Quick Start Tour”.
  - Verify the tour opens on the first step titled “Welcome”.
  notes: 'Instrumentation hint: add data-testid="tour-quickstart" on the Tour root, and expose current step index/title via DOM (e.g., data-step-index on the overlay container).'
