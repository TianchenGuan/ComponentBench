  - Locate Sidebar highlight color picker.
  - Use the alpha/opacity slider to reduce alpha to ~0.08 without changing RGB.
  notes: |
    Checker: ignore drawer open state and other settings; only Sidebar highlight picker value matters (ensure initial value differs from target).
    Consider exposing the drawer container and the ColorPicker with stable ids for robust automation.
