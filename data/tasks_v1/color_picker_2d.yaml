      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Opacity/alpha is left at 1.0 or moved to a value outside tolerance around 0.60.
  - RGB channels change noticeably (user drags in the color square instead of only alpha).
  - A translucent value is achieved but with the wrong underlying hue (wrong RGB).
  expected_interaction_path:
  - Open the Overlay tint color picker.
  - Use the alpha/opacity slider to reduce opacity to ~0.60.
  - Avoid changing hue/saturation in the 2D panel.
  notes: |
    Checker: compare both RGB and alpha; tolerate small rounding errors but reject large hue drift.
    Ensure alpha slider is enabled (disabledAlpha=false).
