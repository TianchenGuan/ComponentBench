    Clicking the button opens a right-side drawer (dark theme) containing theme controls.
    Inside the drawer, there is an inline Mantine ColorPicker labeled “Sidebar highlight”, configured with format='rgba' so the alpha slider is visible.
    Initial state: rgba(255, 255, 255, 0.20) (white at 20% opacity), and the target requires lowering alpha to 0.08 while keeping RGB at pure white.
    The drawer contains other settings (Switches for “Use shadows”, Select for “Font size”), which are distractors.
    The task is complete when the Sidebar highlight ColorPicker value matches rgba(255, 255, 255, 0.08).
  scene_context:
    theme: dark
    spacing: comfortable
    layout: drawer_flow
    placement: top_right
    scale: default
    instances: 1
    guidance: text
    clutter: medium
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 5
      target_acquisition: 4
      density_choice_interference: 1
      depth_layering: 3
      feedback_dynamics: 2
      semantic_observability: 4
      disambiguation_load: 2
    justification: The agent must navigate a drawer overlay and then set a very low alpha value precisely using a slider,
      which is sensitive to small movements.
  success_trigger:
    human_readable:
    - 'Target instance: the only color picker on the page'
    - Component value represents color RGBA(255, 255, 255, 0.08).
    - Task ends when the component's canonical color value matches the target (with tolerance, if specified).
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        color:
          space: rgba
          r: 255
          g: 255
          b: 255
          a: 0.08
      tolerance:
        rgba_max_abs_channel_error: 0
        alpha_max_abs_error: 0.01
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
