- id: color_picker_2d-antd-T01
  name: Pick preset Ocean Blue for Brand color
  canonical_type: color_picker_2d
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: ColorPicker'
  task_template: open_and_select
  secondary_template: null
  browsergym_goal: In the Theme card, set the Brand color to Ocean Blue (#1677FF) using the color picker. The task will finish
    automatically when done.
  ui_copy: Set Brand color to Ocean Blue (#1677FF).
  setup_description: |
    Layout: isolated_card centered in the viewport (single card titled “Theme colors”).
    The card contains one AntD ColorPicker labeled “Brand color”. It renders as a small color swatch trigger with showText enabled (hex string shown next to the swatch).
    Interaction: clicking the trigger opens a popover directly under the trigger with the standard AntD color UI: 2D saturation/value panel, hue slider, optional alpha slider, and a “Preset Colors” section.
    Presets are configured with a labeled group “Brand palette”, containing several named swatches including “Ocean Blue” which corresponds to #1677FF.
    Initial state: Brand color is set to a different non-blue color (e.g., #F5222D), so the user must change it.
    No other inputs are required for success; minor non-interactive text in the card explains that the selection updates live.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 4
      disambiguation_load: 1
    justification: Selecting a clearly labeled preset swatch requires minimal precision and the chosen value is visible as
      text next to the trigger.
  success_trigger:
    human_readable:
    - 'Target instance: the only color picker on the page'
    - Component value represents color RGBA(22, 119, 255, 1.0).
    - Task ends when the component's canonical color value matches the target (with tolerance, if specified).
    canonical_predicate:
      predicate_type: equals
      target_state:
        color:
          space: rgba
          r: 22
          g: 119
          b: 255
          a: 1.0
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - 'A different preset is selected (color does not resolve to #1677FF).'
  - The color picker popover is opened but the value is not changed from the initial color.
  - Any interaction changes another unrelated UI element (should be ignored by the checker).
  expected_interaction_path:
  - Click the Brand color swatch trigger to open the popover.
  - In Preset Colors, click the Ocean Blue swatch.
  - Close the popover (optional).
  notes: |
    Instrumentation: add data-testid on the ColorPicker trigger (e.g., data-testid="brand-color") and ensure presets expose accessible names/text for swatches (e.g., aria-label="Ocean Blue").
    Checker: read canonical color from AntD Color object (toRgb) or CSS string; normalize to RGBA before comparison.
