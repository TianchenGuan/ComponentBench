        rgba_max_abs_channel_error: 5
        alpha_max_abs_error: 0.02
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Color remains close to the initial neutral gray (insufficient saturation/hue change).
  - 'Color is close but outside the allowed tolerance from #52C41A.'
  - Alpha is changed significantly so the resulting color is translucent (alpha outside tolerance).
  expected_interaction_path:
  - Open the Success color popover.
  - Adjust hue slider toward green.
  - 'Drag within the 2D square to tune saturation and brightness until the value is near #52C41A.'
  notes: |
    Checker: normalize the component value to RGBA and apply channel-wise tolerance.
    To keep this task focused on dragging, do not render preset swatches for this instance.
- id: color_picker_2d-antd-T07
