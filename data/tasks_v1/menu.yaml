  success_trigger:
    human_readable:
    - The “Enable sounds” menu item is in the checked/on state.
    - No Apply/OK confirmation is required; the toggle commits immediately.
    canonical_predicate:
      predicate_type: equals
      target_state:
        toggles:
          Enable sounds: true
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
