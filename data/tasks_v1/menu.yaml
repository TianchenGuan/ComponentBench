- id: menu-antd-T01
  name: Navigate to Reports in sidebar menu
  canonical_type: menu
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Menu (mode=inline, selectable)'
  task_template: navigate_to
  secondary_template: null
  browsergym_goal: In the Sidebar navigation menu, go to “Reports”. The task will finish automatically when done.
  ui_copy: 'Sidebar navigation: Home, Billing, Reports, Settings. Current section: Home.'
  setup_description: |-
    Scene: theme=light, spacing=comfortable, layout=isolated_card, placement=center, scale=default, instances=1.

    The page shows an isolated card centered in the viewport with a typical “app shell” mock:
    - Left side: a vertical Ant Design Menu labeled “Sidebar navigation”.
    - Right side: a read-only content panel that mirrors the currently active menu item as text: “Current section: …”.

    Menu configuration:
    - Mode: inline (vertical), light theme, comfortable spacing, default size.
    - Items (top to bottom): Home (initially selected), Billing, Reports, Settings.
    - Clicking an item changes the menu selected key and updates the mirrored “Current section” text.

    There are no other interactive components on the page besides this menu (no clutter).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 1
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 5
      disambiguation_load: 1
    justification: Single visible menu with four clearly labeled items; selection is immediately reflected by highlight and
      mirrored text.
  success_trigger:
    human_readable:
    - The sidebar menu’s selected item is “Reports” (selected_path == [“Reports”]).
    - No Apply/OK confirmation is required.
    canonical_predicate:
      predicate_type: path_equals
      target_state:
        selected_path:
        - Reports
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting any item other than “Reports”.
  - Focusing/hovering “Reports” without actually selecting it (selected key does not change).
  - Using a different menu instance (not applicable here, but if instrumentation detects multiple menus, only the labeled
    Sidebar navigation menu counts).
  expected_interaction_path:
  - Click the “Reports” item in the Sidebar navigation menu.
  - Verify the highlight moves to “Reports” / the content panel updates.
  notes: |-
    Instrumentation hint: assign stable data-testid to the Menu root (e.g., data-testid="menu-sidebar") and to each item key.
    Checker can read AntD Menu selectedKeys or mirrored “Current section” text as a fallback observability channel.
