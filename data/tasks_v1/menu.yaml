  expected_interaction_path:
  - Locate “Enable sounds” in the Preferences menu.
  - Click it once to enable the checkmark / update the mirrored status line.
  notes: |-
    Checker should read a canonical boolean for each toggle item (e.g., via data attributes like data-checked=true on the item)
    rather than relying on icon pixels. Provide data-testid for each item.
