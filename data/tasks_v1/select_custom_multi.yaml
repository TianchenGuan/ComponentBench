- id: select_custom_multi-antd-T01
  name: Pick two fruits (Apple + Banana)
  canonical_type: select_custom_multi
  implementation_source: antd
  implementation_variant: tags_mode
  implementation_component: 'AntD: Select (tags/multiple)'
  task_template: select_many
  secondary_template: null
  browsergym_goal: Select the tags Apple and Banana in the Tags field. The task will finish automatically when done.
  ui_copy: Select the tags Apple and Banana in the Tags field. The task will finish automatically when done.
  setup_description: |
    Scene context: theme=light, spacing=comfortable, layout=isolated_card, placement=center, scale=default, instances=1, guidance=text, clutter=none.
    Layout: isolated card centered in the viewport. The card title is "Snack basket".
    The card contains a single Ant Design Select configured as a multi-select in tags-style display (selected items show as removable tags inside the input).
    Label above the control: "Tags".
    When you click the input, a dropdown menu opens below it with 6 fruit options: Apple, Banana, Cherry, Grape, Mango, Orange.
    Initial state: no tags selected; the placeholder reads "Choose fruits".
    No other interactive components are present (clutter: none). Selection is applied immediately when an option is clicked; there is no separate Apply/OK button.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 1
      disambiguation_load: 1
    justification: Small option set with distinct labels; selection commits immediately and the selected tags are clearly
      visible as chips.
  success_trigger:
    human_readable:
    - 'The selected values on the target multi-select are exactly: Apple, Banana (order does not matter).'
    - No extra values may be selected.
    canonical_predicate:
      predicate_type: set_equals
      target_state:
        selected_values:
        - Apple
        - Banana
      tolerance:
        string_match: exact
        trim_whitespace: true
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting a superset of the target values (extra chips/tags).
  - Selecting only some of the target values (missing at least one).
  expected_interaction_path: Click the Tags input → click Apple → click Banana → optionally click outside to close the dropdown.
  notes: 'Instrumentation: add data-testid=''tags-select'' on the Select root; expose selected values via aria tags or hidden
    input for checker.'
