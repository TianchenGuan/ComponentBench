- id: rating-antd-T01
  name: Set product quality to 4 stars (AntD)
  canonical_type: rating
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Rate'
  task_template: set_scalar
  secondary_template: null
  browsergym_goal: Set the "Product quality" star rating to 4 out of 5. The task will finish automatically when done.
  ui_copy: |-
    Product review
    Product quality: [star rating]
    Goal: 4 out of 5
  setup_description: |-
    Scene details: theme=light, spacing=comfortable, scale=default, placement=center.
    Layout: isolated_card centered in the viewport with a simple "Product review" header.
    A single Ant Design Rate component is shown inline under the label "Product quality".
    Configuration: count=5 stars, allowHalf=false (whole stars only), allowClear=true (default), tooltips enabled on hover (e.g., "1 star", "2 stars"...).
    Initial state: no stars selected (value = 0). No other Rate components are present.
    No extra buttons are required; the rating commits immediately when clicked.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 1
      depth_layering: 1
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single default Rate control with whole-star selection and immediate feedback; minimal clutter and no instance ambiguity.
  success_trigger:
    human_readable:
    - Target rating value equals 4 out of 5 on the specified rating control.
    - No additional confirmation is required once the rating value is set.
    - Only one rating instance is present, so instance disambiguation is not required.
    canonical_predicate:
      predicate_type: within_tolerance
      target_state:
        rating_value: 4.0
        max: 5
      tolerance:
        type: absolute
        value: 0.0
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Any rating value outside the allowed tolerance (even if visually close, e.g., 3.0 vs 3.5) must NOT count as success.
  - A partial/hover-only highlight that does not commit the rating value must NOT count as success.
  - If the component supports fractional steps, selecting the wrong fraction (e.g., 2.0 instead of 2.5) must NOT count as success.
  expected_interaction_path:
  - Locate the Rate control labeled "Product quality".
  - Click the 4th star to set the value to 4.
  notes: 'Instrumentation: expose a stable selector (e.g., data-testid=''rating-product-quality'') and read the committed value from the Rate component state/aria attributes.'
