- id: tree_grid-antd-T01
  name: Select API Gateway row
  canonical_type: tree_grid
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Table (tree data via children) + rowSelection (highlight on row click)'
  task_template: select_one
  secondary_template: null
  browsergym_goal: In the Service Catalog tree grid, select the row “API Gateway” (it is nested under “Platform”). The task will finish automatically when done.
  ui_copy: Select “API Gateway” under “Platform” in the Service Catalog tree grid.
  setup_description: |-
    Layout: isolated card centered on the page.
    Component: an Ant Design Table configured as a tree table (hierarchical rows via a `children` field). The first column is “Service”, followed by “Owner”, “Status”, and “Last updated”.
    Interaction: each parent row has a small expand/collapse caret at the start of the “Service” cell; clicking a row highlights it as the current selection.
    Initial state: all top-level groups (Platform, Finance, Marketing, Operations, People) are collapsed; no row is selected.
    Distractors: none besides the table header and a non-interactive help caption under the card title.
    Feedback: the selected row is highlighted and the breadcrumb text above the table updates to “Selected: <path>”.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single selection with clear highlight feedback; only one expansion step is typically needed to reveal the target.
  success_trigger:
    human_readable:
    - The Service Catalog tree grid has exactly one selected row.
    - 'The selected row’s hierarchical path equals: Platform → API Gateway.'
    canonical_predicate:
      predicate_type: path_equals
      target_state:
        selected_row_path:
        - Platform
        - API Gateway
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - A different row is selected (e.g., “Auth Service” or a parent like “Platform”).
  - No row is selected.
  - The correct row is visible but not actually selected (no highlight / breadcrumb not updated).
  expected_interaction_path:
  - Expand “Platform” using the caret.
  - Click the “API Gateway” row to select it.
  notes: 'Instrumentation: expose a stable row id and computed row path (e.g., data-row-path=''Platform/API Gateway'') and a selectedRowPath state for the checker.'
