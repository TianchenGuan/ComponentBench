- id: tree_grid-antd-T06
  name: Filter Status to Blocked (confirm required)
  canonical_type: tree_grid
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Table (tree data) with column filters (filter dropdown + OK/Reset)'
  task_template: table_operation
  secondary_template: null
  browsergym_goal: In the Service Catalog tree grid, filter the “Status” column to show only “Blocked” items, and confirm the filter in the dropdown. The task will finish automatically when done.
  ui_copy: Filter Status = Blocked in the Service Catalog table and confirm.
  setup_description: |-
    Layout: isolated card centered.
    Component: Ant Design tree table with a “Status” column that has a filter icon in the header. Status values include Active, Paused, and Blocked.
    Interaction: clicking the filter icon opens a small dropdown overlay with checkbox options and two buttons at the bottom: “OK” and “Reset”.
    Initial state: no filters are applied; all groups are collapsed; no row selection.
    Confirm behavior: selecting a checkbox in the dropdown does not apply the filter until “OK” is clicked.
    Feedback: after confirming, the Status header shows an active filter indicator and non-matching rows disappear.
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: mid
    tier: L1
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 3
      semantic_observability: 2
      disambiguation_load: 1
    justification: Requires operating a header filter overlay and remembering to confirm; options are moderately confusable.
  success_trigger:
    human_readable:
    - 'The Status column filter is applied with the single allowed value: Blocked.'
    - The filter application has been confirmed (i.e., the table’s active filter model includes Status=Blocked).
    canonical_predicate:
      predicate_type: equals
      target_state:
        filter_model:
        - column: Status
          operator: in
          value:
          - Blocked
        filter_model_match: exact
      tolerance: null
      require_confirm: true
      confirm_control: OK
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: true
  negative_cases:
  - Blocked is checked in the dropdown but “OK” was not clicked (filter not applied).
  - A different Status filter is applied (Active/Paused) or multiple statuses are selected.
  - A filter is applied on another column instead of Status.
  expected_interaction_path:
  - Click the Status header filter icon.
  - Check “Blocked”.
  - Click “OK” in the dropdown to apply.
  notes: Checker can read controlled filteredValue for the Status column, or derive from internal filter state if exposed.
