# Pagination component tasks for ComponentBench
# 30 tasks: 10 for antd, 10 for mui, 10 for mantine
# Tests navigation, page jumping, and size changing interactions

- id: pagination-antd-T01
  name: Navigate to page 4 (direct click)
  canonical_type: pagination
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: Pagination'
  task_template: navigate_to
  secondary_template: null
  browsergym_goal: Click on page number 4 in the pagination control. The task will finish automatically when done.
  ui_copy: 'Data table: Navigate to page 4.'
  setup_description: |
    Centered isolated card titled "Data Table".
    The card contains a simple data table with placeholder rows and an Ant Design Pagination component below it.
    The pagination shows pages 1-5 with page 1 currently active.
    Total items: 50, page size: 10 (showing "1-10 of 50 items").
    The goal is to click directly on page number 4.
    When page 4 is reached, a status line shows "Viewing page 4".
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 1
      feedback_dynamics: 2
      semantic_observability: 1
      disambiguation_load: 1
    justification: Direct page number click with clearly visible numbered buttons.
  success_trigger:
    human_readable:
    - The current page is 4.
    - Navigation must happen via clicking page number 4.
    canonical_predicate:
      predicate_type: equals
      target_state:
        component_id: antd-pagination-main
        current_page: 4
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Clicking a different page number.
  - Using next/previous buttons instead of direct click.
  - Not navigating at all.
  expected_interaction_path: Click page number 4 → observe page change.
  notes: "Instrumentation: data-testid='antd-pagination-main'; track current_page state."

