- id: tree_select-antd-T01
  name: Pick Web (basic single select)
  canonical_type: tree_select
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: TreeSelect'
  task_template: open_and_select
  secondary_template: null
  browsergym_goal: In the "Department" tree selector, choose "Company / Engineering / Frontend / Web". The task will finish automatically when done.
  ui_copy: 'Department: Select Company / Engineering / Frontend / Web.'
  setup_description: |-
    - Layout: isolated_card centered in the viewport with a short title "Team setup".
    - Target component: one AntD TreeSelect labeled "Department" with placeholder "Please select". It is empty on load.
    - Interaction: clicking the input opens a dropdown containing a collapsible tree. Nodes have expand/collapse carets; leaf nodes are selectable by clicking their label.
    - Tree data (moderate size, ~3 roots, ~20 total nodes):
      - Company
        - Engineering → Frontend → (Web, Mobile Web), Backend → (API, Data), QA
        - Sales → Americas → (USA, Canada), EMEA → (UK, Germany)
        - HR → (Recruiting, People Ops)
    - No search box is shown for this task (search disabled), and selecting a leaf closes the dropdown automatically.
    - No other inputs/buttons are present (no clutter).
  scene_context:
    theme: light
    spacing: comfortable
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: easy
    tier: L0
    axes_ratings:
      precision_requirement: 1
      target_acquisition: 2
      density_choice_interference: 2
      depth_layering: 2
      feedback_dynamics: 1
      semantic_observability: 2
      disambiguation_load: 1
    justification: Single selection in a small tree with clear labels; only a few expansions are needed and the chosen value is visible in the input after selection.
  success_trigger:
    human_readable:
    - The Department TreeSelect's committed selection is exactly the leaf node with canonical path [Company, Engineering, Frontend, Web].
    - No extra confirmation button is required (selection is committed when the value appears in the input).
    canonical_predicate:
      predicate_type: path_equals
      target_state:
        selection_mode: single
        path:
        - Company
        - Engineering
        - Frontend
        - Web
        value: dept_company_eng_frontend_web
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting any other leaf (e.g., "Company / Engineering / Frontend / Mobile Web").
  - Selecting a non-leaf parent node (e.g., "Frontend").
  - Leaving the selection empty.
  - Changing a different component (there is only one TreeSelect; any unrelated clicks must not count).
  expected_interaction_path: Click the Department input → expand Company → expand Engineering → expand Frontend → click Web leaf.
  notes: 'Checker hint: read TreeSelect selected value(s) from the component adapter; map node values to canonical paths via the known treeData.'
