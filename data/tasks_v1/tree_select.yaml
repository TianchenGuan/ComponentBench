  secondary_template: null
  browsergym_goal: In the "Secondary channel" tree selector, select the same channel that is highlighted in the "Reference" card. The task will finish automatically when done.
  ui_copy: 'Secondary channel: Match the highlighted channel in the Reference card.'
  setup_description: |-
    - Layout: dashboard with several widgets (high clutter): a small chart, a recent alerts table, filter chips, and a sidebar.
    - Target components: THREE composite TreeSelect instances grouped in a "Notification channels" widget:
      1) "Primary channel" (pre-filled with "Email / On-call list")
      2) "Secondary channel" (empty)  ← TARGET
      3) "Tertiary channel" (pre-filled with "Chat / #general")
    - All three instances share the same channel tree:
      - Chat → (#general, #incidents, #releases)
      - Email → (On-call list, Security list)
      - PagerDuty → (Critical, Non-critical)
    - Visual guidance: a "Reference" card shows a static screenshot-like image of the channel tree with ONE leaf highlighted. The highlighted leaf corresponds to "Chat → #incidents".
    - Interaction: open the Secondary channel popover and select the matching leaf to commit.
    - No Apply button; committing closes the popover and writes the selection text into the Secondary channel input.
  scene_context:
    theme: light
    spacing: comfortable
    layout: dashboard
    placement: center
    scale: default
    instances: 3
    guidance: visual
    clutter: high
  difficulty:
    difficulty_bucket: hard
    tier: L3
    axes_ratings:
      precision_requirement: 2
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 2
      semantic_observability: 3
      disambiguation_load: 5
    justification: High clutter plus three similar instances creates heavy disambiguation load; visual-only target specification requires interpreting the reference highlight and selecting the correct instance.
  success_trigger:
    human_readable:
    - The TreeSelect labeled "Secondary channel" matches the node highlighted in the Reference card.
    - 'Canonical target is path [Chat, #incidents].'
    canonical_predicate:
      predicate_type: matches_reference
      target_state:
        selection_mode: single
        reference_id: reference-card-highlight-1
        path:
        - Chat
        - '#incidents'
        value: channel_chat_incidents
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: true
      target_instance_label_or_id: Secondary channel
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Setting Primary or Tertiary channel to the target while leaving Secondary unchanged.
  - Selecting "#general" or "#releases" instead of "#incidents".
  - Interacting with dashboard filters/tables without setting Secondary channel.
  - Leaving Secondary channel empty.
  expected_interaction_path: 'Find the Notification channels widget → inspect Reference card highlight → open Secondary channel selector → expand Chat → click #incidents.'
  notes: 'Instrumentation: each instance should expose data-testid derived from its label. The checker should validate only Secondary channel''s committed value.'
