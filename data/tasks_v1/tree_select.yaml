- id: tree_select-antd-T08
  name: 'Strict check: select parent and leaf'
  canonical_type: tree_select
  implementation_source: antd
  implementation_variant: null
  implementation_component: 'AntD: TreeSelect'
  task_template: select_many
  secondary_template: null
  browsergym_goal: 'In the "Teams to notify" tree selector, select exactly these two entries: "Company / Engineering" and "Company / Engineering / Frontend / Web". The task will finish automatically when done.'
  ui_copy: 'Teams to notify: Select Engineering and Engineering → Frontend → Web (exactly those two).'
  setup_description: |-
    - Theme/spacing: dark theme with compact spacing (tighter paddings and smaller row height inside the dropdown).
    - Layout: isolated_card centered titled "Incident notifications".
    - Target component: one AntD TreeSelect labeled "Teams to notify" configured for strict checkable multi-select:
      - `treeCheckable=true` shows checkboxes.
      - `treeCheckStrictly=true` means checking a parent does NOT automatically check/uncheck its children; parent and child selections are independent.
      - Search is disabled to force direct navigation in the tree.
    - Tree data (engineering org):
      - Company
        - Engineering
          - Frontend → (Web, Mobile Web)
          - Backend → (API, Data)
        - Sales
    - Initial state: nothing selected.
    - Feedback: selected items appear as tags in the input; because of strict mode, both a parent tag (Engineering) and a leaf tag (Web) can coexist.
  scene_context:
    theme: dark
    spacing: compact
    layout: isolated_card
    placement: center
    scale: default
    instances: 1
    guidance: text
    clutter: none
  difficulty:
    difficulty_bucket: hard
    tier: L2
    axes_ratings:
      precision_requirement: 3
      target_acquisition: 3
      density_choice_interference: 3
      depth_layering: 3
      feedback_dynamics: 2
      semantic_observability: 2
      disambiguation_load: 2
    justification: Strict checkbox semantics increase error risk (parent/child independence), compact dark UI reduces target size/contrast, and success requires an exact two-item set.
  success_trigger:
    human_readable:
    - Teams to notify selection set is exactly {Company/Engineering, Company/Engineering/Frontend/Web}.
    - No other team is selected.
    canonical_predicate:
      predicate_type: set_equals
      target_state:
        selection_mode: multiple
        values:
        - team_company_engineering
        - dept_company_eng_frontend_web
        paths:
        - - Company
          - Engineering
        - - Company
          - Engineering
          - Frontend
          - Web
        order_invariant: true
        strict_parent_child: true
      tolerance: null
      require_confirm: false
      confirm_control: null
      require_correct_instance: false
      target_instance_label_or_id: null
      terminal_condition: task ends when predicate holds
  negative_cases:
  - Selecting only the parent Engineering (missing the Web leaf).
  - Selecting only the Web leaf (missing the Engineering parent).
  - Accidentally selecting Mobile Web, Backend, API, or any Sales node.
  - Selecting the root Company.
  expected_interaction_path: Open Teams to notify → expand Company → expand Engineering → check Engineering (parent) → expand Frontend → check Web leaf → verify exactly two tags.
  notes: Checker should compare selected node values exactly; do not infer parent-child closure (because strict mode is enabled).
