# Holo2-30B-A3B pixel-only agent config
# HuggingFace: Hcompany/Holo2-30B-A3B
provider: holo2
model_name: holo2-30b-a3b
hf_model_id: Hcompany/Holo2-30B-A3B
base_url: "${oc.env:VLLM_BASE_URL,http://localhost:8000/v1}"
api_key: "EMPTY"
demo_mode: "off"

# vLLM server launch parameters (used by Slurm worker script)
vllm:
  tensor_parallel_size: 1
  trust_remote_code: true
  max_model_len: 32768
  dtype: bfloat16
  served_model_name: holo2-30b-a3b
  gpu_memory_utilization: 0.90
  reasoning_parser: holo2
  limit_mm_per_prompt: '{"image": 3, "video": 0}'
