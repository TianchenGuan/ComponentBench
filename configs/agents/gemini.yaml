# Gemini models via Google AI API
#
# The Gemini API at generativelanguage.googleapis.com provides an
# OpenAI-compatible chat completions interface. The Slurm script sets:
#   VLLM_BASE_URL = https://generativelanguage.googleapis.com/v1beta/openai/
#   VLLM_API_KEY  = $GOOGLE_API_KEY

provider: gemini
model_name: gemini-3.1-flash-lite-preview
demo_mode: default
save_som_screenshots: true

# Gemini outputs normalized 0-1000 coordinates
normalize_coordinates: true
