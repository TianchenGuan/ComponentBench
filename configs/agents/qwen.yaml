# Qwen3-VL via local vLLM server
# Uses vLLM server running locally with OpenAI-compatible API

provider: qwen_vllm

# Model served by local vLLM instance
# Using "Thinking" variant to capture chain-of-thought reasoning in <think> tags
model_name: Qwen/Qwen3-VL-235B-A22B-Thinking-FP8

# vLLM OpenAI-compatible API endpoint
base_url: http://localhost:8000/v1
api_key: dummy  # vLLM doesn't require real API key

# BrowserGym "demo" visualizations for actions (useful for debugging)
demo_mode: default

# Save screenshots for debugging
save_som_screenshots: true

# Qwen3-VL outputs normalized 0-1000 coordinates
normalize_coordinates: true

