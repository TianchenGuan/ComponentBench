# Codex CLI configuration — uses ChatGPT OAuth (no API key needed).
#
# Setup:
#   npm i -g @openai/codex
#   codex login --device-auth
#   See docs/CODEX_OAUTH_RUNBOOK.md for cluster setup.
#
# The model_name can be overridden via --model_id at runtime.
provider: codex

model_name: gpt-5.1-codex-mini

# BrowserGym "demo" visualizations for actions
demo_mode: default

# Codex CLI settings
# codex_binary: codex       # path to codex binary (default: "codex")
# codex_home: ~/.codex       # override CODEX_HOME if needed
# timeout: 120               # per-call timeout in seconds
# max_retries: 2             # retry on invalid actions
