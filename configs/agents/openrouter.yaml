# Generic OpenRouter configuration for multi-model experiments.
# The model_name is intended to be overridden via --model_id CLI flag
# or MODEL_ID environment variable at submission time.
#
# Usage:
#   python scripts/run_componentbench_benchmark.py \
#     --agent_config openrouter_generic \
#     --model_id moonshotai/kimi-k2.5 \
#     ...
provider: openrouter

# Default model — overridden by --model_id at runtime
model_name: openai/gpt-5-mini

# BrowserGym "demo" visualizations for actions
demo_mode: default

# Most OpenRouter models (GPT, Claude, etc.) output actual pixel coordinates,
# NOT normalized 0-1000 values. Disable coordinate normalization.
normalize_coordinates: false

# API key: set OPENROUTER_API_KEY in environment (see ~/.secrets/openrouter.env)
# Rate limiting: set OPENROUTER_MIN_REQUEST_INTERVAL (seconds, default 0.5)
