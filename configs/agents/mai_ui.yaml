# MAI-UI-8B pixel-only agent config
# HuggingFace: Tongyi-MAI/MAI-UI-8B
provider: mai_ui
model_name: MAI-UI-8B
hf_model_id: Tongyi-MAI/MAI-UI-8B
base_url: "${oc.env:VLLM_BASE_URL,http://localhost:8000/v1}"
api_key: "EMPTY"
demo_mode: "off"

# vLLM server launch parameters (used by Slurm worker script)
vllm:
  tensor_parallel_size: 1
  trust_remote_code: true
  max_model_len: 8192
  dtype: bfloat16
  served_model_name: MAI-UI-8B
  gpu_memory_utilization: 0.90
