# GPT models via OpenAI API
#
# The Slurm script sets:
#   VLLM_BASE_URL = https://api.openai.com/v1
#   VLLM_API_KEY  = $OPENAI_API_KEY
#
# GPT models output actual pixel coordinates, NOT 0-1000 normalized values.

provider: openai
model_name: gpt-5.4-mini
demo_mode: default

normalize_coordinates: false
