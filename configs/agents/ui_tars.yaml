# UI-TARS-1.5-7B pixel-only agent config
# HuggingFace: ByteDance-Seed/UI-TARS-1.5-7B
provider: ui_tars
model_name: UI-TARS-1.5-7B
hf_model_id: ByteDance-Seed/UI-TARS-1.5-7B
base_url: "${oc.env:VLLM_BASE_URL,http://localhost:8000/v1}"
api_key: "EMPTY"
demo_mode: "off"
temperature: 0.0

# vLLM server launch parameters (used by Slurm worker script)
vllm:
  tensor_parallel_size: 1
  trust_remote_code: true
  max_model_len: 32768
  dtype: bfloat16
  served_model_name: UI-TARS-1.5-7B
  gpu_memory_utilization: 0.90
