# Opus 4.6 (Claude) configuration for ComponentBench.
#
# Uses Anthropic's computer-use tool interface.
# Screenshots are captured at 1280x720 and scaled down to 1024x768
# before sending to Claude, following Anthropic's XGA recommendation.
# Claude outputs coordinates in 1024x768 space; the agent maps them
# proportionally back to 1280x720.
#
# Currently evaluated only on ComponentBench-Core (v2, 912 tasks).
# Run by external author using a separate harness (not BrowserGym).
#
# Reference: https://docs.anthropic.com/en/docs/agents-and-tools/computer-use

provider: anthropic_computer_use
model_name: claude-opus-4-6-20260301

# Screenshot scaling
source_resolution: "1280x720"
send_resolution: "1024x768"

# Anthropic API key: set ANTHROPIC_API_KEY in environment
