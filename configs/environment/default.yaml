# BrowserGym environment arguments for ComponentBench v0.2

# Maximum steps per task (20 is reasonable for component interactions)
max_steps: 20

# Per-step timeout in seconds. If any single Playwright action or LLM call
# hangs for longer than step_timeout * max_steps, the task is killed.
# 300s (5 min) per step prevents browser freezes from blocking the whole run.
step_timeout: 300

# Random seed for reproducibility
task_seed: 42

# Run headless (required for Slurm/cluster)
headless: true

# Slow motion between actions (ms) - set to null for full speed
slow_mo: null

# Don't wait for user message
wait_for_user_message: false

# Video recording (disabled by default to save space)
record_video: false
