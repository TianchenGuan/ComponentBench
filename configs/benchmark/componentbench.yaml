# ComponentBench v0.2 benchmark configuration
# 97 canonical component types, 2910 tasks across 3 UI libraries

name: componentbench
base_url: "http://localhost:3002"
data_dir: "data/tasks_v1"

# Default observation settings (can be overridden by mode)
obs:
  use_screenshot: true
  use_axtree: true
  use_som_overlay: false
  use_grid_overlay: false
  use_html: false
  save_grid_screenshots: false
  pixel_only: false
  action_space: bid  # bid or coord
  grid_size: 10
